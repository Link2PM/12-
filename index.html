<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>体态修复 · 训练手册</title>

<style>
/* ====== 字体与变量 ====== */
@font-face {
  font-family: 'NotoSerifSC';
  src: local('Noto Serif SC'), local('Songti SC'), local('STSong');
  font-weight: 400;
}

:root {
  --bg-0: #0a0a0a;
  --bg-1: #141414;
  --bg-2: #1c1c1c;
  --bg-3: #262626;
  --line: #2d2d2d;
  --line-2: #3a3a3a;
  --text-0: #f0ebe0;
  --text-1: #b8b3a8;
  --text-2: #6e6a62;
  --text-3: #4a4842;
  --accent: #d4af37;
  --accent-dim: #8a7228;
  --warn: #c47d4a;
  --good: #6b8e5a;
  --bad: #a85248;
  --radius: 4px;
  --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  background: var(--bg-0);
  color: var(--text-0);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  font-size: 15px;
  line-height: 1.6;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}

body {
  padding-bottom: env(safe-area-inset-bottom);
  min-height: 100vh;
}

button {
  background: none;
  border: none;
  color: inherit;
  font-family: inherit;
  font-size: inherit;
  cursor: pointer;
  -webkit-appearance: none;
}

input, textarea, select {
  background: var(--bg-2);
  color: var(--text-0);
  border: 1px solid var(--line);
  font-family: inherit;
  font-size: inherit;
  padding: 10px 12px;
  border-radius: var(--radius);
  -webkit-appearance: none;
  outline: none;
  width: 100%;
}

input:focus, textarea:focus {
  border-color: var(--accent-dim);
}

textarea {
  resize: vertical;
  min-height: 80px;
  line-height: 1.5;
}

::placeholder {
  color: var(--text-3);
}

/* ====== 日期导航 ====== */
.date-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 8px 12px;
  margin-bottom: 16px;
  gap: 8px;
}

.date-nav-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-1);
  font-size: 20px;
  border-radius: var(--radius);
  transition: var(--transition);
  flex-shrink: 0;
}

.date-nav-btn:disabled {
  color: var(--text-3);
  opacity: 0.3;
}

.date-nav-btn:not(:disabled):active {
  background: var(--bg-2);
}

.date-nav-center {
  flex: 1;
  text-align: center;
  min-width: 0;
}

.date-nav-date {
  font-family: "NotoSerifSC", "Songti SC", serif;
  font-size: 16px;
  color: var(--text-0);
  letter-spacing: 0.05em;
}

.date-nav-rel {
  font-size: 11px;
  color: var(--text-2);
  margin-top: 2px;
  letter-spacing: 0.1em;
}

.date-nav-rel.today-rel {
  color: var(--accent);
}

.date-nav-today-btn {
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--text-1);
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 11px;
  white-space: nowrap;
  flex-shrink: 0;
}

.date-nav-today-btn.current {
  background: var(--accent-dim);
  color: var(--text-0);
  border-color: var(--accent-dim);
}

.date-mode-banner {
  background: rgba(196, 125, 74, 0.08);
  border: 1px solid var(--line);
  border-left: 2px solid var(--warn);
  padding: 8px 12px;
  border-radius: var(--radius);
  font-size: 12px;
  color: var(--text-1);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.date-mode-banner.future {
  border-left-color: var(--text-3);
  color: var(--text-2);
}

/* ====== 顶部 ====== */
.app-header {
  position: sticky;
  top: 0;
  left: 0;
  right: 0;
  background: var(--bg-0);
  border-bottom: 1px solid var(--line);
  z-index: 100;
  padding-top: env(safe-area-inset-top);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  background: rgba(10, 10, 10, 0.92);
}

.app-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px 12px;
}

.app-title-text {
  font-family: "NotoSerifSC", "Songti SC", serif;
  font-size: 17px;
  font-weight: 400;
  letter-spacing: 0.05em;
  color: var(--text-0);
}

.app-title-text span {
  color: var(--accent);
  margin-right: 6px;
}

.icon-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-1);
  font-size: 20px;
  border-radius: var(--radius);
  transition: var(--transition);
}

.icon-btn:active {
  background: var(--bg-2);
  color: var(--text-0);
}

/* ====== 标签栏 ====== */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--line);
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.tabs::-webkit-scrollbar {
  display: none;
}

.tab {
  flex: 1;
  min-width: 70px;
  padding: 12px 8px;
  font-size: 13px;
  color: var(--text-2);
  text-align: center;
  border-bottom: 1px solid transparent;
  transition: var(--transition);
  white-space: nowrap;
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ====== 主内容 ====== */
main {
  padding: 20px;
  max-width: 720px;
  margin: 0 auto;
  padding-bottom: 100px;
}

.view {
  display: none;
}

.view.active {
  display: block;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ====== 通用组件 ====== */
.section-title {
  font-family: "NotoSerifSC", "Songti SC", serif;
  font-size: 14px;
  letter-spacing: 0.15em;
  color: var(--text-2);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--line);
  text-transform: uppercase;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.section-title-cn {
  font-size: 12px;
  color: var(--text-3);
  letter-spacing: 0.05em;
  text-transform: none;
}

.card {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  transition: var(--transition);
}

.card.completed {
  background: var(--bg-1);
  border-color: var(--accent-dim);
}

.empty {
  text-align: center;
  color: var(--text-3);
  padding: 40px 20px;
  font-size: 14px;
}

/* ====== 当日视图 ====== */
.today-header {
  margin-bottom: 24px;
}

.today-date {
  font-size: 12px;
  color: var(--text-2);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.today-title {
  font-family: "NotoSerifSC", "Songti SC", serif;
  font-size: 24px;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}

.today-meta {
  font-size: 13px;
  color: var(--text-2);
  display: flex;
  gap: 16px;
}

.today-meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.progress-summary {
  background: var(--bg-1);
  border: 1px solid var(--line);
  padding: 14px 16px;
  border-radius: var(--radius);
  margin-bottom: 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.progress-summary-text {
  font-size: 13px;
  color: var(--text-1);
}

.progress-summary-num {
  font-family: "NotoSerifSC", "Songti SC", serif;
  font-size: 22px;
  color: var(--accent);
}

.progress-summary-num small {
  color: var(--text-2);
  font-size: 14px;
}

/* ====== 动作卡片 ====== */
.exercise-card {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  transition: var(--transition);
}

.exercise-card.done {
  border-color: var(--accent-dim);
  background: linear-gradient(to right, rgba(212, 175, 55, 0.04), transparent);
}

.exercise-card.superset {
  margin-left: 18px;
  border-left: 2px solid var(--accent-dim);
}

.superset-tag {
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 0.05em;
  padding: 2px 14px 0;
  opacity: 0.8;
}

.exercise-row {
  display: flex;
  align-items: flex-start;
  padding: 14px;
  gap: 12px;
}

.checkbox {
  flex-shrink: 0;
  width: 22px;
  height: 22px;
  border: 1.5px solid var(--text-3);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 1px;
  cursor: pointer;
  transition: var(--transition);
}

.checkbox.checked {
  background: var(--accent);
  border-color: var(--accent);
}

.checkbox.checked::after {
  content: '✓';
  color: var(--bg-0);
  font-size: 14px;
  font-weight: 700;
}

.exercise-content {
  flex: 1;
  min-width: 0;
}

.exercise-name {
  font-size: 15px;
  color: var(--text-0);
  font-weight: 500;
  margin-bottom: 4px;
}

.exercise-meta {
  font-size: 12px;
  color: var(--text-2);
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 4px;
}

.exercise-meta span {
  white-space: nowrap;
}

.exercise-tip {
  font-size: 12px;
  color: var(--text-2);
  font-style: italic;
  line-height: 1.5;
  margin-top: 4px;
}

.last-note-preview {
  background: rgba(212, 175, 55, 0.06);
  border-left: 2px solid var(--accent-dim);
  padding: 6px 10px;
  margin-top: 6px;
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.last-note-date {
  color: var(--accent);
  font-size: 11px;
  letter-spacing: 0.05em;
}

.last-note-text {
  color: var(--text-1);
  line-height: 1.5;
  word-break: break-word;
}

.exercise-actions {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.action-btn {
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--text-1);
  padding: 4px 10px;
  border-radius: var(--radius);
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: var(--transition);
}

.action-btn:active {
  background: var(--bg-3);
}

.action-btn.has-content {
  border-color: var(--accent-dim);
  color: var(--accent);
}

.action-btn-count {
  background: var(--accent);
  color: var(--bg-0);
  font-size: 9px;
  padding: 1px 4px;
  border-radius: 8px;
  font-weight: 700;
}

.action-btn.video-btn {
  border-color: var(--line-2);
}

/* ====== 视频选择 modal ====== */
.video-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 20px;
}

.video-option {
  background: var(--bg-2);
  border: 1px solid var(--line);
  padding: 14px 16px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: var(--transition);
  text-decoration: none;
  color: var(--text-0);
}

.video-option:active {
  background: var(--bg-3);
}

.video-option-icon {
  font-size: 24px;
  width: 36px;
  text-align: center;
  flex-shrink: 0;
}

.video-option-content {
  flex: 1;
  min-width: 0;
}

.video-option-title {
  font-size: 14px;
  color: var(--text-0);
  margin-bottom: 2px;
}

.video-option-desc {
  font-size: 11px;
  color: var(--text-2);
}

.video-option-arrow {
  color: var(--text-3);
  font-size: 16px;
}

.video-option.featured {
  border-color: var(--accent-dim);
  background: linear-gradient(to right, rgba(212, 175, 55, 0.06), transparent);
}

.video-iframe-wrapper {
  background: #000;
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
  position: relative;
  padding-bottom: 62.5%; /* 16:10 比例,Bilibili 默认 */
  height: 0;
}

.video-iframe-wrapper iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: 0;
}

/* ====== 段落分组 ====== */
.exercise-group {
  margin-bottom: 28px;
}

.exercise-group-title {
  font-family: "NotoSerifSC", "Songti SC", serif;
  font-size: 13px;
  color: var(--accent);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px dashed var(--line);
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.exercise-group-title-meta {
  font-size: 11px;
  color: var(--text-3);
  font-family: -apple-system, sans-serif;
  letter-spacing: 0;
  text-transform: none;
}

/* ====== 周计划视图 ====== */
.week-selector {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 8px;
  margin-bottom: 16px;
  scrollbar-width: none;
}

.week-selector::-webkit-scrollbar {
  display: none;
}

.week-btn {
  flex-shrink: 0;
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--text-1);
  padding: 6px 14px;
  border-radius: 18px;
  font-size: 12px;
  white-space: nowrap;
  transition: var(--transition);
}

.week-btn.active {
  background: var(--accent);
  color: var(--bg-0);
  border-color: var(--accent);
}

.week-btn.current {
  border-color: var(--accent);
}

.day-card {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
}

.day-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.day-name {
  font-family: "NotoSerifSC", "Songti SC", serif;
  font-size: 14px;
  color: var(--accent);
  letter-spacing: 0.1em;
}

.day-title {
  font-size: 13px;
  color: var(--text-1);
  margin-top: 2px;
}

.day-body {
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text-1);
  line-height: 1.7;
}

/* ====== 习惯打卡 ====== */
.habit-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 20px;
}

.habit-card {
  background: var(--bg-1);
  border: 1px solid var(--line);
  padding: 14px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: var(--transition);
  text-align: center;
}

.habit-card.checked {
  background: linear-gradient(135deg, rgba(212, 175, 55, 0.08), transparent);
  border-color: var(--accent-dim);
}

.habit-icon {
  font-size: 22px;
  margin-bottom: 6px;
  filter: grayscale(0.5);
  opacity: 0.7;
}

.habit-card.checked .habit-icon {
  filter: none;
  opacity: 1;
}

.habit-name {
  font-size: 12px;
  color: var(--text-1);
  letter-spacing: 0.02em;
}

.habit-counter {
  background: var(--bg-1);
  border: 1px solid var(--line);
  padding: 14px 16px;
  border-radius: var(--radius);
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.habit-counter-name {
  font-size: 13px;
  color: var(--text-1);
}

.habit-counter-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}

.habit-counter-btn {
  width: 32px;
  height: 32px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--text-1);
}

.habit-counter-num {
  min-width: 36px;
  text-align: center;
  font-family: "NotoSerifSC", serif;
  font-size: 18px;
  color: var(--accent);
}

/* ====== 今日视图内嵌习惯打卡 ====== */
.today-habits-section {
  margin-top: 24px;
  border-top: 1px solid var(--line);
  padding-top: 16px;
}

.today-habits-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.today-habits-title {
  font-size: 13px;
  color: var(--text-2);
  letter-spacing: 0.1em;
}

.today-habits-progress {
  font-size: 12px;
  color: var(--accent);
  font-family: 'NotoSerifSC', serif;
}

.today-habit-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 12px;
}

.today-habit-chip {
  background: var(--bg-1);
  border: 1px solid var(--line);
  padding: 8px 4px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: var(--transition);
  text-align: center;
  position: relative;
}

.today-habit-chip.checked {
  background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), transparent);
  border-color: var(--accent-dim);
}

.today-habit-chip.auto-checked {
  border-color: var(--good);
  background: linear-gradient(135deg, rgba(107, 142, 90, 0.1), transparent);
}

.today-habit-chip .chip-icon {
  font-size: 18px;
  filter: grayscale(0.5);
  opacity: 0.6;
}

.today-habit-chip.checked .chip-icon,
.today-habit-chip.auto-checked .chip-icon {
  filter: none;
  opacity: 1;
}

.today-habit-chip .chip-name {
  font-size: 10px;
  color: var(--text-2);
  margin-top: 2px;
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.today-habit-chip.checked .chip-name {
  color: var(--text-1);
}

.today-habit-chip .chip-auto-tag {
  position: absolute;
  top: 2px;
  right: 3px;
  font-size: 8px;
  color: var(--good);
}

.today-habit-counters {
  display: flex;
  gap: 8px;
  margin-bottom: 4px;
}

.today-counter-item {
  flex: 1;
  background: var(--bg-1);
  border: 1px solid var(--line);
  padding: 8px 10px;
  border-radius: var(--radius);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.today-counter-label {
  font-size: 11px;
  color: var(--text-2);
}

.today-counter-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}

.today-counter-btn {
  width: 26px;
  height: 26px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: var(--text-1);
}

.today-counter-num {
  min-width: 24px;
  text-align: center;
  font-family: 'NotoSerifSC', serif;
  font-size: 15px;
  color: var(--accent);
}

/* ====== AI 分析 Skeleton ====== */

function deloadSets(sets) {
  return sets.replace(/(\d+)(×|组)/g, (_, n, sep) => Math.ceil(parseInt(n) / 2) + sep);
}

function buildV3Note(weekNum, pc, isDeload) {
  const phaseWeekIdx = weekNum - pc.range[0] + 1;
  let note = `${pc.label} 第 ${phaseWeekIdx} 周`;
  if (isDeload) {
    note += ' · ⚡ 减载周: 组数减半，重量 -15%，注重恢复';
  } else {
    note += ' · ' + pc.notes.join(' · ');
  }
  return note;
}

function buildV3Week(weekNum) {
  const phaseNum = weekNum <= 10 ? 1 : weekNum <= 14 ? 2 : 3;
  const pc = V3_PHASE_CONFIG[phaseNum];
  const isDeload = (weekNum === 10 || weekNum === 14 || weekNum === 18);
  const stage = pc.stageLabels[weekNum];

  const dayKeys = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
  const dayNames = ['周一', '周二', '周三', '周四', '周五', '周六'];

  const days = dayKeys.map((key, idx) => {
    const tmpl = pc.days[key];
    return {
      dayName: dayNames[idx],
      dayType: 'training',
      title: `Week ${weekNum} ${dayNames[idx]} · ${tmpl.title}`,
      skipWarmup: true,
      groups: tmpl.groups.map(g => ({
        title: g.title,
        description: g.description,
        exercises: g.exercises.map((ex, exIdx) => ({
          id: `w${weekNum}-d${idx + 1}-${exIdx + 1}`,
          name: ex.name,
          sets: isDeload ? deloadSets(ex.sets) : ex.sets,
          weight: ex.weight || '',
          tip: ex.tip || '',
          superSet: ex.superSet || false
        }))
      }))
    };
  });

  days.push({
    dayName: '周日',
    dayType: 'rest',
    title: `Week ${weekNum} 周日 · 休息`,
    description: '只做每日体态矫正 + 微习惯'
  });

  return {
    weekNum,
    phase: `${pc.label} (Week ${weekNum} · ${stage})`,
    note: buildV3Note(weekNum, pc, isDeload),
    days
  };
}

function getVideoForExercise(exerciseName) {
  // 先精确匹配
  if (VIDEO_MAP[exerciseName]) return VIDEO_MAP[exerciseName];
  
  // 模糊匹配:遍历 keys,看动作名是否包含某个 key 或反之
  for (const [key, val] of Object.entries(VIDEO_MAP)) {
    // 去掉括号内容比较
    const cleanName = exerciseName.replace(/[(（].*?[)）]/g, '').trim();
    const cleanKey = key.replace(/[(（].*?[)）]/g, '').trim();
    if (cleanName === cleanKey || 
        cleanName.includes(cleanKey) || 
        cleanKey.includes(cleanName)) {
      return val;
    }
  }
  
  // 完全没匹配,返回默认搜索
  return { q: exerciseName + ' 教学' };
}

// IndexedDB 数据库
// ============================================================
const DB_NAME = 'PostureRecoveryApp';
const DB_VERSION = 2;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onerror = () => reject(request.error);
    request.onsuccess = () => { db = request.result; resolve(db); };
    request.onupgradeneeded = (e) => {
      const database = e.target.result;
      if (!database.objectStoreNames.contains('workoutLogs')) {
        const store = database.createObjectStore('workoutLogs', { keyPath: 'id', autoIncrement: true });
        store.createIndex('date', 'date');
        store.createIndex('exerciseId', 'exerciseId');
      }
      if (!database.objectStoreNames.contains('exerciseNotes')) {
        const store = database.createObjectStore('exerciseNotes', { keyPath: 'id', autoIncrement: true });
        store.createIndex('exerciseId', 'exerciseId');
        store.createIndex('createdAt', 'createdAt');
      }
      if (!database.objectStoreNames.contains('media')) {
        const store = database.createObjectStore('media', { keyPath: 'id', autoIncrement: true });
        store.createIndex('noteId', 'noteId');
      }
      if (!database.objectStoreNames.contains('dailyHabits')) database.createObjectStore('dailyHabits', { keyPath: 'date' });
      if (!database.objectStoreNames.contains('bodyMetrics')) {
        const store = database.createObjectStore('bodyMetrics', { keyPath: 'id', autoIncrement: true });
        store.createIndex('date', 'date');
        store.createIndex('metricId', 'metricId');
      }
      if (!database.objectStoreNames.contains('settings')) database.createObjectStore('settings', { keyPath: 'key' });
      if (!database.objectStoreNames.contains('aiAnalysis')) database.createObjectStore('aiAnalysis', { keyPath: 'date' });
    };
  });
}

function dbAdd(storeName, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).add(data);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbPut(storeName, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).put(data);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbGet(storeName, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbGetAll(storeName) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbGetByIndex(storeName, indexName, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).index(indexName).getAll(value);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbDelete(storeName, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).delete(key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// ============================================================
// LocalStorage 主存储层 (绕过 iOS PWA IndexedDB 不稳定问题)
// ============================================================
// 关键设计决定:
// - iOS 17+ PWA 模式下 IndexedDB 在版本更新/缓存清理时会丢数据(已知 bug)
// - localStorage 明显更稳定,几乎不会因为 PWA 升级丢失
// - 数据量评估: 每条评论几百字节,1000 条 < 500KB, localStorage 5MB 限额够用很久
// - IndexedDB 仍用于存放大文件(media)和作为影子备份

const LS_PREFIX = 'pwa_';
const LS_STORES = ['workoutLogs', 'exerciseNotes', 'dailyHabits', 'bodyMetrics', 'settings', 'aiAnalysis'];

function lsRead(storeName) {
  try {
    const raw = localStorage.getItem(LS_PREFIX + storeName);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    console.error(`lsRead ${storeName} 失败:`, e);
    return [];
  }
}

function lsWrite(storeName, list) {
  try {
    localStorage.setItem(LS_PREFIX + storeName, JSON.stringify(list));
    return true;
  } catch (e) {
    console.error(`lsWrite ${storeName} 失败:`, e);
    alert(`⚠ localStorage 写入失败: ${e.message}\n\n可能存储已满,建议立即导出 JSON 备份`);
    return false;
  }
}

function lsNextId(storeName) {
  const key = LS_PREFIX + 'nextId_' + storeName;
  const cur = parseInt(localStorage.getItem(key) || '0', 10) + 1;
  localStorage.setItem(key, String(cur));
  return cur;
}

// 启动时迁移: 如果 IDB 有数据但 LS 没有,迁移过来(从老版本升级到 v8.3 的兼容)
async function migrateFromIDB() {
  let migrated = 0;
  const summary = [];
  for (const store of LS_STORES) {
    try {
      const ls = lsRead(store);
      if (ls.length > 0) continue;
      const idbData = await _idbGetAll(store);
      if (idbData && idbData.length > 0) {
        lsWrite(store, idbData);
        // 维护 nextId
        const maxId = Math.max(0, ...idbData.map(x => parseInt(x.id) || 0));
        if (maxId > 0) {
          localStorage.setItem(LS_PREFIX + 'nextId_' + store, String(maxId));
        }
        migrated += idbData.length;
        summary.push(`${store}: ${idbData.length}`);
      }
    } catch (e) {
      console.error(`migrate ${store} 失败:`, e);
    }
  }
  return { migrated, summary };
}

// ============================================================
// LocalStorage 实际操作 (所有 LS_STORES 数据走这里)
// ============================================================

async function _lsAdd(storeName, data) {
  const list = lsRead(storeName);
  const item = { ...data };
  if (item.id === undefined) item.id = lsNextId(storeName);
  list.push(item);
  lsWrite(storeName, list);
  // 影子写 IDB
  try { await _idbAdd(storeName, item); } catch (e) { /* 容错: IDB 失败不影响 */ }
  return item.id;
}

async function _lsPut(storeName, data) {
  const list = lsRead(storeName);
  let keyField;
  if (storeName === 'dailyHabits' || storeName === 'aiAnalysis') keyField = 'date';
  else if (storeName === 'settings') keyField = 'key';
  else keyField = 'id';
  const key = data[keyField];
  
  const idx = list.findIndex(x => x[keyField] === key);
  if (idx >= 0) list[idx] = data;
  else list.push(data);
  lsWrite(storeName, list);
  
  try { await _idbPut(storeName, data); } catch (e) { /* 容错 */ }
  return key;
}

async function _lsGet(storeName, key) {
  const list = lsRead(storeName);
  let keyField;
  if (storeName === 'dailyHabits' || storeName === 'aiAnalysis') keyField = 'date';
  else if (storeName === 'settings') keyField = 'key';
  else keyField = 'id';
  return list.find(x => x[keyField] === key);
}

async function _lsGetAll(storeName) {
  return lsRead(storeName);
}

async function _lsGetByIndex(storeName, indexName, value) {
  const list = lsRead(storeName);
  return list.filter(x => x[indexName] === value);
}

async function _lsDelete(storeName, key) {
  const list = lsRead(storeName);
  let keyField;
  if (storeName === 'dailyHabits' || storeName === 'aiAnalysis') keyField = 'date';
  else if (storeName === 'settings') keyField = 'key';
  else keyField = 'id';
  const idx = list.findIndex(x => x[keyField] === key);
  if (idx >= 0) {
    list.splice(idx, 1);
    lsWrite(storeName, list);
  }
  try { await _idbDelete(storeName, key); } catch (e) { /* 容错 */ }
}

async function getCurrentWeekDay() {
  const startDate = await getSetting('startDate');
  if (!startDate) {
    // 防御性兜底: 理论上 ensureStartDate() 在启动时已经写入,不会走到这里
    console.warn('getCurrentWeekDay: startDate 未设置,使用紧急 fallback');
    const today = new Date();
    const dayOfWeek = today.getDay();
    const dayIdx = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    return { weekNum: 3, dayIdx };
  }
  const start = new Date(startDate);
  start.setHours(0, 0, 0, 0);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diffDays = Math.floor((today - start) / (24 * 60 * 60 * 1000));
  if (diffDays < 0) return { weekNum: 3, dayIdx: 0 };
  const dayOfWeek = today.getDay();
  const dayIdx = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
  const weekOffset = Math.floor(diffDays / 7);
  return { weekNum: 3 + weekOffset, dayIdx };
}

function getAllExercises() {
  const list = [];
  PLAN_DATA.warmupTemplate.exercises.forEach(ex => list.push({ ...ex, source: '激活套餐' }));
  PLAN_DATA.morningTemplate.exercises.forEach(ex => list.push({ ...ex, source: '每日矫正' }));
  WEEKS.forEach(week => {
    if (!week.days) return;
    week.days.forEach(day => {
      if (!day.groups) return;
      day.groups.forEach(group => {
        if (!group.exercises) return;
        group.exercises.forEach(ex => list.push({ ...ex, source: `Week ${week.weekNum} ${day.dayName}` }));
      });
    });
  });
  return list;
}

// - exerciseKey (如 "单腿 RDL") 是"动作语义 id" - 同名动作共享

//   都用同名 (name),只有 weight 字段在变
// - 真正不同的动作(比如"单腿 RDL" vs "单腿 RDL + 哑铃"),会有不同的 name,自动隔离
//
// 这样,用户的评论按 name 关联,跨周自然共享同一个动作的训练历史

function exerciseIdToKey(exerciseId) {
  if (!exerciseId) return null;
  const all = getAllExercises();
  const found = all.find(e => e.id === exerciseId);
  return found ? found.name : null; // 找不到时返回 null
}

  const aliases = new Set([name]);
  for (const group of EXERCISE_NAME_ALIASES) {
    if (group.includes(name)) {
      group.forEach(n => aliases.add(n));
    }
  }
  return aliases;
}

// 拿到某个动作 key 下所有评论(跨周聚合 + 别名匹配)
async function getNotesForKey(exerciseKey) {
  if (!exerciseKey) return [];
  const all = await dbGetAll('exerciseNotes');
  const aliases = getExerciseAliases(exerciseKey);
  return all.filter(n => {
    // 新评论: 匹配 exerciseKey 字段（含别名）
    if (n.exerciseKey && aliases.has(n.exerciseKey)) return true;
    // 老评论 fallback: 用 exerciseId 反查 name
    if (n.exerciseId) {
      const key = n.exerciseKey || exerciseIdToKey(n.exerciseId);
      if (key && aliases.has(key)) return true;
    }
    return false;
  });
}

// 启动时一次性: 为所有缺 exerciseKey 的老评论自动回填
async function backfillExerciseKey() {
  const all = await dbGetAll('exerciseNotes');
  let filled = 0;
  for (const n of all) {
    if (!n.exerciseKey && n.exerciseId) {
      const key = exerciseIdToKey(n.exerciseId);
      if (key) {
        // dbPut 走 _lsPut 主存储 + IDB 影子
        await dbPut('exerciseNotes', { ...n, exerciseKey: key });
        filled++;
      }
    }
  }
  return filled;
}

async function callAI(systemPrompt, userMessage, onDelta) {
  const providerId = await getSetting('aiProvider') || 'claude';
  const apiKey = await getSetting('aiApiKey');
  if (!apiKey) throw new Error('NO_API_KEY');
  if (!navigator.onLine) throw new Error('OFFLINE');

  const provider = AI_PROVIDERS[providerId];
  if (!provider) throw new Error(`未知的 AI 接入商: ${providerId}`);

  const model = await getSetting('aiModel') || provider.defaultModel;
  const req = provider.buildRequest(apiKey, model, systemPrompt, userMessage);

  const res = await fetch(req.url, {
    method: 'POST',
    headers: req.headers,
    body: JSON.stringify(req.body)
  });

  if (!res.ok) {
    const status = res.status;
    if (status === 401 || status === 403) throw new Error('API Key 无效或已过期，请到设置中检查');
    if (status === 429) throw new Error('请求过于频繁，请稍后重试');
    const body = await res.text().catch(() => '');
    throw new Error(`API 请求失败 (${status}): ${body.slice(0, 200)}`);
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let fullText = '';
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop() || '';
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim();
      if (data === '[DONE]' || !data) continue;
      try {
        const parsed = JSON.parse(data);
        const text = provider.parseSSE(parsed);
        if (text) {
          fullText += text;
          if (onDelta) onDelta(text, fullText);
        }
      } catch (e) { /* 跳过非 JSON 行 */ }
    }
  }
  return { text: fullText, model, providerId };
}

async function assembleDailyContext(dateStr) {
  const { weekNum, dayIdx } = await getWeekDayForDate(dateStr);
  const weekData = getWeekData(weekNum);
  const logs = await dbGetByIndex('workoutLogs', 'date', dateStr);
  const allNotes = await dbGetAll('exerciseNotes');
  const habitData = await dbGet('dailyHabits', dateStr) || { habits: {}, counters: {} };

  let md = '';

  // 训练计划上下文
  md += `## 训练计划上下文\n`;
  if (weekData) {
    md += `当前阶段：${weekData.phase}\n`;
    const day = weekData.days[dayIdx];
    md += `当前位置：Week ${weekNum} · ${day.dayName} · ${day.dayType === 'training' ? '训练日' : day.dayType === 'recovery' ? '恢复日' : '休息日'}\n`;
    md += `今日标题：${day.title}\n`;
    if (weekData.note) md += `本周提示：${weekData.note}\n`;
  } else {
    md += `Week ${weekNum}（超出计划范围）\n`;
  }

  // 今日计划动作与完成情况
  md += `\n## 今日计划动作与完成情况\n`;
  const allExercises = [];

  if (weekData) {
    const day = weekData.days[dayIdx];
    // 晨间重置
    PLAN_DATA.morningTemplate.exercises.forEach(ex => allExercises.push({ ...ex, group: '每日体态矫正' }));
    if (day.dayType === 'training' && day.groups) {
      if (!day.skipWarmup) {
        PLAN_DATA.warmupTemplate.exercises.forEach(ex => allExercises.push({ ...ex, group: '训练前激活' }));
      }
      day.groups.forEach(g => g.exercises.forEach(ex => allExercises.push({ ...ex, group: g.title })));
    }
  }

  let doneCount = 0;
  allExercises.forEach(ex => { if (logs.find(l => l.exerciseId === ex.id && l.completed)) doneCount++; });
  const pct = allExercises.length > 0 ? Math.round(doneCount / allExercises.length * 100) : 0;
  md += `完成 ${doneCount}/${allExercises.length} (${pct}%)\n\n`;

  let currentGroup = '';
  allExercises.forEach(ex => {
    if (ex.group !== currentGroup) {
      currentGroup = ex.group;
      md += `### ${currentGroup}\n`;
    }
    const done = logs.find(l => l.exerciseId === ex.id && l.completed);
    const mark = done ? '✅' : '⬜';
    let line = `- ${mark} ${ex.name} ${ex.sets || ''}`;
    if (ex.weight) line += ` ${ex.weight}`;
    if (ex.tip) line += ` | 提示：${ex.tip}`;
    md += line + '\n';
  });

  // 今日习惯
  md += `\n## 今日习惯\n`;
  const habitsDone = HABITS.toggle.filter(h => habitData.habits[h.id]).length;
  md += `完成 ${habitsDone}/${HABITS.toggle.length}：`;
  md += HABITS.toggle.map(h => `${h.name}${habitData.habits[h.id] ? '✓' : '✗'}`).join(' ');
  md += '\n';
  HABITS.counter.forEach(h => {
    md += `${h.name}：${habitData.counters[h.id] || 0}${h.unit} `;
  });
  md += '\n';

  // 今日动作记录（评论）
  const todayStart = new Date(dateStr + 'T00:00:00').getTime();
  const todayEnd = todayStart + 86400000;
  const todayNotes = allNotes.filter(n => {
    const t = new Date(n.createdAt).getTime();
    return t >= todayStart && t < todayEnd;
  });
  if (todayNotes.length > 0) {
    md += `\n## 今日动作记录\n`;
    const feelMap = { easy: '💪轻松', normal: '✅正常', hard: '😤勉强', fail: '❌未完成' };
    todayNotes.forEach(n => {
      const exName = exerciseIdToKey(n.exerciseId) || n.exerciseKey || n.exerciseId;
      if (n.sets && n.sets.length > 0) {
        const setsDesc = n.sets.map(s => {
          let v = '';
          if (s.duration !== undefined) v = `${s.duration}${s.unit || '秒'}`;
          else {
            if (s.weight !== undefined) v += `${s.weight}kg`;
            if (s.reps !== undefined) v += (v ? '×' : '') + `${s.reps}`;
          }
          if (s.feel) v += ` ${feelMap[s.feel] || s.feel}`;
          return `第${s.set}组 ${v}`;
        }).join(' | ');
        md += `- ${exName}：${setsDesc}`;
        if (n.freeNote) md += ` | 备注：${n.freeNote}`;
        md += '\n';
      } else {
        md += `- ${exName}："${n.text}"\n`;
      }
    });
  }

  // 近 7 天趋势
  md += `\n## 近 7 天趋势\n`;
  md += `| 日期 | 类型 | 完成率 | 习惯 |\n|------|------|--------|------|\n`;
  for (let i = 1; i <= 7; i++) {
    const d = new Date(dateStr);
    d.setDate(d.getDate() - i);
    const ds = fmtDate(d);
    const { weekNum: wn, dayIdx: di } = await getWeekDayForDate(ds);
    const wd = getWeekData(wn);
    const dayLogs = await dbGetByIndex('workoutLogs', 'date', ds);
    const hd = await dbGet('dailyHabits', ds) || { habits: {} };

    let dayType = '-', dayDone = 0, dayTotal = 0;
    if (wd) {
      const dd = wd.days[di];
      dayType = dd.dayType === 'training' ? dd.title.split('·').pop()?.trim() || '训练' : dd.dayType === 'recovery' ? '恢复' : '休息';
      PLAN_DATA.morningTemplate.exercises.forEach(() => dayTotal++);
      if (dd.dayType === 'training' && dd.groups) {
        if (!dd.skipWarmup) PLAN_DATA.warmupTemplate.exercises.forEach(() => dayTotal++);
        dd.groups.forEach(g => g.exercises.forEach(() => dayTotal++));
      }
      dayLogs.forEach(l => { if (l.completed) dayDone++; });
    }
    const dayPct = dayTotal > 0 ? Math.round(dayDone / dayTotal * 100) + '%' : '-';
    const dayHabit = `${HABITS.toggle.filter(h => hd.habits[h.id]).length}/${HABITS.toggle.length}`;
    md += `| ${ds} | ${dayType} | ${dayPct} | ${dayHabit} |\n`;
  }

  // 近期体测变化
  const allMetrics = await dbGetAll('bodyMetrics');
  if (allMetrics.length > 0) {
    const sevenDaysAgo = new Date(dateStr);
    sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
    const recentMetrics = allMetrics.filter(m => new Date(m.date) >= sevenDaysAgo);
    if (recentMetrics.length > 0) {
      md += `\n## 近期体测变化\n`;
      const byMetric = {};
      recentMetrics.forEach(m => {
        if (!byMetric[m.metricId]) byMetric[m.metricId] = [];
        byMetric[m.metricId].push(m);
      });
      Object.entries(byMetric).forEach(([metricId, entries]) => {
        entries.sort((a, b) => a.date.localeCompare(b.date));
        const def = METRICS.find(m => m.id === metricId);
        const name = def ? def.name : metricId;
        const unit = def ? def.unit : '';
        if (entries.length >= 2) {
          md += `${name}：${entries[0].value}→${entries[entries.length - 1].value} ${unit}\n`;
        } else {
          md += `${name}：${entries[0].value} ${unit} (${entries[0].date})\n`;
        }
      });
    }
  }

  return md;
}

// 当前查看的日期(null = 今天)
let viewingDate = null; // YYYY-MM-DD 字符串或 null

function getViewingDateStr() {
  return viewingDate || todayStr();
}

function isViewingToday() {
  return !viewingDate || viewingDate === todayStr();
}

// 根据任意日期计算 weekNum 和 dayIdx
async function getWeekDayForDate(dateStr) {
  const startDate = await getSetting('startDate');
  let effectiveStart;
  if (!startDate) {
    // 防御性兜底: 理论上 ensureStartDate() 在启动时已经写入
    console.warn('getWeekDayForDate: startDate 未设置,使用紧急 fallback');
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const dayOfWeek = today.getDay();
    const daysToMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    effectiveStart = new Date(today);
    effectiveStart.setDate(today.getDate() - daysToMonday);
  } else {
    effectiveStart = new Date(startDate);
    effectiveStart.setHours(0, 0, 0, 0);
  }
  const target = new Date(dateStr);
  target.setHours(0, 0, 0, 0);
  const diffDays = Math.floor((target - effectiveStart) / (24 * 60 * 60 * 1000));
  const dayOfWeek = target.getDay();
  const dayIdx = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
  const weekOffset = Math.floor(diffDays / 7);
  const weekNum = 3 + weekOffset;
  return { weekNum, dayIdx, diffDays };
}

function navigateDate(delta) {
  const current = viewingDate ? new Date(viewingDate) : new Date();
  current.setDate(current.getDate() + delta);
  const newDateStr = fmtDate(current);
  // 如果切回今天,清空 viewingDate
  if (newDateStr === todayStr()) {
    viewingDate = null;
  } else {
    viewingDate = newDateStr;
  }
  renderToday();
}

function jumpToToday() {
  viewingDate = null;
  renderToday();
}

function getRelativeDayLabel(dateStr) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const target = new Date(dateStr);
  target.setHours(0, 0, 0, 0);
  const diff = Math.round((target - today) / (24 * 60 * 60 * 1000));
  if (diff === 0) return '今天';
  if (diff === -1) return '昨天';
  if (diff === 1) return '明天';
  if (diff === -2) return '前天';
  if (diff === 2) return '后天';
  if (diff < 0) return `${-diff} 天前`;
  return `${diff} 天后`;
}

  let navHtml = `
    <div class="date-nav">
      <button class="date-nav-btn" onclick="navigateDate(-1)">‹</button>
      <div class="date-nav-center">
        <div class="date-nav-date">${dateStr} · ${weekdayLabel}</div>
        <div class="date-nav-rel ${isToday ? 'today-rel' : ''}">${relLabel}</div>
      </div>
      <button class="date-nav-btn" onclick="navigateDate(1)">›</button>
      <button class="date-nav-today-btn ${isToday ? 'current' : ''}" onclick="jumpToToday()">今天</button>
    </div>`;
  
  // 未配置的情况
  if (!weekData) {
    view.innerHTML = navHtml + `
      <div class="today-header">
        <div class="today-title">该日期超出计划范围</div>
        <div class="today-meta"><span>Week ${weekNum} 数据未配置</span></div>
      </div>
      <div class="empty">计划当前覆盖 Week 3-6,后续阶段会陆续加入</div>`;
    return;
  }
  
  const day = weekData.days[dayIdx];
  const logs = await dbGetByIndex('workoutLogs', 'date', dateStr);
  
  let html = navHtml;
  
  // 非今天的提示条
  if (isPast) {
    html += `<div class="date-mode-banner">
      <span>📋</span>
      <span>历史日期:可查看与补录</span>
    </div>`;
  } else if (isFuture) {
    html += `<div class="date-mode-banner future">
      <span>👁</span>
      <span>未来日期:预览模式,不可勾选</span>
    </div>`;
  }
  
  html += `
    <div class="today-header">
      <div class="today-date">${weekData.phase}</div>
      <div class="today-title">${escHtml(day.title)}</div>
      <div class="today-meta">
        <span>📅 Week ${weekNum} · ${day.dayName}</span>
        <span>${day.dayType === 'training' ? '💪 训练日' : day.dayType === 'recovery' ? '🌿 恢复日' : '😴 休息日'}</span>
      </div>
    </div>`;

  if (weekData.note && isToday) {
    html += `<div class="card" style="border-color: var(--warn); background: rgba(196,125,74,0.05);">
      <div style="font-size: 12px; color: var(--warn); letter-spacing: 0.1em; margin-bottom: 4px;">⚠ 本周提示</div>
      <div style="font-size: 13px; color: var(--text-1);">${escHtml(weekData.note)}</div>
    </div>`;
  }
  
  // 计算进度
  let totalEx = 0, doneEx = 0;
  if (day.dayType === 'training' && day.groups) {
    totalEx += PLAN_DATA.morningTemplate.exercises.length;
    PLAN_DATA.morningTemplate.exercises.forEach(ex => { if (logs.find(l => l.exerciseId === ex.id && l.completed)) doneEx++; });
    if (!day.skipWarmup) {
      totalEx += PLAN_DATA.warmupTemplate.exercises.length;
      PLAN_DATA.warmupTemplate.exercises.forEach(ex => { if (logs.find(l => l.exerciseId === ex.id && l.completed)) doneEx++; });
    }
    day.groups.forEach(group => group.exercises.forEach(ex => {
      totalEx++;
      if (logs.find(l => l.exerciseId === ex.id && l.completed)) doneEx++;
    }));
  } else {
    totalEx = PLAN_DATA.morningTemplate.exercises.length;
    PLAN_DATA.morningTemplate.exercises.forEach(ex => { if (logs.find(l => l.exerciseId === ex.id && l.completed)) doneEx++; });
  }

  const pct = totalEx > 0 ? Math.round(doneEx / totalEx * 100) : 0;
  const progressLabel = isToday ? '今日完成进度' : isPast ? '当日完成情况' : '计划动作数';

  // 获取习惯完成数用于进度显示
  let habitDoneCount = 0;
  if (!isFuture) {
    const dateForHabitProgress = isToday ? todayStr() : dateStr;
    const habitData = await dbGet('dailyHabits', dateForHabitProgress) || { habits: {} };
    habitDoneCount = HABITS.toggle.filter(h => habitData.habits[h.id]).length;
  }
  const habitSuffix = isFuture ? '' : ` · 习惯 ${habitDoneCount}/${HABITS.toggle.length}`;

  html += `
    <div class="progress-summary">
      <div class="progress-summary-text">${progressLabel}</div>
      <div class="progress-summary-num">${doneEx}<small>/${totalEx} · ${pct}%${habitSuffix}</small></div>
    </div>`;

  const readonly = isFuture;
  
  html += await renderExerciseGroup({
    title: PLAN_DATA.morningTemplate.name,
    description: PLAN_DATA.morningTemplate.description,
    duration: PLAN_DATA.morningTemplate.duration,
    exercises: PLAN_DATA.morningTemplate.exercises
  }, logs, readonly);

  if (day.dayType === 'training' && day.groups) {
    if (!day.skipWarmup) {
      html += await renderExerciseGroup({
        title: PLAN_DATA.warmupTemplate.name,
        description: PLAN_DATA.warmupTemplate.description,
        duration: PLAN_DATA.warmupTemplate.duration,
        exercises: PLAN_DATA.warmupTemplate.exercises
      }, logs, readonly);
    }

    for (const group of day.groups) {
      html += await renderExerciseGroup({
        title: group.title,
        description: group.description,
        exercises: group.exercises
      }, logs, readonly);
    }
  } else {
    html += `<div class="card">
      <div style="font-size: 13px; color: var(--text-1); line-height: 1.7;">${escHtml(day.description || '')}</div>
    </div>`;
  }

  // ====== 内嵌习惯打卡区域(仅今天和过去日期显示) ======
  if (!isFuture) {
    const dateForHabits = isToday ? todayStr() : dateStr;
    const todayHabits = await dbGet('dailyHabits', dateForHabits) || { date: dateForHabits, habits: {}, counters: {} };

    // 自动检测晨间重置完成状态
    const morningExIds = PLAN_DATA.morningTemplate.exercises.map(ex => ex.id);
    const allMorningDone = morningExIds.every(id => logs.find(l => l.exerciseId === id && l.completed));
    // 如果晨间重置全部完成,自动勾选 h-morning 习惯
    if (allMorningDone && !todayHabits.habits['h-morning']) {
      todayHabits.habits['h-morning'] = true;
      await dbPut('dailyHabits', { ...todayHabits, date: dateForHabits });
    }

    const habitsDone = HABITS.toggle.filter(h => todayHabits.habits[h.id]).length;
    const habitsTotal = HABITS.toggle.length;

    html += `
    <div class="today-habits-section">
      <div class="today-habits-header">
        <div class="today-habits-title">☑ 微习惯打卡</div>
        <div class="today-habits-progress" style="color: ${habitsDone >= habitsTotal ? 'var(--good)' : habitsDone > 0 ? 'var(--accent)' : 'var(--text-3)'};">${habitsDone}/${habitsTotal}</div>
      </div>
      <div class="today-habit-grid">`;

    HABITS.toggle.forEach(habit => {
      const checked = todayHabits.habits[habit.id];
      const isAutoMorning = habit.id === 'h-morning' && allMorningDone;
      html += `
        <div class="today-habit-chip ${checked ? 'checked' : ''} ${isAutoMorning ? 'auto-checked' : ''}" data-habit-id="${habit.id}">
          ${isAutoMorning ? '<div class="chip-auto-tag">自动</div>' : ''}
          <div class="chip-icon">${habit.icon}</div>
          <div class="chip-name">${habit.name}</div>
        </div>`;
    });

    html += `</div><div class="today-habit-counters">`;

    HABITS.counter.forEach(habit => {
      const count = todayHabits.counters[habit.id] || 0;
      html += `
        <div class="today-counter-item">
          <div class="today-counter-label">${habit.name}</div>
          <div class="today-counter-controls">
            <button class="today-counter-btn" data-counter-id="${habit.id}" data-delta="-1">−</button>
            <div class="today-counter-num">${count}</div>
            <button class="today-counter-btn" data-counter-id="${habit.id}" data-delta="1">+</button>
          </div>
        </div>`;
    });

    html += `</div></div>`;
  }

  // ====== AI 训练分析区域 ======
  if (!isFuture && doneEx > 0) {
    const savedAnalysis = await dbGet('aiAnalysis', dateStr);
    html += `<div class="card" id="ai-analysis-section" style="margin-top: 20px;">`;
    if (savedAnalysis) {
      const timeStr = new Date(savedAnalysis.generatedAt).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      const providerLabel = savedAnalysis.provider ? (AI_PROVIDERS[savedAnalysis.provider]?.name || savedAnalysis.provider) : '';
      const modelLabel = savedAnalysis.model || '';
      const metaLabel = [providerLabel, modelLabel].filter(Boolean).join(' · ');
      html += `
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
          <div style="font-size: 12px; color: var(--accent); letter-spacing: 0.1em;">🤖 AI 训练分析</div>
          <div style="font-size: 11px; color: var(--text-3);">${metaLabel ? metaLabel + ' · ' : ''}${timeStr}</div>
        </div>
        <div style="font-size: 13px; color: var(--text-1); line-height: 1.8; white-space: pre-wrap;">${escHtml(savedAnalysis.content)}</div>
        <div style="margin-top: 12px; text-align: right;">
          <button style="font-size: 12px; padding: 6px 14px; background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--radius); color: var(--text-2);" onclick="triggerAIAnalysis('${dateStr}', true)">重新生成</button>
        </div>`;
    } else {
      html += `
        <div style="text-align: center; padding: 12px 0;">
          <div style="font-size: 13px; color: var(--text-2); margin-bottom: 10px;">训练已完成 ${pct}%</div>
          <button style="padding: 10px 24px; background: linear-gradient(135deg, var(--accent-dim), var(--accent)); color: var(--bg-0); border-radius: var(--radius); font-size: 13px; font-weight: 500; letter-spacing: 0.05em;" onclick="triggerAIAnalysis('${dateStr}')">🤖 生成 AI 分析</button>
        </div>`;
    }
    html += `</div>`;
  }

  view.innerHTML = html;
  
  view.querySelectorAll('.checkbox').forEach(el => {
    el.addEventListener('click', async () => {
      if (el.classList.contains('readonly')) {
        showToast('未来日期不可勾选');
        return;
      }
      await toggleExerciseDone(el.dataset.exid, getViewingDateStr());
      renderToday();
    });
  });
  view.querySelectorAll('.action-btn[data-action="note"]').forEach(el => {
    el.addEventListener('click', () => openNoteModal(el.dataset.exid, el.dataset.exname));
  });
  view.querySelectorAll('.action-btn[data-action="video"]').forEach(el => {
    el.addEventListener('click', () => openVideoModal(el.dataset.exname));
  });

  // 习惯打卡点击事件
  view.querySelectorAll('.today-habit-chip').forEach(el => {
    el.addEventListener('click', async () => {
      const habitId = el.dataset.habitId;
      const dateForHabits = isViewingToday() ? todayStr() : getViewingDateStr();
      let data = await dbGet('dailyHabits', dateForHabits) || { date: dateForHabits, habits: {}, counters: {} };
      data.habits[habitId] = !data.habits[habitId];
      await dbPut('dailyHabits', data);
      renderToday();
      // 同步习惯视图(如果之后切换过去)
    });
  });

  // 计数器点击事件
  view.querySelectorAll('.today-counter-btn').forEach(el => {
    el.addEventListener('click', async () => {
      const counterId = el.dataset.counterId;
      const delta = parseInt(el.dataset.delta);
      const dateForHabits = isViewingToday() ? todayStr() : getViewingDateStr();
      let data = await dbGet('dailyHabits', dateForHabits) || { date: dateForHabits, habits: {}, counters: {} };
      data.counters[counterId] = Math.max(0, (data.counters[counterId] || 0) + delta);
      await dbPut('dailyHabits', data);
      renderToday();
    });
  });
}

async function renderExerciseGroup(group, logs, readonly = false) {
  let html = `
    <div class="exercise-group">
      <div class="exercise-group-title">
        <span>${escHtml(group.title)}</span>
        ${group.duration ? `<span class="exercise-group-title-meta">${escHtml(group.duration)}</span>` : ''}
      </div>`;
  if (group.description) {
    html += `<div style="font-size: 12px; color: var(--text-2); margin-bottom: 10px; font-style: italic;">${escHtml(group.description)}</div>`;
  }
  
  for (const ex of group.exercises) {
    const log = logs.find(l => l.exerciseId === ex.id);
    const done = log && log.completed;
    // v8.6: 按动作语义 key 聚合,跨周共享同一个动作的所有评论
    const allNotes = await getNotesForKey(ex.name);
    const noteCount = allNotes.length;
    
    let lastNotePreview = '';
    if (noteCount > 0) {
      const sorted = [...allNotes].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      const latest = sorted[0];
      const dateOnly = fmtDate(latest.createdAt);
      let previewText = '';
      if (latest.sets && latest.sets.length > 0) {
        const feelEmoji = { easy: '💪', normal: '✅', hard: '😤', fail: '❌' };
        previewText = latest.sets.map(s => {
          let v = '';
          if (s.duration !== undefined) v = `${s.duration}${s.unit || '秒'}`;
          else {
            if (s.weight !== undefined) v += `${s.weight}kg`;
            if (s.reps !== undefined) v += (v ? '×' : '') + s.reps;
          }
          return v + (s.feel ? feelEmoji[s.feel] || '' : '');
        }).join(' / ');
      } else {
        previewText = (latest.text || '').replace(/\n+/g, ' / ').slice(0, 60);
      }
      const ellipsis = previewText.length > 60 ? '...' : '';
      lastNotePreview = `
        <div class="last-note-preview">
          <span class="last-note-date">📌 ${dateOnly}</span>
          <span class="last-note-text">${escHtml(previewText.slice(0, 60))}${ellipsis}</span>
        </div>`;
    }
    
    html += `
      <div class="exercise-card${done ? ' done' : ''}${ex.superSet ? ' superset' : ''}">
        ${ex.superSet ? '<div class="superset-tag">↳ 超级组</div>' : ''}
        <div class="exercise-row">
          <div class="checkbox${done ? ' checked' : ''}${readonly ? ' readonly' : ''}" data-exid="${ex.id}" style="${readonly ? 'opacity: 0.4; cursor: not-allowed;' : ''}"></div>
          <div class="exercise-content">
            <div class="exercise-name">${escHtml(ex.name)}</div>
            <div class="exercise-meta">
              ${ex.sets ? `<span>📋 ${escHtml(ex.sets)}</span>` : ''}
              ${ex.weight ? `<span>⚖ ${escHtml(ex.weight)}</span>` : ''}
            </div>
            ${ex.tip ? `<div class="exercise-tip">${escHtml(ex.tip)}</div>` : ''}
            ${lastNotePreview}
            <div class="exercise-actions">
              <button class="action-btn ${noteCount > 0 ? 'has-content' : ''}" data-action="note" data-exid="${ex.id}" data-exname="${escHtml(ex.name)}">
                📝 记录
                ${noteCount > 0 ? `<span class="action-btn-count">${noteCount}</span>` : ''}
              </button>
              <button class="action-btn video-btn" data-action="video" data-exname="${escHtml(ex.name)}">
                🎬 视频
              </button>
            </div>
          </div>
        </div>
      </div>`;
  }
  html += `</div>`;
  return html;
}

async function toggleExerciseDone(exerciseId, dateStr) {
  const date = dateStr || todayStr();
  const logs = await dbGetByIndex('workoutLogs', 'date', date);
  const existing = logs.find(l => l.exerciseId === exerciseId);
  if (existing) {
    existing.completed = !existing.completed;
    existing.completedAt = existing.completed ? new Date().toISOString() : null;
    await dbPut('workoutLogs', existing);
  } else {
    await dbAdd('workoutLogs', { date, exerciseId, completed: true, completedAt: new Date().toISOString() });
  }
  scheduleCloudSync();
}

let currentScheduleWeek = null;

async function renderSchedule() {
  const view = document.getElementById('view-schedule');
  const { weekNum: nowWeek } = await getCurrentWeekDay();
  if (!currentScheduleWeek) currentScheduleWeek = nowWeek;
  
  let html = `<div class="week-selector">`;
  WEEKS.forEach(w => {
    const isActive = w.weekNum === currentScheduleWeek;
    const isCurrent = w.weekNum === nowWeek;
    html += `<button class="week-btn ${isActive ? 'active' : ''} ${isCurrent ? 'current' : ''}" onclick="selectWeek(${w.weekNum})">Week ${w.weekNum}</button>`;
  });
  html += `</div>`;
  
  const weekData = getWeekData(currentScheduleWeek);
  if (!weekData) {
    view.innerHTML = html + `<div class="empty">该周数据未配置</div>`;
    return;
  }
  
  html += `
    <div class="section-title">
      <span>${weekData.phase}</span>
      <span class="section-title-cn">Week ${weekData.weekNum}</span>
    </div>`;
  
  if (weekData.note) {
    html += `<div class="card" style="border-color: var(--warn); background: rgba(196,125,74,0.05); margin-bottom: 16px;">
      <div style="font-size: 13px; color: var(--text-1);">${escHtml(weekData.note)}</div>
    </div>`;
  }
  
  weekData.days.forEach(day => {
    const typeIcon = day.dayType === 'training' ? '💪' : day.dayType === 'recovery' ? '🌿' : '😴';
    let exerciseList = '';
    if (day.groups) {
      const exs = [];
      day.groups.forEach(g => g.exercises.forEach(ex => exs.push(`${ex.name} ${ex.weight || ''}`)));
      exerciseList = exs.join(' · ');
    } else {
      exerciseList = day.description || '';
    }
    
    html += `
      <div class="day-card">
        <div class="day-header">
          <div>
            <div class="day-name">${typeIcon} ${day.dayName}</div>
            <div class="day-title">${escHtml(day.title)}</div>
          </div>
        </div>
        <div class="day-body">${escHtml(exerciseList)}</div>
      </div>`;
  });
  
  view.innerHTML = html;
}

function selectWeek(num) {
  currentScheduleWeek = num;
  renderSchedule();
}

async function renderHabits() {
  const view = document.getElementById('view-habits');
  const today = todayStr();
  const todayHabits = await dbGet('dailyHabits', today) || { date: today, habits: {}, counters: {} };
  
  let html = `
    <div class="today-header">
      <div class="today-date">${today}</div>
      <div class="today-title">微习惯 · 今日</div>
      <div class="today-meta"><span>「22 小时生活决定 2 小时训练的效果」</span></div>
    </div>
    <div class="section-title"><span>勾选项</span></div>
    <div class="habit-grid">`;
  
  HABITS.toggle.forEach(habit => {
    const checked = todayHabits.habits[habit.id];
    html += `
      <div class="habit-card ${checked ? 'checked' : ''}" onclick="toggleHabit('${habit.id}')">
        <div class="habit-icon">${habit.icon}</div>
        <div class="habit-name">${habit.name}</div>
      </div>`;
  });
  html += `</div>`;
  
  html += `<div class="section-title"><span>计数项</span></div>`;
  HABITS.counter.forEach(habit => {
    const count = todayHabits.counters[habit.id] || 0;
    html += `
      <div class="habit-counter">
        <div>
          <div class="habit-counter-name">${habit.name}</div>
          <div class="text-small text-dim">目标:${habit.target} ${habit.unit}</div>
        </div>
        <div class="habit-counter-controls">
          <button class="habit-counter-btn" onclick="changeCounter('${habit.id}', -1)">−</button>
          <div class="habit-counter-num">${count}</div>
          <button class="habit-counter-btn" onclick="changeCounter('${habit.id}', 1)">+</button>
        </div>
      </div>`;
  });
  
  html += `<div class="spacer-lg"></div><div class="section-title"><span>本周完成</span></div>`;
  const weekDays = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    weekDays.push(fmtDate(d));
  }
  const weekData = await Promise.all(weekDays.map(d => dbGet('dailyHabits', d)));
  const weekDataNorm = weekData.map(d => d || { habits: {}, counters: {} });
  let weekTotal = 0, weekDone = 0;
  weekDataNorm.forEach(d => {
    weekTotal += HABITS.toggle.length;
    HABITS.toggle.forEach(h => { if (d.habits[h.id]) weekDone++; });
  });
  const weekPct = weekTotal > 0 ? Math.round(weekDone / weekTotal * 100) : 0;
  
  html += `
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
          <div style="font-size: 13px; color: var(--text-1);">本周勾选项完成率</div>
          <div style="font-size: 11px; color: var(--text-3); margin-top: 2px;">目标 ≥ 80%</div>
        </div>
        <div class="progress-summary-num" style="color: ${weekPct >= 80 ? 'var(--good)' : weekPct >= 60 ? 'var(--accent)' : 'var(--warn)'};">${weekPct}%</div>
      </div>
    </div>`;
  
  view.innerHTML = html;
}

async function toggleHabit(habitId) {
  const today = todayStr();
  let data = await dbGet('dailyHabits', today) || { date: today, habits: {}, counters: {} };
  data.habits[habitId] = !data.habits[habitId];
  await dbPut('dailyHabits', data);
  renderHabits();
}

async function changeCounter(habitId, delta) {
  const today = todayStr();
  let data = await dbGet('dailyHabits', today) || { date: today, habits: {}, counters: {} };
  data.counters[habitId] = Math.max(0, (data.counters[habitId] || 0) + delta);
  await dbPut('dailyHabits', data);
  renderHabits();
}

// ============================================================
async function renderMetrics() {
  const view = document.getElementById('view-metrics');
  const today = todayStr();
  const allMetrics = await dbGetAll('bodyMetrics');
  
  let html = `
    <div class="today-header">
      <div class="today-date">${today}</div>
      <div class="today-title">体测数据</div>
    </div>
    <div class="card">
      <div style="font-size: 13px; color: var(--text-1); margin-bottom: 12px;">添加新数据</div>
      <select id="metric-select" style="margin-bottom: 8px;">
        ${METRICS.map(m => `<option value="${m.id}">${m.name} (${m.unit})</option>`).join('')}
      </select>
      <div class="metric-input-row">
        <input type="number" id="metric-value" placeholder="数值" step="0.1">
        <button class="btn-primary" onclick="addMetric()">保存</button>
      </div>
      <div class="text-small text-dim" id="metric-tip">${METRICS[0].tip}</div>
    </div>
    <div class="spacer-lg"></div>
    <div class="section-title"><span>最新数据</span></div>`;
  
  for (const metric of METRICS) {
    const records = allMetrics.filter(r => r.metricId === metric.id);
    if (records.length === 0) continue;
    records.sort((a, b) => new Date(b.date) - new Date(a.date));
    const latest = records[0];
    const previous = records[1];
    let changeHtml = '';
    if (previous) {
      const change = latest.value - previous.value;
      const sign = change > 0 ? '+' : '';
      const color = change > 0 ? 'var(--good)' : change < 0 ? 'var(--bad)' : 'var(--text-2)';
      changeHtml = `<span style="font-size: 11px; color: ${color}; margin-left: 6px;">${sign}${change.toFixed(1)}</span>`;
    }
    html += `
      <div class="metric-card">
        <div>
          <div class="metric-name">${metric.name}</div>
          <div class="text-small text-dim">${fmtDate(latest.date)} · ${records.length} 条记录</div>
        </div>
        <div class="metric-value">${latest.value} <small style="color: var(--text-3);">${metric.unit}</small>${changeHtml}</div>
      </div>`;
  }
  
  if (allMetrics.length === 0) html += `<div class="empty">暂无数据，先添加一条吧</div>`;
  view.innerHTML = html;
  
  document.getElementById('metric-select').addEventListener('change', (e) => {
    const metric = METRICS.find(m => m.id === e.target.value);
    document.getElementById('metric-tip').textContent = metric.tip;
  });
}

function drawBarChart(canvasId, labels, data) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);
  const padding = { top: 10, right: 10, bottom: 20, left: 20 };
  const cw = w - padding.left - padding.right;
  const ch = h - padding.top - padding.bottom;
  const max = Math.max(...data, 1);
  const barW = cw / data.length * 0.7;
  const gap = cw / data.length * 0.3;
  data.forEach((val, i) => {
    const x = padding.left + i * (cw / data.length) + gap / 2;
    const bh = (val / max) * ch;
    const y = padding.top + ch - bh;
    ctx.fillStyle = val > 0 ? '#d4af37' : '#2d2d2d';
    ctx.fillRect(x, y, barW, bh || 1);
  });
  ctx.fillStyle = '#6e6a62';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'center';
  [0, Math.floor(data.length/2), data.length-1].forEach(i => {
    const x = padding.left + i * (cw / data.length) + (cw / data.length) / 2;
    ctx.fillText(labels[i], x, h - 6);
  });
}

function drawLineChart(canvasId, labels, data) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);
  const padding = { top: 10, right: 10, bottom: 20, left: 30 };
  const cw = w - padding.left - padding.right;
  const ch = h - padding.top - padding.bottom;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  ctx.strokeStyle = '#2d2d2d';
  ctx.lineWidth = 1;
  for (let i = 0; i < 4; i++) {
    const y = padding.top + (ch / 3) * i;
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(padding.left + cw, y);
    ctx.stroke();
  }
  ctx.strokeStyle = '#d4af37';
  ctx.lineWidth = 2;
  ctx.beginPath();
  data.forEach((val, i) => {
    const x = padding.left + (cw / Math.max(data.length - 1, 1)) * i;
    const y = padding.top + ch - ((val - min) / range) * ch;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();
  ctx.fillStyle = '#d4af37';
  data.forEach((val, i) => {
    const x = padding.left + (cw / Math.max(data.length - 1, 1)) * i;
    const y = padding.top + ch - ((val - min) / range) * ch;
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.fillStyle = '#6e6a62';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(max.toFixed(1), padding.left - 4, padding.top + 4);
  ctx.fillText(min.toFixed(1), padding.left - 4, padding.top + ch);
  ctx.textAlign = 'center';
  if (labels.length > 0) {
    ctx.fillText(labels[0], padding.left, h - 4);
    ctx.fillText(labels[labels.length - 1], padding.left + cw, h - 4);
  }
}

// ============================================================
// 云同步（Supabase）—— 训练完成 / 联网时自动推送整份数据快照
// 配置（同步地址 + 密钥）只存本地设置，不写入源码（本仓库公开）
// ============================================================
let _syncTimer = null;
let _syncing = false;
let _syncDirty = false;

async function assembleSyncPayload() {
  // 与 exportJSON 同构，但不含 media blob（体积大，远端分析用不上），
  // 且剔除 syncSecret，避免把密钥本身推上云
  return {
    exportedAt: new Date().toISOString(),
    appVersion: '9.2',
    workoutLogs: await dbGetAll('workoutLogs'),
    exerciseNotes: await dbGetAll('exerciseNotes'),
    dailyHabits: await dbGetAll('dailyHabits'),
    bodyMetrics: await dbGetAll('bodyMetrics'),
    settings: (await dbGetAll('settings')).filter(s => s.key !== 'syncSecret'),
    aiAnalysis: await dbGetAll('aiAnalysis')
  };
}

async function syncToCloud({ silent = true } = {}) {
  const url = await getSetting('syncUrl');
  const secret = await getSetting('syncSecret');
  if (!url || !secret) { if (!silent) showToast('请先填写同步地址和密钥'); return; }
  if (!navigator.onLine) { _syncDirty = true; if (!silent) showToast('当前离线，联网后会自动同步'); return; }
  if (_syncing) return;
  _syncing = true;
  try {
    const payload = await assembleSyncPayload();
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${secret}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    _syncDirty = false;
    await setSetting('lastSyncAt', new Date().toISOString());
    updateSyncStatus();
    if (!silent) showToast('✓ 已同步到云端');
  } catch (e) {
    _syncDirty = true;
    console.error('云同步失败', e);
    if (!silent) showToast('同步失败: ' + e.message);
  } finally {
    _syncing = false;
  }
}

// 防抖：训练完成/记录后 8 秒内无新动作再推，避免连点狂发请求
function scheduleCloudSync() {
  _syncDirty = true;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(() => syncToCloud({ silent: true }), 8000);
}

async function saveSyncConfig() {
  const url = document.getElementById('sync-url-input')?.value.trim() || '';
  const secret = document.getElementById('sync-secret-input')?.value.trim() || '';
  await setSetting('syncUrl', url);
  await setSetting('syncSecret', secret);
  showToast(url && secret ? '✓ 云同步已配置' : '云同步已清除');
  if (url && secret) syncToCloud({ silent: false });
}

async function updateSyncStatus() {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const url = await getSetting('syncUrl');
  if (!url) { el.innerHTML = ''; return; }
  const last = await getSetting('lastSyncAt');
  el.innerHTML = last
    ? `<div style="margin-top: 8px; font-size: 12px; color: var(--good);">✓ 上次同步: ${new Date(last).toLocaleString()}</div>`
    : `<div style="margin-top: 8px; font-size: 12px; color: var(--text-2);">尚未同步</div>`;
}

// 联网恢复 / 切到后台时补推
window.addEventListener('online', () => { if (_syncDirty) syncToCloud({ silent: true }); });
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden' && _syncDirty) { clearTimeout(_syncTimer); syncToCloud({ silent: true }); }
});

async function saveAIConfig() {
  const providerSelect = document.getElementById('ai-provider-select');
  const keyInput = document.getElementById('api-key-input');
  const modelInput = document.getElementById('ai-model-input');
  if (!providerSelect || !keyInput) return;

  const providerId = providerSelect.value;
  const key = keyInput.value.trim();
  const model = modelInput?.value.trim() || '';
  const provider = AI_PROVIDERS[providerId];

  if (key && provider.keyPrefix && !key.startsWith(provider.keyPrefix)) {
    showToast(`该接入商的 Key 应以 ${provider.keyPrefix} 开头`);
    return;
  }

}

let currentNoteExerciseId = null;
let currentNoteExerciseName = '';
let currentNoteMedia = [];

const FEEL_OPTIONS = [
  { id: 'easy', label: '💪轻松', emoji: '💪' },
  { id: 'normal', label: '✅正常', emoji: '✅' },
  { id: 'hard', label: '😤勉强', emoji: '😤' },
  { id: 'fail', label: '❌未完成', emoji: '❌' }
];

function findExerciseById(exerciseId) {
  if (!exerciseId) return null;
  let ex = PLAN_DATA.morningTemplate.exercises.find(e => e.id === exerciseId);
  if (ex) return ex;
  ex = PLAN_DATA.warmupTemplate.exercises.find(e => e.id === exerciseId);
  if (ex) return ex;
  for (const week of WEEKS) {
    for (const day of week.days) {
      if (day.groups) {
        for (const group of day.groups) {
          ex = group.exercises.find(e => e.id === exerciseId);
          if (ex) return ex;
        }
      }
    }
  }
  return null;
}

function parsePlannedSets(setsStr, exData) {
  if (!setsStr) return { count: 1, type: 'reps' };
  // "3×10"、"3×8-10"、"2×15" 等标准组×次格式
  const repsMatch = setsStr.match(/(\d+)\s*[×x]\s*(\d+)/);
  if (repsMatch) {
    // 检查是否含时间单位（如 "2×20-30s/侧"）
    if (/s\/|秒/.test(setsStr)) return { count: parseInt(repsMatch[1]), type: 'time', unit: '秒' };
    return { count: parseInt(repsMatch[1]), defaultVal: parseInt(repsMatch[2]), type: 'reps' };
  }
  // "3×力竭" — 根据 tip/weight 推断是时间型还是次数型
  const failMatch = setsStr.match(/(\d+)\s*[×x]\s*力竭/);
  if (failMatch) {
    const tip = (exData && exData.tip) || '';
    const isTimeHint = /s\b|秒|时[间长]/.test(tip);
    const isHold = /悬|挂|支撑|hold|hang/i.test((exData && exData.name) || '');
    return { count: parseInt(failMatch[1]), type: (isTimeHint || isHold) ? 'time' : 'reps' };
  }
  // 时间格式
  const minMatch = setsStr.match(/(\d+)\s*min/i);
  if (minMatch) return { count: 1, defaultVal: parseInt(minMatch[1]), type: 'time', unit: '分' };
  const secMatch = setsStr.match(/(\d+)\s*s(?:ec|\/)?/i);
  if (secMatch) return { count: 1, defaultVal: parseInt(secMatch[1]), type: 'time', unit: '秒' };
  const cnTimeMatch = setsStr.match(/(\d+)\s*(秒|分钟?)/);
  if (cnTimeMatch) return { count: 1, defaultVal: parseInt(cnTimeMatch[1]), type: 'time', unit: cnTimeMatch[2].startsWith('分') ? '分' : '秒' };
  // "每侧60s" 等
  const perSideTime = setsStr.match(/每侧\s*(\d+)\s*s/i);
  if (perSideTime) return { count: 1, defaultVal: parseInt(perSideTime[1]), type: 'time', unit: '秒' };
  return { count: 1, type: 'reps' };
}

function buildSetRowHtml(index, type) {
  const isTime = type === 'time';
  const feelBtns = FEEL_OPTIONS.map(f =>
    `<button class="feel-btn" data-feel="${f.id}" data-set="${index}" onclick="selectFeel(${index},'${f.id}')">${f.label}</button>`
  ).join('');

  if (isTime) {
    return `<div class="set-row" data-set-index="${index}">
      <div class="set-row-top">
        <span class="set-row-label">第${index + 1}组</span>
        <input type="number" class="set-duration" placeholder="—" inputmode="decimal" min="0" step="1">
        <span class="set-row-unit clickable" onclick="toggleTimeUnit(this)">秒</span>
      </div>
      <div class="feel-picker">${feelBtns}</div>
    </div>`;
  }

  return `<div class="set-row" data-set-index="${index}">
    <div class="set-row-top">
      <span class="set-row-label">第${index + 1}组</span>
      <input type="number" class="set-weight" placeholder="—" inputmode="decimal" min="0" step="0.5">
      <span class="set-row-unit">kg</span>
      <span class="set-row-sep">×</span>
      <input type="number" class="set-reps" placeholder="—" inputmode="numeric" min="0" step="1">
      <span class="set-row-unit">次</span>
    </div>
    <div class="feel-picker">${feelBtns}</div>
  </div>`;
}

function selectFeel(setIndex, feelId) {
  const row = document.querySelector(`.set-row[data-set-index="${setIndex}"]`);
  if (!row) return;
  row.querySelectorAll('.feel-btn').forEach(b => b.classList.toggle('selected', b.dataset.feel === feelId));
}

function toggleTimeUnit(el) {
  el.textContent = el.textContent === '秒' ? '分' : '秒';
}

function addSetRow() {
  const container = document.getElementById('set-rows-container');
  if (!container) return;
  const count = container.querySelectorAll('.set-row').length;
  const isTime = container.dataset.type === 'time';
  container.insertAdjacentHTML('beforeend', buildSetRowHtml(count, isTime ? 'time' : 'reps'));
}

function removeSetRow() {
  const container = document.getElementById('set-rows-container');
  if (!container) return;
  const rows = container.querySelectorAll('.set-row');
  if (rows.length > 1) rows[rows.length - 1].remove();
}

function collectStructuredSets() {
  const container = document.getElementById('set-rows-container');
  if (!container) return [];
  const rows = container.querySelectorAll('.set-row');
  const sets = [];
  rows.forEach((row, i) => {
    const weightEl = row.querySelector('.set-weight');
    const repsEl = row.querySelector('.set-reps');
    const durationEl = row.querySelector('.set-duration');
    const unitEl = row.querySelector('.set-row-unit.clickable');
    const feelBtn = row.querySelector('.feel-btn.selected');

    const entry = { set: i + 1 };
    if (weightEl && weightEl.value) entry.weight = parseFloat(weightEl.value);
    if (repsEl && repsEl.value) entry.reps = parseInt(repsEl.value);
    if (durationEl && durationEl.value) {
      entry.duration = parseFloat(durationEl.value);
      entry.unit = unitEl ? unitEl.textContent : '秒';
    }
    if (feelBtn) entry.feel = feelBtn.dataset.feel;

    if (entry.weight !== undefined || entry.reps !== undefined || entry.duration !== undefined || entry.feel) {
      sets.push(entry);
    }
  });
  return sets;
}

function setsToText(sets) {
  if (!sets || sets.length === 0) return '';
  const feelMap = { easy: '💪轻松', normal: '✅正常', hard: '😤勉强', fail: '❌未完成' };
  return sets.map(s => {
    let line = `第${s.set}组: `;
    if (s.duration !== undefined) {
      line += `${s.duration}${s.unit || '秒'}`;
    } else {
      if (s.weight !== undefined) line += `${s.weight}kg`;
      if (s.weight !== undefined && s.reps !== undefined) line += ' × ';
      if (s.reps !== undefined) line += `${s.reps}次`;
    }
    if (s.feel) line += ` ${feelMap[s.feel] || s.feel}`;
    return line;
  }).join('\n');
}

function formatNoteDisplay(note) {
  if (note.sets && note.sets.length > 0) {
    let html = '<div class="note-sets-display">';
    const feelMap = { easy: '💪', normal: '✅', hard: '😤', fail: '❌' };
    note.sets.forEach(s => {
      let val = '';
      if (s.duration !== undefined) {
        val = `${s.duration}${s.unit || '秒'}`;
      } else {
        if (s.weight !== undefined) val += `${s.weight}kg`;
        if (s.weight !== undefined && s.reps !== undefined) val += ' × ';
        if (s.reps !== undefined) val += `${s.reps}次`;
      }
      const feel = s.feel ? `<span class="note-set-feel">${feelMap[s.feel] || ''}</span>` : '';
      html += `<div class="note-set-line"><span>第${s.set}组</span> <span>${val}</span> ${feel}</div>`;
    });
    html += '</div>';
    if (note.freeNote) html += `<div class="note-free-text">${escHtml(note.freeNote)}</div>`;
    return html;
  }
  return `<div class="note-item-text">${escHtml(note.text)}</div>`;
}

        </div>
      </div>

      <textarea id="note-input" class="note-input" placeholder="补充说明（可选）..." oninput="autoGrowTextarea(this)"></textarea>
      <div class="media-upload-row">

    </div>

    <div class="note-list" id="note-list">
      ${notes.length === 0 ? '<div class="empty">还没有记录，创建第一条吧</div>' : ''}
    </div>`;

  document.getElementById('note-modal-body').innerHTML = html;

async function renderNoteHistory(notes) {
  const listEl = document.getElementById('note-list');
  if (!listEl || notes.length === 0) return;

  // 按日期分组
  const dayGroups = new Map();
  for (const note of notes) {
    const dayKey = note.createdAt ? note.createdAt.slice(0, 10) : 'unknown';
    if (!dayGroups.has(dayKey)) dayGroups.set(dayKey, []);
    dayGroups.get(dayKey).push(note);
  }

  for (const [dayKey, dayNotes] of dayGroups) {
    const groupEl = document.createElement('div');
    groupEl.className = 'note-day-group';

    // 来源 Week 标签
    let originTag = '';
    const firstWithId = dayNotes.find(n => n.exerciseId);
    if (firstWithId) {
      const m = firstWithId.exerciseId.match(/^w(\d+)-/);
      if (m) originTag = `<span class="note-origin-tag">Week ${m[1]}</span>`;
    }

    if (dayGroups.size > 1 || dayNotes.length > 1) {
      const headerEl = document.createElement('div');
      headerEl.className = 'note-day-header';
      headerEl.innerHTML = `<span>${fmtDate(dayKey)} ${originTag}</span><span>${dayNotes.length > 1 ? dayNotes.length + ' 条' : ''}</span>`;
      groupEl.appendChild(headerEl);
    }

    for (const note of dayNotes) {
      const noteEl = document.createElement('div');
      noteEl.className = 'note-item';
      const mediaItems = await dbGetByIndex('media', 'noteId', note.id);
      let mediaHtml = '';
      if (mediaItems.length > 0) {
        mediaHtml = '<div class="note-item-media">';
        for (const m of mediaItems) {
          const url = URL.createObjectURL(m.blob);
          if (m.type === 'image') {
            mediaHtml += `<div class="note-item-media-thumb" onclick="viewMedia('image', '${url}')"><img src="${url}" alt=""></div>`;
          } else {
            mediaHtml += `<div class="note-item-media-thumb" onclick="viewMedia('video', '${url}')"><video src="${url}" muted></video><div class="video-tag">视频</div></div>`;
          }
        }
        mediaHtml += '</div>';
      }
      const showSingleOrigin = dayGroups.size <= 1 && dayNotes.length <= 1;
      let singleOriginTag = '';
      if (showSingleOrigin && note.exerciseId) {
        const m2 = note.exerciseId.match(/^w(\d+)-/);
        if (m2) singleOriginTag = `<span class="note-origin-tag">Week ${m2[1]}</span>`;
      }
      const timeStr = dayNotes.length > 1 ? fmtTime(note.createdAt) : fmtDateTime(note.createdAt);
      noteEl.innerHTML = `
        <div class="note-item-header">
          <div class="note-item-date">${timeStr} ${singleOriginTag}</div>
          <div class="note-item-delete" onclick="deleteNote(${note.id})">删除</div>
        </div>
        ${formatNoteDisplay(note)}
        ${mediaHtml}`;
      groupEl.appendChild(noteEl);
    }
    listEl.appendChild(groupEl);
  }
}

function selectTemplate(templateId) {
  const template = NOTE_TEMPLATES.find(t => t.id === templateId);
  if (!template) return;
  document.querySelectorAll('.template-btn').forEach(b => b.classList.toggle('active', b.dataset.template === templateId));
  const textarea = document.getElementById('note-input');
