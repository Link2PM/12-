  const saveBtn = document.querySelector('button[onclick="saveAIConfig()"]');
  if (!providerSelect || !keyInput) return;

  const providerId = providerSelect.value;
  const key = keyInput.value.trim();
  const model = modelInput?.value.trim() || '';
  const provider = AI_PROVIDERS[providerId];

  const setStatus = (html) => { if (statusEl) statusEl.innerHTML = html; };

  // 清空 Key：直接保存（无需校验）
  if (!key) {
    await setSetting('aiProvider', providerId);
    await setSetting('aiApiKey', '');
    await setSetting('aiModel', model);
    setStatus('');
    showToast('API Key 已清除');
    renderSettings();
    return;
  }

  if (provider.keyPrefix && !key.startsWith(provider.keyPrefix)) {
    setStatus(`<div style="margin-top:10px;color:var(--bad);font-size:12px;">该接入商的 Key 应以 ${escHtml(provider.keyPrefix)} 开头</div>`);
    return;
  }

  // 校验中：禁用按钮 + 提示
  if (saveBtn) { saveBtn.disabled = true; saveBtn.style.opacity = '0.6'; }
  setStatus('<div style="margin-top:10px;color:var(--text-2);font-size:12px;">⏳ 正在校验 API 可用性…</div>');

  const result = await validateAIConfig(providerId, key, model);

  if (saveBtn) { saveBtn.disabled = false; saveBtn.style.opacity = '1'; }

  if (!result.ok) {
    // 校验失败：不保存，显示原因
    setStatus(`<div style="margin-top:10px;color:var(--bad);font-size:12px;line-height:1.6;">❌ 未保存：${escHtml(result.msg)}</div>`);
    showToast('API 校验未通过，未保存');
    return;
  }

  // 校验通过：保存
  await setSetting('aiProvider', providerId);
  await setSetting('aiApiKey', key);
  await setSetting('aiModel', model);
  setStatus(`<div style="margin-top:10px;color:var(--good);font-size:12px;line-height:1.6;">✅ ${escHtml(result.warn || provider.name + ' 校验通过，配置已保存')}</div>`);
  showToast(result.warn ? '已保存（有提示）' : `${provider.name} 配置已保存`);
}

function findExerciseById(exerciseId) {
  if (!exerciseId) return null;
  let ex = PLAN_DATA.morningTemplate.exercises.find(e => e.id === exerciseId);
  if (ex) return ex;
  ex = PLAN_DATA.warmupTemplate.exercises.find(e => e.id === exerciseId);
  if (ex) return ex;
  for (const week of WEEKS) {
    for (const day of week.days) {
      if (day.groups) {
        for (const group of day.groups) {
          ex = group.exercises.find(e => e.id === exerciseId);
          if (ex) return ex;
        }
      }
    }
  }
  return null;
}

function parsePlannedSets(setsStr, exData) {
  if (!setsStr) return { count: 1, type: 'reps' };
  // "3×10"、"3×8-10"、"2×15" 等标准组×次格式
  const repsMatch = setsStr.match(/(\d+)\s*[×x]\s*(\d+)/);
  if (repsMatch) {
    // 检查是否含时间单位（如 "2×20-30s/侧"）
    if (/s\/|秒/.test(setsStr)) return { count: parseInt(repsMatch[1]), type: 'time', unit: '秒' };
    return { count: parseInt(repsMatch[1]), defaultVal: parseInt(repsMatch[2]), type: 'reps' };
  }
  // "3×力竭" — 根据 tip/weight 推断是时间型还是次数型
  const failMatch = setsStr.match(/(\d+)\s*[×x]\s*力竭/);
  if (failMatch) {
    const tip = (exData && exData.tip) || '';
    const isTimeHint = /s\b|秒|时[间长]/.test(tip);
    const isHold = /悬|挂|支撑|hold|hang/i.test((exData && exData.name) || '');
    return { count: parseInt(failMatch[1]), type: (isTimeHint || isHold) ? 'time' : 'reps' };
  }
  // 时间格式
  const minMatch = setsStr.match(/(\d+)\s*min/i);
  if (minMatch) return { count: 1, defaultVal: parseInt(minMatch[1]), type: 'time', unit: '分' };
  const secMatch = setsStr.match(/(\d+)\s*s(?:ec|\/)?/i);
  if (secMatch) return { count: 1, defaultVal: parseInt(secMatch[1]), type: 'time', unit: '秒' };
  const cnTimeMatch = setsStr.match(/(\d+)\s*(秒|分钟?)/);
  if (cnTimeMatch) return { count: 1, defaultVal: parseInt(cnTimeMatch[1]), type: 'time', unit: cnTimeMatch[2].startsWith('分') ? '分' : '秒' };
  // "每侧60s" 等
  const perSideTime = setsStr.match(/每侧\s*(\d+)\s*s/i);
  if (perSideTime) return { count: 1, defaultVal: parseInt(perSideTime[1]), type: 'time', unit: '秒' };
  return { count: 1, type: 'reps' };
}

function buildSetRowHtml(index, type) {

    `<button class="feel-btn" data-feel="${f.id}" data-set="${index}" onclick="selectFeel(${index},'${f.id}')">${f.label}</button>`
  ).join('');

  if (isTime) {
    return `<div class="set-row" data-set-index="${index}">
      <div class="set-row-top">
        <span class="set-row-label">第${index + 1}组</span>
        <input type="number" class="set-duration" placeholder="—" inputmode="decimal" min="0" step="1">
        <span class="set-row-unit clickable" onclick="toggleTimeUnit(this)">秒</span>
      </div>
      <div class="feel-picker">${feelBtns}</div>
    </div>`;
  }

  return `<div class="set-row" data-set-index="${index}">
    <div class="set-row-top">
      <span class="set-row-label">第${index + 1}组</span>
      <input type="number" class="set-weight" placeholder="—" inputmode="decimal" min="0" step="0.5">
      <span class="set-row-unit">kg</span>
      <span class="set-row-sep">×</span>

  </div>`;
}

}

function toggleTimeUnit(el) {
  el.textContent = el.textContent === '秒' ? '分' : '秒';
}

function addSetRow() {
  const container = document.getElementById('set-rows-container');
  if (!container) return;
  const count = container.querySelectorAll('.set-row').length;
  const isTime = container.dataset.type === 'time';
  container.insertAdjacentHTML('beforeend', buildSetRowHtml(count, isTime ? 'time' : 'reps'));
}

function removeSetRow() {
  const container = document.getElementById('set-rows-container');
  if (!container) return;
  const rows = container.querySelectorAll('.set-row');
  if (rows.length > 1) rows[rows.length - 1].remove();
}

function collectStructuredSets() {
  const container = document.getElementById('set-rows-container');
  if (!container) return [];
  const rows = container.querySelectorAll('.set-row');
  const sets = [];
  rows.forEach((row, i) => {
    const weightEl = row.querySelector('.set-weight');
    const repsEl = row.querySelector('.set-reps');
    const durationEl = row.querySelector('.set-duration');
    const unitEl = row.querySelector('.set-row-unit.clickable');
    const feelBtn = row.querySelector('.feel-btn.selected');

    const entry = { set: i + 1 };
    if (weightEl && weightEl.value) entry.weight = parseFloat(weightEl.value);
    if (repsEl && repsEl.value) entry.reps = parseInt(repsEl.value);
    if (durationEl && durationEl.value) {
      entry.duration = parseFloat(durationEl.value);
      entry.unit = unitEl ? unitEl.textContent : '秒';
    }
    if (feelBtn) entry.feel = feelBtn.dataset.feel;

    if (entry.weight !== undefined || entry.reps !== undefined || entry.duration !== undefined || entry.feel) {
      sets.push(entry);
    }
  });
  return sets;
}

function setsToText(sets) {
  if (!sets || sets.length === 0) return '';
  const feelMap = { easy: '💪轻松', normal: '✅正常', hard: '😤勉强', fail: '❌未完成' };
  return sets.map(s => {
    let line = `第${s.set}组: `;
    if (s.duration !== undefined) {
      line += `${s.duration}${s.unit || '秒'}`;
    } else {
      if (s.weight !== undefined) line += `${s.weight}kg`;
      if (s.weight !== undefined && s.reps !== undefined) line += ' × ';
      if (s.reps !== undefined) line += `${s.reps}次`;
    }
    if (s.feel) line += ` ${feelMap[s.feel] || s.feel}`;
    return line;
  }).join('\n');
}

function formatNoteDisplay(note) {
  if (note.sets && note.sets.length > 0) {
    let html = '<div class="note-sets-display">';
    const feelMap = { easy: '💪', normal: '✅', hard: '😤', fail: '❌' };
    note.sets.forEach(s => {
      let val = '';
      if (s.duration !== undefined) {
        val = `${s.duration}${s.unit || '秒'}`;
      } else {
        if (s.weight !== undefined) val += `${s.weight}kg`;
        if (s.weight !== undefined && s.reps !== undefined) val += ' × ';
        if (s.reps !== undefined) val += `${s.reps}次`;
      }
      const feel = s.feel ? `<span class="note-set-feel">${feelMap[s.feel] || ''}</span>` : '';
      html += `<div class="note-set-line"><span>第${s.set}组</span> <span>${val}</span> ${feel}</div>`;
    });
    html += '</div>';
    if (note.freeNote) html += `<div class="note-free-text">${escHtml(note.freeNote)}</div>`;
    return html;
  }
  return `<div class="note-item-text">${escHtml(note.text)}</div>`;
}

async function renderNoteHistory(notes) {
  const listEl = document.getElementById('note-list');
  if (!listEl || notes.length === 0) return;

  // 按日期分组
  const dayGroups = new Map();
  for (const note of notes) {
    const dayKey = note.createdAt ? note.createdAt.slice(0, 10) : 'unknown';
    if (!dayGroups.has(dayKey)) dayGroups.set(dayKey, []);
    dayGroups.get(dayKey).push(note);
  }

  for (const [dayKey, dayNotes] of dayGroups) {
    const groupEl = document.createElement('div');
    groupEl.className = 'note-day-group';

    // 来源 Week 标签
    let originTag = '';
    const firstWithId = dayNotes.find(n => n.exerciseId);
    if (firstWithId) {
      const m = firstWithId.exerciseId.match(/^w(\d+)-/);
      if (m) originTag = `<span class="note-origin-tag">Week ${m[1]}</span>`;
    }

    if (dayGroups.size > 1 || dayNotes.length > 1) {
      const headerEl = document.createElement('div');
      headerEl.className = 'note-day-header';
      headerEl.innerHTML = `<span>${fmtDate(dayKey)} ${originTag}</span><span>${dayNotes.length > 1 ? dayNotes.length + ' 条' : ''}</span>`;
      groupEl.appendChild(headerEl);
    }

    for (const note of dayNotes) {
      const noteEl = document.createElement('div');
      noteEl.className = 'note-item';
      const mediaItems = await dbGetByIndex('media', 'noteId', note.id);
      let mediaHtml = '';
      if (mediaItems.length > 0) {
        mediaHtml = '<div class="note-item-media">';
        for (const m of mediaItems) {
          const url = URL.createObjectURL(m.blob);
          if (m.type === 'image') {
            mediaHtml += `<div class="note-item-media-thumb" onclick="viewMedia('image', '${url}')"><img src="${url}" alt=""></div>`;
          } else {
            mediaHtml += `<div class="note-item-media-thumb" onclick="viewMedia('video', '${url}')"><video src="${url}" muted></video><div class="video-tag">视频</div></div>`;
          }
        }
        mediaHtml += '</div>';
      }
      const showSingleOrigin = dayGroups.size <= 1 && dayNotes.length <= 1;
      let singleOriginTag = '';
      if (showSingleOrigin && note.exerciseId) {
        const m2 = note.exerciseId.match(/^w(\d+)-/);
        if (m2) singleOriginTag = `<span class="note-origin-tag">Week ${m2[1]}</span>`;
      }
      const timeStr = dayNotes.length > 1 ? fmtTime(note.createdAt) : fmtDateTime(note.createdAt);
      noteEl.innerHTML = `
        <div class="note-item-header">
          <div class="note-item-date">${timeStr} ${singleOriginTag}</div>
          <div class="note-item-delete" onclick="deleteNote(${note.id})">删除</div>
        </div>
        ${formatNoteDisplay(note)}
        ${mediaHtml}`;
      groupEl.appendChild(noteEl);
    }
    listEl.appendChild(groupEl);
  }
}

function handleMediaUpload(event, type) {
  const files = event.target.files;
  for (const file of files) {
    const reader = new FileReader();
    reader.onload = (e) => {
      currentNoteMedia.push({ type, blob: file, dataUrl: e.target.result });
      renderMediaPreview();
    };
    reader.readAsDataURL(file);
  }
  event.target.value = '';
}

function renderMediaPreview() {
  const preview = document.getElementById('media-preview');
  preview.innerHTML = currentNoteMedia.map((m, i) => `
    <div class="media-preview-item">
      ${m.type === 'image' ? `<img src="${m.dataUrl}" alt="">` : `<video src="${m.dataUrl}" muted></video><div class="video-tag">视频</div>`}
      <div class="media-preview-remove" onclick="removeMedia(${i})">×</div>
    </div>`).join('');
}

function removeMedia(idx) {
  currentNoteMedia.splice(idx, 1);
  renderMediaPreview();
}

// ===== AI 分析输入框的媒体处理 =====
function handleAIMediaUpload(event, type) {
  const files = event.target.files;
  for (const file of files) {
    // 体积保护：图片 >10MB / 视频 >20MB 时提示（base64 会膨胀约 33%，且 inline 请求有上限）
    const maxMB = type === 'video' ? 20 : 10;
    if (file.size > maxMB * 1024 * 1024) {
      showToast(`${type === 'video' ? '视频' : '图片'}过大（>${maxMB}MB），可能导致请求失败`);
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      currentAIMedia.push({ type, blob: file, dataUrl: e.target.result });
      renderAIMediaPreview();
    };
    reader.readAsDataURL(file);
  }
  event.target.value = '';
}

function renderAIMediaPreview() {
  const preview = document.getElementById('ai-media-preview');
  if (!preview) return;
  preview.innerHTML = currentAIMedia.map((m, i) => `
    <div class="media-preview-item">
      ${m.type === 'image' ? `<img src="${m.dataUrl}" alt="">` : `<video src="${m.dataUrl}" muted></video><div class="video-tag">视频</div>`}
      <div class="media-preview-remove" onclick="removeAIMedia(${i})">×</div>
    </div>`).join('');
}

function removeAIMedia(idx) {
  currentAIMedia.splice(idx, 1);
  renderAIMediaPreview();
}

// dataURL → { type, mimeType, data(base64无前缀) }
function aiMediaToParts(list) {
  return list.map(m => {
    const match = /^data:([^;]+);base64,(.*)$/.exec(m.dataUrl);
    if (!match) return null;
    return { type: m.type, mimeType: match[1], data: match[2] };
  }).filter(Boolean);
}

async function saveNote() {
  const freeNote = document.getElementById('note-input').value.trim();
  const sets = collectStructuredSets();

  if (!freeNote && sets.length === 0 && currentNoteMedia.length === 0) {
    showToast('请输入内容或上传媒体');
    return;
  }

  // 组合文本：结构化数据 + 自由备注
  const setsText = setsToText(sets);
  let text = '';
  if (setsText && freeNote) text = setsText + '\n---\n' + freeNote;
  else if (setsText) text = setsText;
  else text = freeNote;

  const noteData = {
    exerciseId: currentNoteExerciseId,
    exerciseKey: exerciseIdToKey(currentNoteExerciseId),
    text,
    createdAt: new Date().toISOString()
  };
  if (sets.length > 0) noteData.sets = sets;
  if (freeNote && sets.length > 0) noteData.freeNote = freeNote;
  
  let noteId = null;
  try {
    // dbAdd 现在路由到 localStorage 主存储 + IDB 影子写入
    noteId = await dbAdd('exerciseNotes', noteData);
    
    // 立即回读验证
    const all = await dbGetAll('exerciseNotes');
    const found = all.find(n => n.id === noteId);
    if (!found || found.text !== text) {
      throw new Error('回读验证失败');
    }
  } catch (e) {
    console.error('保存评论失败:', e);
    alert(`⚠ 保存失败: ${e.message}\n\n请截图反馈`);
    return;
  }
  
  // 保存媒体到 IDB(媒体仍走 IDB,localStorage 装不下大文件)
  for (const m of currentNoteMedia) {
    try {
      await _idbAdd('media', {
        noteId, type: m.type, blob: m.blob, filename: m.blob.name || `${m.type}-${Date.now()}`
      });
    } catch (e) {
      console.error('媒体保存失败:', e);
    }
  }
  
  showToast(`✓ 已保存 (评论 #${noteId})`);
  scheduleCloudSync();
  closeNoteModal();
  renderToday();
}

// 尝试唤起 Bilibili App,失败后回退到网页
function openBilibiliSearch(searchQuery) {
  const encodedQuery = encodeURIComponent(searchQuery);
  const schemeUrl = `bilibili://search?keyword=${encodedQuery}`;
  const webUrl = `https://m.bilibili.com/search?keyword=${encodedQuery}`;
  
  // iOS 上尝试唤起 App
  // 如果 App 没装,scheme 调用会"失败"但没有明确回调
  // 策略: 先立即尝试 scheme,然后 1.5 秒后如果页面还在(说明 App 没被唤起),打开网页
  const startTime = Date.now();
  
  // 用 location.href 触发 scheme(比 window.open 更可靠)
  try {
    window.location.href = schemeUrl;
  } catch (e) {
    // 某些浏览器 scheme 失败会抛异常,直接走 fallback
    window.open(webUrl, '_blank');
    return;
  }
  
  // Fallback: 如果 1.5 秒后页面还在前台,说明 App 没被唤起(没装或 scheme 失效)
  setTimeout(() => {
    // 如果页面被切到后台(App 唤起成功),document.hidden 会变 true
    // 如果还在前台,说明没被唤起,打开网页
    const elapsed = Date.now() - startTime;
    if (elapsed < 3000 && !document.hidden) {
      window.open(webUrl, '_blank');
    }
  }, 1500);
}

async function exportJSON() {
  const data = {
    exportedAt: new Date().toISOString(),
    appVersion: "1.0.1",
    workoutLogs: await dbGetAll('workoutLogs'),
    exerciseNotes: await dbGetAll('exerciseNotes'),
    dailyHabits: await dbGetAll('dailyHabits'),
    bodyMetrics: await dbGetAll('bodyMetrics'),
    settings: await dbGetAll('settings'),
    aiAnalysis: await dbGetAll('aiAnalysis'),
    media: []
  };
  const mediaItems = await dbGetAll('media');
  for (const m of mediaItems) {
    const reader = new FileReader();
    const dataUrl = await new Promise(resolve => {
      reader.onload = () => resolve(reader.result);
      reader.readAsDataURL(m.blob);
    });
    data.media.push({ id: m.id, noteId: m.noteId, type: m.type, filename: m.filename, dataUrl });
  }
  
  // 关键容错: 合并 localStorage 备份中 IDB 没有的评论
  let recoveredFromBackup = 0;
  try {
    const backups = JSON.parse(localStorage.getItem('noteBackup') || '[]');
    if (backups.length > 0) {
      const idbSigs = new Set(data.exerciseNotes.map(n => `${n.exerciseId}|${n.createdAt}|${n.text}`));
      for (const b of backups) {
        const sig = `${b.exerciseId}|${b.createdAt}|${b.text}`;
        if (!idbSigs.has(sig)) {
          data.exerciseNotes.push({
            exerciseId: b.exerciseId,
            text: b.text,
            createdAt: b.createdAt,
            _source: 'localStorage_backup'
          });
          recoveredFromBackup++;
        }
      }
    }
  } catch (e) {
    console.error('合并 localStorage 备份失败:', e);
  }
  
  // 导出前显示预览
  let preview = `【导出数据预览】\n\n` +
    `• 训练记录 (勾选完成): ${data.workoutLogs.length} 条\n` +
    `• 动作记录 (评论 + 媒体引用): ${data.exerciseNotes.length} 条\n`;
  if (recoveredFromBackup > 0) {
    preview += `  其中从 localStorage 备份补回: ${recoveredFromBackup} 条\n`;
  }
  preview += `• 习惯打卡: ${data.dailyHabits.length} 天\n` +
    `• 体测数据: ${data.bodyMetrics.length} 条\n` +
    `• AI 分析: ${(data.aiAnalysis || []).length} 条\n` +
    `• 设置: ${data.settings.length} 项\n` +
    `• 媒体文件 (照片/视频): ${data.media.length} 个\n\n` +
    `点击「确定」下载 JSON 文件\n` +
    `点击「取消」放弃下载`;
  
  if (!confirm(preview)) {
    return;
  }
  
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `posture-recovery-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`✓ 已导出 ${data.exerciseNotes.length} 条评论 + 全量数据`);
}

async function generateAIReport() {
  const allLogs = await dbGetAll('workoutLogs');
  const allHabits = await dbGetAll('dailyHabits');
  const allMetrics = await dbGetAll('bodyMetrics');
  const allNotes = await dbGetAll('exerciseNotes');
  const startDate = await getSetting('startDate');
  const today = todayStr();
  const { weekNum } = await getCurrentWeekDay();
  
  let md = `# 体态修复训练数据汇总\n\n`;
  md += `**生成日期**: ${today}\n`;
  if (startDate) md += `**训练开始日期**: ${startDate}\n`;
  md += `**当前周次**: Week ${weekNum}\n\n`;
  
  md += `## 任务\n\n请基于以下数据，作为体态修复教练对训练者进行评估:\n`;
  md += `1. 训练完成情况和趋势\n2. 习惯执行情况\n3. 体测数据变化和意义\n`;
  md += `4. 主要薄弱环节(基于动作记录)\n5. 下一阶段调整建议\n\n`;
  
  md += `## 一、训练完成情况\n\n`;
  const trainingDays = new Set(allLogs.filter(l => l.completed).map(l => l.date));
  md += `- 累计完成动作数: ${allLogs.filter(l => l.completed).length}\n`;
  md += `- 训练天数: ${trainingDays.size}\n\n`;
  
  md += `### 近 14 天每日完成动作数\n\n| 日期 | 动作数 |\n|------|--------|\n`;
  for (let i = 13; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const date = fmtDate(d);
    const count = allLogs.filter(l => l.date === date && l.completed).length;
    md += `| ${date} | ${count} |\n`;
  }
  md += `\n`;
  
  md += `## 二、习惯执行情况\n\n### 近 14 天每日习惯打卡\n\n| 日期 | 完成项 / 总项 |\n|------|------|\n`;
  for (let i = 13; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const date = fmtDate(d);
    const data = allHabits.find(h => h.date === date) || { habits: {} };
    const completedCount = HABITS.toggle.filter(h => data.habits[h.id]).length;
    md += `| ${date} | ${completedCount} / ${HABITS.toggle.length} |\n`;
  }
  md += `\n`;
  
  md += `## 三、体测数据\n\n`;
  for (const metric of METRICS) {
    const records = allMetrics.filter(r => r.metricId === metric.id);
    if (records.length === 0) continue;
    records.sort((a, b) => new Date(a.date) - new Date(b.date));
    md += `### ${metric.name} (${metric.unit})\n\n| 日期 | 数值 |\n|------|------|\n`;
    records.forEach(r => { md += `| ${fmtDate(r.date)} | ${r.value} |\n`; });
    md += `\n`;
  }
  
  md += `## 四、近期动作记录(最新 20 条)\n\n`;
  const recentNotes = allNotes.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 20);
  
  if (recentNotes.length === 0) {
    md += `(暂无记录)\n\n`;
  } else {
    const allEx = getAllExercises();
    for (const note of recentNotes) {
      const ex = allEx.find(e => e.id === note.exerciseId);
      const exName = ex ? ex.name : note.exerciseId;
      md += `### ${exName} · ${fmtDateTime(note.createdAt)}\n\n${note.text}\n\n`;
    }
  }
  
  md += `## 五、当前训练计划上下文\n\n`;
  md += `用户在执行 v4.1 体态修复 16 周计划。诊断包括:\n`;
  md += `- 上交叉综合征(肩胛稳定差、上斜方紧、富贵包、圆肩)\n`;
  md += `- 核心稳定不足、放松态小腹突出\n`;
  md += `- 臀中肌弱、足弓/踝稳定差、O 型腿\n`;
  md += `- 全身肌肉偏弱\n\n`;
  md += `当前在 Phase 0(感知期 + 基础激活期)，目标是建立动作模式、激活薄弱环节、培养习惯。\n`;
  
  return md;
}

async function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  // 询问导入模式
  const replaceMode = confirm(
    '【导入数据】\n\n' +
    '点击「确定」 → 覆盖模式: 清空当前数据后导入(危险!会丢失现有数据)\n' +
    '点击「取消」 → 合并模式: 保留现有数据,把导入的新数据合并进来 (推荐)'
  );
  
  if (replaceMode) {
    // 二次确认覆盖
    if (!confirm('⚠ 覆盖模式会清空当前所有数据\n\n确定继续?建议先点「数据诊断」备份当前数据')) {
      event.target.value = '';
      return;
    }
  }
  
  const text = await file.text();
  try {
    const data = JSON.parse(text);
    
    const stats = {
      workoutLogs: (data.workoutLogs || []).length,
      exerciseNotes: (data.exerciseNotes || []).length,
      dailyHabits: (data.dailyHabits || []).length,
      bodyMetrics: (data.bodyMetrics || []).length,
      settings: (data.settings || []).length,
      aiAnalysis: (data.aiAnalysis || []).length,
      media: (data.media || []).length
    };

    // 覆盖模式: 先清空
    if (replaceMode) {
      const stores = ['workoutLogs', 'exerciseNotes', 'dailyHabits', 'bodyMetrics', 'settings', 'aiAnalysis', 'media'];
      for (const store of stores) {
        const all = await dbGetAll(store);
        for (const item of all) {
          const key = (store === 'dailyHabits' || store === 'aiAnalysis') ? item.date : (store === 'settings' ? item.key : item.id);
          await dbDelete(store, key);
        }
      }
    }
    
    // 收集 import 前现有数据(用于合并去重)
    const existingLogs = replaceMode ? [] : await dbGetAll('workoutLogs');
    const existingNotes = replaceMode ? [] : await dbGetAll('exerciseNotes');
    const existingMetrics = replaceMode ? [] : await dbGetAll('bodyMetrics');
    
    const errors = [];
    let logsCount = 0, notesCount = 0, habitsCount = 0, metricsCount = 0, settingsCount = 0, mediaCount = 0;
    let logsSkipped = 0, notesSkipped = 0, metricsSkipped = 0;
    
    // workoutLogs 去重: 同 date + exerciseId 视为重复
    for (const log of (data.workoutLogs || [])) {
      try {
        const isDup = !replaceMode && existingLogs.some(e => e.date === log.date && e.exerciseId === log.exerciseId);
        if (isDup) { logsSkipped++; continue; }
        const toStore = { ...log };
        delete toStore.id; // 让 IDB 自增 id 避免冲突
        await dbAdd('workoutLogs', toStore);
        logsCount++;
      } catch (e) { errors.push(`workoutLog: ${e.message}`); }
    }
    
    // exerciseNotes 去重: 同 exerciseId + createdAt + text 视为重复
    for (const note of (data.exerciseNotes || [])) {
      try {
        const isDup = !replaceMode && existingNotes.some(e => 
          e.exerciseId === note.exerciseId && 
          e.createdAt === note.createdAt && 
          e.text === note.text
        );
        if (isDup) { notesSkipped++; continue; }
        const toStore = { ...note };
        delete toStore.id;
        await dbAdd('exerciseNotes', toStore);
        notesCount++;
      } catch (e) { errors.push(`exerciseNote: ${e.message}`); }
    }
    
    // dailyHabits: 用 date 做 key,合并模式下保留现有(避免覆盖你今天已经打的卡)
    for (const habit of (data.dailyHabits || [])) {
      try {
        if (!habit.date) { errors.push(`habit 缺少 date 字段`); continue; }
        if (!replaceMode) {
          const existing = await dbGet('dailyHabits', habit.date);
          if (existing) {
            // 合并 habits 和 counters: 任意一边为 true 就保留
            const merged = {
              date: habit.date,
              habits: { ...habit.habits, ...existing.habits },
              counters: {}
            };
            const allCounterKeys = new Set([...Object.keys(habit.counters || {}), ...Object.keys(existing.counters || {})]);
            for (const k of allCounterKeys) {
              merged.counters[k] = Math.max(habit.counters?.[k] || 0, existing.counters?.[k] || 0);
            }
            await dbPut('dailyHabits', merged);
          } else {
            await dbPut('dailyHabits', habit);
          }
        } else {
          await dbPut('dailyHabits', habit);
        }
        habitsCount++;
      } catch (e) { errors.push(`habit: ${e.message}`); }
    }
    
    // aiAnalysis: 用 date 做 key,直接覆盖
    let aiAnalysisCount = 0;
    for (const analysis of (data.aiAnalysis || [])) {
      try {
        if (!analysis.date) continue;
        await dbPut('aiAnalysis', analysis);
        aiAnalysisCount++;
      } catch (e) { errors.push(`aiAnalysis: ${e.message}`); }
    }

    // bodyMetrics 去重: 同 metricId + date 视为重复(同一天同一指标只保留一条)
    for (const metric of (data.bodyMetrics || [])) {
      try {
        const isDup = !replaceMode && existingMetrics.some(e => 
          e.metricId === metric.metricId && e.date === metric.date
        );
        if (isDup) { metricsSkipped++; continue; }
        const toStore = { ...metric };
        delete toStore.id;
        await dbAdd('bodyMetrics', toStore);
        metricsCount++;
      } catch (e) { errors.push(`metric: ${e.message}`); }
    }
    
    // settings: 默认覆盖(同名 key 用导入的值)
    for (const setting of (data.settings || [])) {
      try {
        if (!setting.key) { errors.push(`setting 缺少 key 字段`); continue; }
        await dbPut('settings', setting);
        settingsCount++;
      } catch (e) { errors.push(`setting: ${e.message}`); }
    }
    
    // media: 全部加入(图片/视频通常不重复)
    for (const m of (data.media || [])) {
      try {
        if (!m.dataUrl) { errors.push(`media 缺少 dataUrl`); continue; }
        const res = await fetch(m.dataUrl);
        const blob = await res.blob();
        const toStore = { noteId: m.noteId, type: m.type, filename: m.filename, blob };
        // 注意: 不传 id, 让 IDB 自增, 避免和现有 media 的 id 冲突
        await dbAdd('media', toStore);
        mediaCount++;
      } catch (e) { errors.push(`media: ${e.message}`); }
    }
    
    let resultMsg = `${replaceMode ? '✓ 覆盖式' : '✓ 合并式'}导入完成:\n\n`;
    resultMsg += `• 训练记录: 新增 ${logsCount}${logsSkipped ? ' / 跳过重复 ' + logsSkipped : ''} (来源 ${stats.workoutLogs})\n`;
    resultMsg += `• 动作记录: 新增 ${notesCount}${notesSkipped ? ' / 跳过重复 ' + notesSkipped : ''} (来源 ${stats.exerciseNotes})\n`;
    resultMsg += `• 习惯打卡: ${habitsCount} (来源 ${stats.dailyHabits})\n`;
    resultMsg += `• 体测数据: 新增 ${metricsCount}${metricsSkipped ? ' / 跳过重复 ' + metricsSkipped : ''} (来源 ${stats.bodyMetrics})\n`;
    resultMsg += `• AI 分析: ${aiAnalysisCount} (来源 ${stats.aiAnalysis})\n`;
    resultMsg += `• 设置: ${settingsCount} (来源 ${stats.settings})\n`;
    resultMsg += `• 媒体文件: ${mediaCount} (来源 ${stats.media})\n`;
    if (errors.length > 0) {
      resultMsg += `\n⚠ 错误 ${errors.length} 条:\n${errors.slice(0, 5).join('\n')}`;
    }
    alert(resultMsg);
    setTimeout(() => location.reload(), 500);
  } catch (e) {
    alert('导入失败: ' + e.message);
  }
}

// 数据诊断:显示数据库中的内容摘要
async function diagnoseData() {
  try {
    const logs = await dbGetAll('workoutLogs');
    const notes = await dbGetAll('exerciseNotes');
    const habits = await dbGetAll('dailyHabits');
    const metrics = await dbGetAll('bodyMetrics');
    const settings = await dbGetAll('settings');
    const media = await dbGetAll('media');
    
    let msg = `【当前数据库内容】\n\n`;
    msg += `📋 训练记录 (workoutLogs): ${logs.length} 条\n`;
    if (logs.length > 0) {
      const dates = [...new Set(logs.map(l => l.date))].sort();
      msg += `  日期范围: ${dates[0]} ~ ${dates[dates.length - 1]}\n`;
      const completedCount = logs.filter(l => l.completed).length;
      msg += `  已完成: ${completedCount}\n`;
      const allExIds = new Set(getAllExercises().map(e => e.id));
      const unknownIds = [...new Set(logs.map(l => l.exerciseId))].filter(id => !allExIds.has(id));
      if (unknownIds.length > 0) {
        msg += `  ⚠ 发现 ${unknownIds.length} 个无法匹配的动作 ID(可能来自旧版本):\n  样本: ${unknownIds.slice(0,3).join(', ')}\n`;
      }
    }
    
    msg += `\n💬 动作评论 (exerciseNotes): ${notes.length} 条\n`;
    if (notes.length > 0) {
      const sortedNotes = [...notes].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      msg += `  最新 3 条:\n`;
      const allEx = getAllExercises();
      for (const n of sortedNotes.slice(0, 3)) {
        const ex = allEx.find(e => e.id === n.exerciseId);
        const exName = ex ? ex.name : `[未知:${n.exerciseId}]`;
        const preview = (n.text || '').slice(0, 30).replace(/\n/g, ' ');
        msg += `  • [${fmtDate(n.createdAt)}] ${exName}: ${preview}${(n.text||'').length > 30 ? '...' : ''}\n`;
      }
      // 按动作分组统计
      const byEx = {};
      notes.forEach(n => byEx[n.exerciseId] = (byEx[n.exerciseId] || 0) + 1);
      const topEx = Object.entries(byEx).sort((a,b) => b[1]-a[1]).slice(0, 5);
      msg += `  评论最多的动作:\n`;
      for (const [exId, count] of topEx) {
        const ex = allEx.find(e => e.id === exId);
        const exName = ex ? ex.name : `[未知:${exId}]`;
        msg += `    ${exName}: ${count} 条\n`;
      }
    }
    
    msg += `\n📅 习惯打卡 (dailyHabits): ${habits.length} 天\n`;
    if (habits.length > 0) {
      const dates = habits.map(h => h.date).sort();
      msg += `  日期范围: ${dates[0]} ~ ${dates[dates.length - 1]}\n`;
    }
    
    msg += `\n📊 体测数据 (bodyMetrics): ${metrics.length} 条\n`;
    if (metrics.length > 0) {
      const dates = [...new Set(metrics.map(m => m.date))].sort();
      msg += `  日期范围: ${dates[0]} ~ ${dates[dates.length - 1]}\n`;
      const metricIds = [...new Set(metrics.map(m => m.metricId))];
      msg += `  指标类型: ${metricIds.length} 种\n`;
    }
    
    msg += `\n⚙️ 设置 (settings): ${settings.length} 项\n`;
    settings.forEach(s => msg += `  ${s.key}: ${typeof s.value === 'object' ? JSON.stringify(s.value).slice(0, 40) : s.value}\n`);
    
    const aiAnalysisAll = await dbGetAll('aiAnalysis');
    msg += `\n🤖 AI 分析 (aiAnalysis): ${aiAnalysisAll.length} 条\n`;
    if (aiAnalysisAll.length > 0) {
      const aiDates = aiAnalysisAll.map(a => a.date).sort();
      msg += `  日期范围: ${aiDates[0]} ~ ${aiDates[aiDates.length - 1]}\n`;
    }

    msg += `\n📷 媒体文件 (media): ${media.length} 个\n`;
    if (media.length > 0) {
      const types = {};
      media.forEach(m => types[m.type] = (types[m.type] || 0) + 1);
      Object.entries(types).forEach(([t, c]) => msg += `  ${t}: ${c} 个\n`);
    }
    
    msg += `\n💡 数据库名: PostureRecoveryApp`;
    msg += `\n💡 当前 URL: ${window.location.href}`;
    
    // localStorage 备份诊断
    try {
      const backups = JSON.parse(localStorage.getItem('noteBackup') || '[]');
      msg += `\n\n🔒 localStorage 备份: ${backups.length} 条`;
      if (backups.length > 0) {
        const idbSavedCount = backups.filter(b => b.idbSaved).length;
        const idbFailedCount = backups.length - idbSavedCount;
        msg += `\n  其中 IDB 写入成功: ${idbSavedCount}`;
        if (idbFailedCount > 0) {
          msg += `\n  ⚠ IDB 写入失败但已备份: ${idbFailedCount}`;
        }
        // 对比 IDB 中实际存在的评论
        const idbNotes = notes;
        const idbSigs = new Set(idbNotes.map(n => `${n.exerciseId}|${n.createdAt}|${n.text}`));
        const lostFromIDB = backups.filter(b => !idbSigs.has(`${b.exerciseId}|${b.createdAt}|${b.text}`)).length;
        if (lostFromIDB > 0) {
          msg += `\n  ⚠ 备份中但 IDB 已丢失: ${lostFromIDB} 条 (启动时会自动恢复)`;
        }
      }
    } catch (e) {
      msg += `\n\n🔒 localStorage 备份: 读取失败 (${e.message})`;
    }
    
    alert(msg);
  } catch (e) {
    alert('诊断失败: ' + e.message);
  }
}

async function clearAllData() {
  if (!confirm('真的要清空所有数据吗?此操作不可恢复!')) return;
  if (!confirm('再次确认:这会删除所有训练记录、习惯打卡、体测数据、动作记录、媒体文件。建议先导出备份。')) return;
  const stores = ['workoutLogs', 'exerciseNotes', 'dailyHabits', 'bodyMetrics', 'settings', 'aiAnalysis', 'media'];
  for (const store of stores) {
    const all = await dbGetAll(store);
    for (const item of all) {
      const key = (store === 'dailyHabits' || store === 'aiAnalysis') ? item.date : (store === 'settings' ? item.key : item.id);
      await dbDelete(store, key);
    }
  }
  showToast('已清空');
  setTimeout(() => location.reload(), 1000);
}

// ============================================================
// URL 参数导入 (用于快捷指令自动录入体测数据)
// ============================================================

/**
 * 解析 URL hash 参数
 * 格式: #import=1&weight=65.2&bodyfat=19.8&muscle=50.1&date=2026-04-22
 */
function parseHashParams() {
  const hash = window.location.hash.slice(1); // 去掉 #
  if (!hash) return null;
  const params = {};
  hash.split('&').forEach(pair => {
    const [key, value] = pair.split('=');
    if (key) params[decodeURIComponent(key)] = value ? decodeURIComponent(value) : '';
  });
  return params;
}

/**
 * 清除 URL hash 防止刷新重复导入
 */
function clearHash() {
  // 使用 replaceState 避免新增历史记录
  if (history.replaceState) {
    history.replaceState(null, '', window.location.pathname + window.location.search);
  } else {
    window.location.hash = '';
  }
}

/**
 * 处理从 URL 导入的体测数据
 * 支持字段:weight(kg), bodyfat(%), muscle(kg), date(YYYY-MM-DD)
 */
async function handleURLImport() {
  const params = parseHashParams();
  if (!params || params.import !== '1') return;
  
  const targetDate = params.date || todayStr();
  const toImport = [];
  
  // 字段映射:URL 参数名 → METRICS 中的 id
  const fieldMap = {
    weight: 'm-weight',
    bodyfat: 'm-bodyfat',
    muscle: 'm-muscle',
    deadhang: 'm-deadhang',
    singleleg_l: 'm-singleleg-l',
    singleleg_r: 'm-singleleg-r',
    sideplank_l: 'm-sideplank-l',
    sideplank_r: 'm-sideplank-r',
    pullup_assist: 'm-pullup-assist',
    tva: 'm-tva'
  };
  
  for (const [field, metricId] of Object.entries(fieldMap)) {
    if (params[field] && !isNaN(parseFloat(params[field]))) {
      const metric = METRICS.find(m => m.id === metricId);
      toImport.push({
        metricId,
        metricName: metric?.name || field,
        value: parseFloat(params[field]),
        unit: metric?.unit || ''
      });
    }
  }
  
  if (toImport.length === 0) {
    clearHash();
    return;
  }
  
  // 显示确认对话框
  const summary = toImport.map(item => `• ${item.metricName}: ${item.value} ${item.unit}`).join('\n');
  const confirmMsg = `检测到快捷指令传来的数据,确认导入到 ${targetDate}?\n\n${summary}`;
  
  if (!confirm(confirmMsg)) {
    clearHash();
    return;
  }
  
  // 检查当日该指标是否已有记录,有则更新,无则新增
  const existing = await dbGetAll('bodyMetrics');
  let imported = 0, updated = 0;
  
  for (const item of toImport) {
    const existingRecord = existing.find(r => r.metricId === item.metricId && r.date === targetDate);
    if (existingRecord) {
      existingRecord.value = item.value;
      existingRecord.createdAt = new Date().toISOString();
      existingRecord.source = 'url-import';
      await dbPut('bodyMetrics', existingRecord);
      updated++;
    } else {
      await dbAdd('bodyMetrics', {
        metricId: item.metricId,
        value: item.value,
        date: targetDate,
        createdAt: new Date().toISOString(),
        source: 'url-import'
      });
      imported++;
    }
  }
  
  clearHash();
  
  const msg = [];
  if (imported > 0) msg.push(`新增 ${imported} 条`);
  if (updated > 0) msg.push(`更新 ${updated} 条`);
  showToast(`✓ 已导入:${msg.join('、')}`);
  
  // 如果在体测视图,刷新一下
  const activeView = document.querySelector('.view.active');
  if (activeView && activeView.id === 'view-metrics') {
    renderMetrics();
  }
}

// ============================================================
// 兼容: 旧版 v8.2 的 noteBackup localStorage 数据
// ============================================================
async function migrateFromOldNoteBackup() {
  try {
    const backups = JSON.parse(localStorage.getItem('noteBackup') || '[]');
    if (backups.length === 0) return 0;
    
    const currentNotes = await dbGetAll('exerciseNotes');
    const sigs = new Set(currentNotes.map(n => `${n.exerciseId}|${n.createdAt}|${n.text}`));
    
    let migrated = 0;
    for (const b of backups) {
      const sig = `${b.exerciseId}|${b.createdAt}|${b.text}`;
      if (!sigs.has(sig)) {
        await dbAdd('exerciseNotes', {
          exerciseId: b.exerciseId,
          text: b.text,
          createdAt: b.createdAt
        });
        migrated++;
      }
    }
    return migrated;
  } catch (e) {
    console.error('迁移老版 noteBackup 失败:', e);
    return 0;
  }
}

// ============================================================
// 确保 startDate 被持久化(关键修复: 之前没设 startDate 会导致每周都计算为 Week 3)
// ============================================================
// 设计: startDate 是 Week 3 的周一(基准点)
// 用户场景: 本周一应当作 Week 4 起点 → startDate = 上周一
async function ensureStartDate() {
  const existing = await getSetting('startDate');
  if (existing) return { firstTime: false, startDate: existing };
  
  // 第一次启动: 把"上周一"持久化为 startDate(这样本周一就是 Week 4)
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const dayOfWeek = today.getDay();
  const daysToMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
  const thisMonday = new Date(today);
  thisMonday.setDate(today.getDate() - daysToMonday);
  // 再往前推 7 天 = 上周一 = Week 3 周一基准
  const lastMonday = new Date(thisMonday);
  lastMonday.setDate(thisMonday.getDate() - 7);
  const lastMondayStr = fmtDate(lastMonday);
  
  await setSetting('startDate', lastMondayStr);
  return { firstTime: true, startDate: lastMondayStr };
}

// ============================================================
// 启动
// ============================================================
(async () => {
  await openDB();
  
  // 1. 从 IndexedDB 迁移到 localStorage(从 v8.2 及之前升级的兼容)
  const idbMigration = await migrateFromIDB();
  
  // 2. 从老版 noteBackup localStorage 迁移
  const oldBackupCount = await migrateFromOldNoteBackup();
  
  // 3. 关键: 确保 startDate 已持久化(修复"每周都是 Week 3"的 bug)
  const sd = await ensureStartDate();
  
  // 4. v8.6: 为所有缺 exerciseKey 的老评论自动回填(让评论跨周聚合)
  const backfilled = await backfillExerciseKey();
  
  if (idbMigration.migrated > 0 || oldBackupCount > 0 || backfilled > 0) {
    const parts = [];
    if (idbMigration.migrated > 0) {
      parts.push(`从 IndexedDB 迁移: ${idbMigration.summary.join(', ')}`);
    }
    if (oldBackupCount > 0) {
      parts.push(`从 v8.2 备份恢复: ${oldBackupCount} 条评论`);
    }
    if (backfilled > 0) {
      parts.push(`已为 ${backfilled} 条老评论自动关联动作 (跨周共享)`);
    }
    setTimeout(() => {
      alert(
        `🔄 数据升级完成\n\n${parts.join('\n')}\n\n` +
        `从 v8.6 起,同名动作的评论会跨周聚合,你的历史记录已自动关联好。`
      );
    }, 800);
  } else if (sd.firstTime) {
    // 第一次启动 (没迁移到的全新用户),提醒用户确认开始日期
    setTimeout(() => {
      alert(
        `👋 欢迎使用!\n\n` +
        `已自动将上周一 (${sd.startDate}) 设为 Week 3 起点。\n` +
        `这意味着本周一开始进入 Week 4。\n\n` +
        `如需修改,请到【设置】→【训练开始日期】调整。`
      );
    }, 800);
  }
  
  await renderToday();
  setTimeout(() => handleURLImport(), 300);

  // ====== Service Worker 注册(PWA 离线支持) ======
  // 仅在 http(s) 下注册(file:// 协议不支持 SW,但 file:// 本身就是离线可用的)
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
