<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>体态修复 · 训练手册</title>
<link rel="manifest" href='data:application/manifest+json,{"name":"体态修复训练手册","short_name":"训练手册","start_url":"./","display":"standalone","background_color":"#0a0a0a","theme_color":"#0a0a0a","icons":[{"src":"data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%230a0a0a%22/><text x=%2250%22 y=%2265%22 font-size=%2250%22 text-anchor=%22middle%22 fill=%22%23d4af37%22 font-family=%22serif%22>體</text></svg>","sizes":"512x512","type":"image/svg+xml"}]}'>
<style>
/* ====== 字体与变量 ====== */
@font-face {
  font-family: 'NotoSerifSC';
  src: local('Noto Serif SC'), local('Songti SC'), local('STSong');
  font-weight: 400;
}

:root {
  --bg-0: #0a0a0a;
  --bg-1: #141414;
  --bg-2: #1c1c1c;
  --bg-3: #262626;
  --line: #2d2d2d;
  --line-2: #3a3a3a;
  --text-0: #f0ebe0;
  --text-1: #b8b3a8;
  --text-2: #6e6a62;
  --text-3: #4a4842;
  --accent: #d4af37;
  --accent-dim: #8a7228;
  --warn: #c47d4a;
  --good: #6b8e5a;
  --bad: #a85248;
  --radius: 4px;
  --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  background: var(--bg-0);
  color: var(--text-0);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  font-size: 15px;
  line-height: 1.6;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}

body {
  padding-bottom: env(safe-area-inset-bottom);
  min-height: 100vh;
}

button {
  background: none;
  border: none;
  color: inherit;
  font-family: inherit;
  font-size: inherit;
  cursor: pointer;
  -webkit-appearance: none;
}

input, textarea, select {
  background: var(--bg-2);
  color: var(--text-0);
  border: 1px solid var(--line);
  font-family: inherit;
  font-size: inherit;
  padding: 10px 12px;
  border-radius: var(--radius);
  -webkit-appearance: none;
  outline: none;
  width: 100%;
}

input:focus, textarea:focus {
  border-color: var(--accent-dim);
}

textarea {
  resize: vertical;
  min-height: 80px;
  line-height: 1.5;
}

::placeholder {
  color: var(--text-3);
}

/* ====== 日期导航 ====== */
.date-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 8px 12px;
  margin-bottom: 16px;
  gap: 8px;
}

.date-nav-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-1);
  font-size: 20px;
  border-radius: var(--radius);
  transition: var(--transition);
  flex-shrink: 0;
}

.date-nav-btn:disabled {
  color: var(--text-3);
  opacity: 0.3;
}

.date-nav-btn:not(:disabled):active {
  background: var(--bg-2);
}

.date-nav-center {
  flex: 1;
  text-align: center;
  min-width: 0;
}

.date-nav-date {
  font-family: "NotoSerifSC", "Songti SC", serif;
  font-size: 16px;
  color: var(--text-0);
  letter-spacing: 0.05em;
}

.date-nav-rel {
  font-size: 11px;
  color: var(--text-2);
  margin-top: 2px;
  letter-spacing: 0.1em;
}

.date-nav-rel.today-rel {
  color: var(--accent);
}

.date-nav-today-btn {
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--text-1);
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 11px;
  white-space: nowrap;
  flex-shrink: 0;
}

.date-nav-today-btn.current {
  background: var(--accent-dim);
  color: var(--text-0);
  border-color: var(--accent-dim);
}

.date-mode-banner {
  background: rgba(196, 125, 74, 0.08);
  border: 1px solid var(--line);
  border-left: 2px solid var(--warn);
  padding: 8px 12px;
  border-radius: var(--radius);
  font-size: 12px;
  color: var(--text-1);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.date-mode-banner.future {
  border-left-color: var(--text-3);
  color: var(--text-2);
}

/* ====== 顶部 ====== */
.app-header {
  position: sticky;
  top: 0;
  left: 0;
  right: 0;
  background: var(--bg-0);
  border-bottom: 1px solid var(--line);
  z-index: 100;
  padding-top: env(safe-area-inset-top);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  background: rgba(10, 10, 10, 0.92);
}

.app-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px 12px;
}

.app-title-text {
  font-family: "NotoSerifSC", "Songti SC", serif;
  font-size: 17px;
  font-weight: 400;
  letter-spacing: 0.05em;
  color: var(--text-0);
}

.app-title-text span {
  color: var(--accent);
  margin-right: 6px;
}

.icon-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-1);
  font-size: 20px;
  border-radius: var(--radius);
  transition: var(--transition);
}

.icon-btn:active {
  background: var(--bg-2);
  color: var(--text-0);
}

/* ====== 标签栏 ====== */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--line);
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.tabs::-webkit-scrollbar {
  display: none;
}

.tab {
  flex: 1;
  min-width: 70px;
  padding: 12px 8px;
  font-size: 13px;
  color: var(--text-2);
  text-align: center;
  border-bottom: 1px solid transparent;
  transition: var(--transition);
  white-space: nowrap;
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ====== 主内容 ====== */
main {
  padding: 20px;
  max-width: 720px;
  margin: 0 auto;
  padding-bottom: 100px;
}

.view {
  display: none;
}

.view.active {
  display: block;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ====== 通用组件 ====== */
.section-title {
  font-family: "NotoSerifSC", "Songti SC", serif;
  font-size: 14px;
  letter-spacing: 0.15em;
  color: var(--text-2);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--line);
  text-transform: uppercase;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.section-title-cn {
  font-size: 12px;
  color: var(--text-3);
  letter-spacing: 0.05em;
  text-transform: none;
}

.card {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  transition: var(--transition);
}

.card.completed {
  background: var(--bg-1);
  border-color: var(--accent-dim);
}

.empty {
  text-align: center;
  color: var(--text-3);
  padding: 40px 20px;
  font-size: 14px;
}

/* ====== 当日视图 ====== */
.today-header {
  margin-bottom: 24px;
}

.today-date {
  font-size: 12px;
  color: var(--text-2);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.today-title {
  font-family: "NotoSerifSC", "Songti SC", serif;
  font-size: 24px;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}

.today-meta {
  font-size: 13px;
  color: var(--text-2);
  display: flex;
  gap: 16px;
}

.today-meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.progress-summary {
  background: var(--bg-1);
  border: 1px solid var(--line);
  padding: 14px 16px;
  border-radius: var(--radius);
  margin-bottom: 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.progress-summary-text {
  font-size: 13px;
  color: var(--text-1);
}

.progress-summary-num {
  font-family: "NotoSerifSC", "Songti SC", serif;
  font-size: 22px;
  color: var(--accent);
}

.progress-summary-num small {
  color: var(--text-2);
  font-size: 14px;
}

/* ====== 动作卡片 ====== */
.exercise-card {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  transition: var(--transition);
}

.exercise-card.done {
  border-color: var(--accent-dim);
  background: linear-gradient(to right, rgba(212, 175, 55, 0.04), transparent);
}

.exercise-row {
  display: flex;
  align-items: flex-start;
  padding: 14px;
  gap: 12px;
}

.checkbox {
  flex-shrink: 0;
  width: 22px;
  height: 22px;
  border: 1.5px solid var(--text-3);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 1px;
  cursor: pointer;
  transition: var(--transition);
}

.checkbox.checked {
  background: var(--accent);
  border-color: var(--accent);
}

.checkbox.checked::after {
  content: '✓';
  color: var(--bg-0);
  font-size: 14px;
  font-weight: 700;
}

.exercise-content {
  flex: 1;
  min-width: 0;
}

.exercise-name {
  font-size: 15px;
  color: var(--text-0);
  font-weight: 500;
  margin-bottom: 4px;
}

.exercise-meta {
  font-size: 12px;
  color: var(--text-2);
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 4px;
}

.exercise-meta span {
  white-space: nowrap;
}

.exercise-tip {
  font-size: 12px;
  color: var(--text-2);
  font-style: italic;
  line-height: 1.5;
  margin-top: 4px;
}

.last-note-preview {
  background: rgba(212, 175, 55, 0.06);
  border-left: 2px solid var(--accent-dim);
  padding: 6px 10px;
  margin-top: 6px;
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.last-note-date {
  color: var(--accent);
  font-size: 11px;
  letter-spacing: 0.05em;
}

.last-note-text {
  color: var(--text-1);
  line-height: 1.5;
  word-break: break-word;
}

.exercise-actions {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.action-btn {
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--text-1);
  padding: 4px 10px;
  border-radius: var(--radius);
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: var(--transition);
}

.action-btn:active {
  background: var(--bg-3);
}

.action-btn.has-content {
  border-color: var(--accent-dim);
  color: var(--accent);
}

.action-btn-count {
  background: var(--accent);
  color: var(--bg-0);
  font-size: 9px;
  padding: 1px 4px;
  border-radius: 8px;
  font-weight: 700;
}

.action-btn.video-btn {
  border-color: var(--line-2);
}

/* ====== 视频选择 modal ====== */
.video-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 20px;
}

.video-option {
  background: var(--bg-2);
  border: 1px solid var(--line);
  padding: 14px 16px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: var(--transition);
  text-decoration: none;
  color: var(--text-0);
}

.video-option:active {
  background: var(--bg-3);
}

.video-option-icon {
  font-size: 24px;
  width: 36px;
  text-align: center;
  flex-shrink: 0;
}

.video-option-content {
  flex: 1;
  min-width: 0;
}

.video-option-title {
  font-size: 14px;
  color: var(--text-0);
  margin-bottom: 2px;
}

.video-option-desc {
  font-size: 11px;
  color: var(--text-2);
}

.video-option-arrow {
  color: var(--text-3);
  font-size: 16px;
}

.video-option.featured {
  border-color: var(--accent-dim);
  background: linear-gradient(to right, rgba(212, 175, 55, 0.06), transparent);
}

.video-iframe-wrapper {
  background: #000;
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
  position: relative;
  padding-bottom: 62.5%; /* 16:10 比例,Bilibili 默认 */
  height: 0;
}

.video-iframe-wrapper iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: 0;
}

/* ====== 段落分组 ====== */
.exercise-group {
  margin-bottom: 28px;
}

.exercise-group-title {
  font-family: "NotoSerifSC", "Songti SC", serif;
  font-size: 13px;
  color: var(--accent);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px dashed var(--line);
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.exercise-group-title-meta {
  font-size: 11px;
  color: var(--text-3);
  font-family: -apple-system, sans-serif;
  letter-spacing: 0;
  text-transform: none;
}

/* ====== 周计划视图 ====== */
.week-selector {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 8px;
  margin-bottom: 16px;
  scrollbar-width: none;
}

.week-selector::-webkit-scrollbar {
  display: none;
}

.week-btn {
  flex-shrink: 0;
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--text-1);
  padding: 6px 14px;
  border-radius: 18px;
  font-size: 12px;
  white-space: nowrap;
  transition: var(--transition);
}

.week-btn.active {
  background: var(--accent);
  color: var(--bg-0);
  border-color: var(--accent);
}

.week-btn.current {
  border-color: var(--accent);
}

.day-card {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
}

.day-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.day-name {
  font-family: "NotoSerifSC", "Songti SC", serif;
  font-size: 14px;
  color: var(--accent);
  letter-spacing: 0.1em;
}

.day-title {
  font-size: 13px;
  color: var(--text-1);
  margin-top: 2px;
}

.day-body {
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text-1);
  line-height: 1.7;
}

/* ====== 习惯打卡 ====== */
.habit-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 20px;
}

.habit-card {
  background: var(--bg-1);
  border: 1px solid var(--line);
  padding: 14px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: var(--transition);
  text-align: center;
}

.habit-card.checked {
  background: linear-gradient(135deg, rgba(212, 175, 55, 0.08), transparent);
  border-color: var(--accent-dim);
}

.habit-icon {
  font-size: 22px;
  margin-bottom: 6px;
  filter: grayscale(0.5);
  opacity: 0.7;
}

.habit-card.checked .habit-icon {
  filter: none;
  opacity: 1;
}

.habit-name {
  font-size: 12px;
  color: var(--text-1);
  letter-spacing: 0.02em;
}

.habit-counter {
  background: var(--bg-1);
  border: 1px solid var(--line);
  padding: 14px 16px;
  border-radius: var(--radius);
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.habit-counter-name {
  font-size: 13px;
  color: var(--text-1);
}

.habit-counter-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}

.habit-counter-btn {
  width: 32px;
  height: 32px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--text-1);
}

.habit-counter-num {
  min-width: 36px;
  text-align: center;
  font-family: "NotoSerifSC", serif;
  font-size: 18px;
  color: var(--accent);
}

/* ====== Modal ====== */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
}

.modal-backdrop.show {
  display: flex;
  animation: fadeIn 0.2s ease;
}

.modal {
  background: var(--bg-1);
  width: 100%;
  max-width: 720px;
  max-height: 85vh;
  border-radius: 12px 12px 0 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg-1);
}

.modal-title {
  font-family: "NotoSerifSC", "Songti SC", serif;
  font-size: 16px;
  color: var(--text-0);
}

.modal-title small {
  font-family: -apple-system, sans-serif;
  font-size: 12px;
  color: var(--text-2);
  margin-left: 8px;
  letter-spacing: 0;
}

.modal-close {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-2);
  font-size: 22px;
}

.modal-body {
  padding: 20px;
  overflow-y: auto;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}

/* ====== 记录条目 ====== */
.note-input-area {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 16px;
}

.note-template-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.template-btn {
  background: var(--bg-3);
  border: 1px solid var(--line);
  color: var(--text-2);
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 11px;
  transition: var(--transition);
}

.template-btn.active {
  background: var(--accent-dim);
  color: var(--text-0);
  border-color: var(--accent-dim);
}

.note-input {
  background: var(--bg-1);
  min-height: 100px;
  margin-bottom: 8px;
}

.media-upload-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.media-upload-btn {
  background: var(--bg-3);
  border: 1px dashed var(--line-2);
  color: var(--text-2);
  padding: 8px 14px;
  border-radius: var(--radius);
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}

.media-upload-btn input {
  display: none;
}

.media-preview {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.media-preview-item {
  position: relative;
  width: 60px;
  height: 60px;
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-2);
}

.media-preview-item img,
.media-preview-item video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.media-preview-remove {
  position: absolute;
  top: 2px;
  right: 2px;

function getVideoForExercise(exerciseName) {
  // 先精确匹配
  if (VIDEO_MAP[exerciseName]) return VIDEO_MAP[exerciseName];
  
  // 模糊匹配:遍历 keys,看动作名是否包含某个 key 或反之
  for (const [key, val] of Object.entries(VIDEO_MAP)) {
    // 去掉括号内容比较
    const cleanName = exerciseName.replace(/[(（].*?[)）]/g, '').trim();
    const cleanKey = key.replace(/[(（].*?[)）]/g, '').trim();
    if (cleanName === cleanKey || 
        cleanName.includes(cleanKey) || 
        cleanKey.includes(cleanName)) {
      return val;
    }
  }
  
  // 完全没匹配,返回默认搜索
  return { q: exerciseName + ' 教学' };
}

// IndexedDB 数据库
// ============================================================
const DB_NAME = 'PostureRecoveryApp';
const DB_VERSION = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onerror = () => reject(request.error);
    request.onsuccess = () => { db = request.result; resolve(db); };
    request.onupgradeneeded = (e) => {
      const database = e.target.result;
      if (!database.objectStoreNames.contains('workoutLogs')) {
        const store = database.createObjectStore('workoutLogs', { keyPath: 'id', autoIncrement: true });
        store.createIndex('date', 'date');
        store.createIndex('exerciseId', 'exerciseId');
      }
      if (!database.objectStoreNames.contains('exerciseNotes')) {
        const store = database.createObjectStore('exerciseNotes', { keyPath: 'id', autoIncrement: true });
        store.createIndex('exerciseId', 'exerciseId');
        store.createIndex('createdAt', 'createdAt');
      }
      if (!database.objectStoreNames.contains('media')) {
        const store = database.createObjectStore('media', { keyPath: 'id', autoIncrement: true });
        store.createIndex('noteId', 'noteId');
      }
      if (!database.objectStoreNames.contains('dailyHabits')) database.createObjectStore('dailyHabits', { keyPath: 'date' });
      if (!database.objectStoreNames.contains('bodyMetrics')) {
        const store = database.createObjectStore('bodyMetrics', { keyPath: 'id', autoIncrement: true });
        store.createIndex('date', 'date');
        store.createIndex('metricId', 'metricId');
      }
      if (!database.objectStoreNames.contains('settings')) database.createObjectStore('settings', { keyPath: 'key' });
    };
  });
}

function dbAdd(storeName, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).add(data);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbPut(storeName, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).put(data);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbGet(storeName, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbGetAll(storeName) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbGetByIndex(storeName, indexName, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).index(indexName).getAll(value);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbDelete(storeName, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).delete(key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// ============================================================
// LocalStorage 主存储层 (绕过 iOS PWA IndexedDB 不稳定问题)
// ============================================================
// 关键设计决定:
// - iOS 17+ PWA 模式下 IndexedDB 在版本更新/缓存清理时会丢数据(已知 bug)
// - localStorage 明显更稳定,几乎不会因为 PWA 升级丢失
// - 数据量评估: 每条评论几百字节,1000 条 < 500KB, localStorage 5MB 限额够用很久
// - IndexedDB 仍用于存放大文件(media)和作为影子备份

const LS_PREFIX = 'pwa_';
const LS_STORES = ['workoutLogs', 'exerciseNotes', 'dailyHabits', 'bodyMetrics', 'settings'];

function lsRead(storeName) {
  try {
    const raw = localStorage.getItem(LS_PREFIX + storeName);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    console.error(`lsRead ${storeName} 失败:`, e);
    return [];
  }
}

function lsWrite(storeName, list) {
  try {
    localStorage.setItem(LS_PREFIX + storeName, JSON.stringify(list));
    return true;
  } catch (e) {
    console.error(`lsWrite ${storeName} 失败:`, e);
    alert(`⚠ localStorage 写入失败: ${e.message}\n\n可能存储已满,建议立即导出 JSON 备份`);
    return false;
  }
}

function lsNextId(storeName) {
  const key = LS_PREFIX + 'nextId_' + storeName;
  const cur = parseInt(localStorage.getItem(key) || '0', 10) + 1;
  localStorage.setItem(key, String(cur));
  return cur;
}

// 启动时迁移: 如果 IDB 有数据但 LS 没有,迁移过来(从老版本升级到 v8.3 的兼容)
async function migrateFromIDB() {
  let migrated = 0;
  const summary = [];
  for (const store of LS_STORES) {
    try {
      const ls = lsRead(store);
      if (ls.length > 0) continue;
      const idbData = await _idbGetAll(store);
      if (idbData && idbData.length > 0) {
        lsWrite(store, idbData);
        // 维护 nextId
        const maxId = Math.max(0, ...idbData.map(x => parseInt(x.id) || 0));
        if (maxId > 0) {
          localStorage.setItem(LS_PREFIX + 'nextId_' + store, String(maxId));
        }
        migrated += idbData.length;
        summary.push(`${store}: ${idbData.length}`);
      }
    } catch (e) {
      console.error(`migrate ${store} 失败:`, e);
    }
  }
  return { migrated, summary };
}

// 数据访问路由层
// ============================================================
// 关键: 所有调用 dbXxx 的地方实际上路由到 localStorage(对 LS_STORES)
// 或 IndexedDB(对 media 等大文件)

function _isLSStore(storeName) { return LS_STORES.indexOf(storeName) >= 0; }

// 保留原始 IDB 函数(用于 media 等大数据,以及 ls 函数内部影子写入)
function _idbAdd(storeName, data) {

    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function _idbPut(storeName, data) {
  return new Promise((resolve, reject) => {
    if (!db) return reject(new Error('db not opened'));

    const req = tx.objectStore(storeName).put(data);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function _idbGet(storeName, key) {
  return new Promise((resolve, reject) => {
    if (!db) return reject(new Error('db not opened'));
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);

}
function _idbGetAll(storeName) {
  return new Promise((resolve, reject) => {
    if (!db) return reject(new Error('db not opened'));
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);

}
function _idbGetByIndex(storeName, indexName, value) {
  return new Promise((resolve, reject) => {
    if (!db) return reject(new Error('db not opened'));
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).index(indexName).getAll(value);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function _idbDelete(storeName, key) {
  return new Promise((resolve, reject) => {
    if (!db) return reject(new Error('db not opened'));
    const tx = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).delete(key);
    req.onsuccess = () => resolve();

}

// 路由函数 (原 dbXxx 调用方不需要改动)
async function dbAdd(storeName, data) {
  if (_isLSStore(storeName)) return _lsAdd(storeName, data);
  return _idbAdd(storeName, data);
}
async function dbPut(storeName, data) {
  if (_isLSStore(storeName)) return _lsPut(storeName, data);
  return _idbPut(storeName, data);
}

  if (_isLSStore(storeName)) return _lsGet(storeName, key);
  return _idbGet(storeName, key);

  return _idbGetAll(storeName);
}

// ============================================================
// LocalStorage 实际操作 (所有 LS_STORES 数据走这里)
// ============================================================

async function _lsAdd(storeName, data) {
  const list = lsRead(storeName);
  const item = { ...data };
  if (item.id === undefined) item.id = lsNextId(storeName);
  list.push(item);
  lsWrite(storeName, list);
  // 影子写 IDB
  try { await _idbAdd(storeName, item); } catch (e) { /* 容错: IDB 失败不影响 */ }
  return item.id;
}

async function _lsPut(storeName, data) {
  const list = lsRead(storeName);
  let keyField;
  if (storeName === 'dailyHabits') keyField = 'date';
  else if (storeName === 'settings') keyField = 'key';
  else keyField = 'id';
  const key = data[keyField];
  
  const idx = list.findIndex(x => x[keyField] === key);
  if (idx >= 0) list[idx] = data;
  else list.push(data);
  lsWrite(storeName, list);
  
  try { await _idbPut(storeName, data); } catch (e) { /* 容错 */ }
  return key;
}

async function _lsGet(storeName, key) {
  const list = lsRead(storeName);
  let keyField;
  if (storeName === 'dailyHabits') keyField = 'date';
  else if (storeName === 'settings') keyField = 'key';
  else keyField = 'id';
  return list.find(x => x[keyField] === key);
}

async function _lsGetAll(storeName) {
  return lsRead(storeName);
}

async function _lsGetByIndex(storeName, indexName, value) {
  const list = lsRead(storeName);
  return list.filter(x => x[indexName] === value);
}

async function _lsDelete(storeName, key) {
  const list = lsRead(storeName);
  let keyField;
  if (storeName === 'dailyHabits') keyField = 'date';
  else if (storeName === 'settings') keyField = 'key';
  else keyField = 'id';
  const idx = list.findIndex(x => x[keyField] === key);
  if (idx >= 0) {
    list.splice(idx, 1);
    lsWrite(storeName, list);
  }
  try { await _idbDelete(storeName, key); } catch (e) { /* 容错 */ }
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDate(d) {
  if (typeof d === 'string') d = new Date(d);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDateTime(d) {
  if (typeof d === 'string' || typeof d === 'number') d = new Date(d);
  return `${fmtDate(d)} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

async function getCurrentWeekDay() {
  const startDate = await getSetting('startDate');
  if (!startDate) {
    // 防御性兜底: 理论上 ensureStartDate() 在启动时已经写入,不会走到这里
    console.warn('getCurrentWeekDay: startDate 未设置,使用紧急 fallback');
    const today = new Date();
    const dayOfWeek = today.getDay();
    const dayIdx = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    return { weekNum: 3, dayIdx };
  }
  const start = new Date(startDate);
  start.setHours(0, 0, 0, 0);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diffDays = Math.floor((today - start) / (24 * 60 * 60 * 1000));
  if (diffDays < 0) return { weekNum: 3, dayIdx: 0 };
  const dayOfWeek = today.getDay();
  const dayIdx = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
  const weekOffset = Math.floor(diffDays / 7);
  return { weekNum: 3 + weekOffset, dayIdx };
}

// 当前查看的日期(null = 今天)
let viewingDate = null; // YYYY-MM-DD 字符串或 null

function getViewingDateStr() {
  return viewingDate || todayStr();
}

function isViewingToday() {
  return !viewingDate || viewingDate === todayStr();
}

// 根据任意日期计算 weekNum 和 dayIdx
async function getWeekDayForDate(dateStr) {
  const startDate = await getSetting('startDate');
  let effectiveStart;
  if (!startDate) {
    // 防御性兜底: 理论上 ensureStartDate() 在启动时已经写入
    console.warn('getWeekDayForDate: startDate 未设置,使用紧急 fallback');
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const dayOfWeek = today.getDay();
    const daysToMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    effectiveStart = new Date(today);
    effectiveStart.setDate(today.getDate() - daysToMonday);
  } else {
    effectiveStart = new Date(startDate);
    effectiveStart.setHours(0, 0, 0, 0);
  }
  const target = new Date(dateStr);
  target.setHours(0, 0, 0, 0);
  const diffDays = Math.floor((target - effectiveStart) / (24 * 60 * 60 * 1000));
  const dayOfWeek = target.getDay();
  const dayIdx = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
  const weekOffset = Math.floor(diffDays / 7);
  const weekNum = 3 + weekOffset;
  return { weekNum, dayIdx, diffDays };
}

function navigateDate(delta) {
  const current = viewingDate ? new Date(viewingDate) : new Date();
  current.setDate(current.getDate() + delta);
  const newDateStr = fmtDate(current);
  // 如果切回今天,清空 viewingDate
  if (newDateStr === todayStr()) {
    viewingDate = null;
  } else {
    viewingDate = newDateStr;
  }
  renderToday();
}

function jumpToToday() {
  viewingDate = null;
  renderToday();
}

function getRelativeDayLabel(dateStr) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const target = new Date(dateStr);
  target.setHours(0, 0, 0, 0);
  const diff = Math.round((target - today) / (24 * 60 * 60 * 1000));
  if (diff === 0) return '今天';
  if (diff === -1) return '昨天';
  if (diff === 1) return '明天';
  if (diff === -2) return '前天';
  if (diff === 2) return '后天';
  if (diff < 0) return `${-diff} 天前`;
  return `${diff} 天后`;
}

async function renderToday() {
  const view = document.getElementById('view-today');
  const dateStr = getViewingDateStr();
  const isToday = isViewingToday();
  const isFuture = !isToday && new Date(dateStr) > new Date(todayStr());
  const isPast = !isToday && !isFuture;
  
  const { weekNum, dayIdx } = await getWeekDayForDate(dateStr);
  const weekData = getWeekData(weekNum);
  
  // ====== 日期导航条(始终显示) ======
  const weekdayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
  const d = new Date(dateStr);
  const weekdayLabel = weekdayNames[d.getDay()];
  const relLabel = getRelativeDayLabel(dateStr);
  
  let navHtml = `
    <div class="date-nav">
      <button class="date-nav-btn" onclick="navigateDate(-1)">‹</button>
      <div class="date-nav-center">
        <div class="date-nav-date">${dateStr} · ${weekdayLabel}</div>
        <div class="date-nav-rel ${isToday ? 'today-rel' : ''}">${relLabel}</div>
      </div>
      <button class="date-nav-btn" onclick="navigateDate(1)">›</button>
      <button class="date-nav-today-btn ${isToday ? 'current' : ''}" onclick="jumpToToday()">今天</button>
    </div>`;
  
  // 未配置的情况
  if (!weekData) {
    view.innerHTML = navHtml + `
      <div class="today-header">
        <div class="today-title">该日期超出计划范围</div>
        <div class="today-meta"><span>Week ${weekNum} 数据未配置</span></div>
      </div>
      <div class="empty">计划当前覆盖 Week 3-6,后续阶段会陆续加入</div>`;
    return;
  }
  
  const day = weekData.days[dayIdx];
  const logs = await dbGetByIndex('workoutLogs', 'date', dateStr);
  
  let html = navHtml;
  
  // 非今天的提示条
  if (isPast) {
    html += `<div class="date-mode-banner">
      <span>📋</span>
      <span>历史日期:可查看与补录</span>
    </div>`;
  } else if (isFuture) {
    html += `<div class="date-mode-banner future">
      <span>👁</span>
      <span>未来日期:预览模式,不可勾选</span>
    </div>`;
  }
  
  html += `
    <div class="today-header">
      <div class="today-date">${weekData.phase}</div>
      <div class="today-title">${escHtml(day.title)}</div>
      <div class="today-meta">
        <span>📅 Week ${weekNum} · ${day.dayName}</span>
        <span>${day.dayType === 'training' ? '💪 训练日' : day.dayType === 'recovery' ? '🌿 恢复日' : '😴 休息日'}</span>
      </div>
    </div>`;

  if (weekData.note && isToday) {
    html += `<div class="card" style="border-color: var(--warn); background: rgba(196,125,74,0.05);">
      <div style="font-size: 12px; color: var(--warn); letter-spacing: 0.1em; margin-bottom: 4px;">⚠ 本周提示</div>
      <div style="font-size: 13px; color: var(--text-1);">${escHtml(weekData.note)}</div>
    </div>`;
  }
  
  // 计算进度
  let totalEx = 0, doneEx = 0;
  if (day.dayType === 'training' && day.groups) {
    totalEx += PLAN_DATA.morningTemplate.exercises.length + PLAN_DATA.warmupTemplate.exercises.length;
    PLAN_DATA.morningTemplate.exercises.forEach(ex => { if (logs.find(l => l.exerciseId === ex.id && l.completed)) doneEx++; });
    PLAN_DATA.warmupTemplate.exercises.forEach(ex => { if (logs.find(l => l.exerciseId === ex.id && l.completed)) doneEx++; });
    day.groups.forEach(group => group.exercises.forEach(ex => {
      totalEx++;
      if (logs.find(l => l.exerciseId === ex.id && l.completed)) doneEx++;
    }));
  } else {
    totalEx = PLAN_DATA.morningTemplate.exercises.length;
    PLAN_DATA.morningTemplate.exercises.forEach(ex => { if (logs.find(l => l.exerciseId === ex.id && l.completed)) doneEx++; });
  }

  const pct = totalEx > 0 ? Math.round(doneEx / totalEx * 100) : 0;
  const progressLabel = isToday ? '今日完成进度' : isPast ? '当日完成情况' : '计划动作数';
  html += `
    <div class="progress-summary">
      <div class="progress-summary-text">${progressLabel}</div>
      <div class="progress-summary-num">${doneEx}<small>/${totalEx} · ${pct}%</small></div>
    </div>`;

  const readonly = isFuture;
  
  html += await renderExerciseGroup({
    title: PLAN_DATA.morningTemplate.name,
    description: PLAN_DATA.morningTemplate.description,
    duration: PLAN_DATA.morningTemplate.duration,
    exercises: PLAN_DATA.morningTemplate.exercises
  }, logs, readonly);

  if (day.dayType === 'training' && day.groups) {
    html += await renderExerciseGroup({
      title: PLAN_DATA.warmupTemplate.name,
      description: PLAN_DATA.warmupTemplate.description,
      duration: PLAN_DATA.warmupTemplate.duration,
      exercises: PLAN_DATA.warmupTemplate.exercises
    }, logs, readonly);

    for (const group of day.groups) {
      html += await renderExerciseGroup({
        title: group.title,
        description: group.description,
        exercises: group.exercises
      }, logs, readonly);
    }
  } else {
    html += `<div class="card">
      <div style="font-size: 13px; color: var(--text-1); line-height: 1.7;">${escHtml(day.description || '')}</div>
    </div>`;
  }
  
  view.innerHTML = html;
  
  view.querySelectorAll('.checkbox').forEach(el => {
    el.addEventListener('click', async () => {
      if (el.classList.contains('readonly')) {
        showToast('未来日期不可勾选');
        return;
      }
      await toggleExerciseDone(el.dataset.exid, getViewingDateStr());
      renderToday();
    });
  });
  view.querySelectorAll('.action-btn[data-action="note"]').forEach(el => {
    el.addEventListener('click', () => openNoteModal(el.dataset.exid, el.dataset.exname));
  });
  view.querySelectorAll('.action-btn[data-action="video"]').forEach(el => {
    el.addEventListener('click', () => openVideoModal(el.dataset.exname));
  });
}

async function renderExerciseGroup(group, logs, readonly = false) {
  let html = `
    <div class="exercise-group">
      <div class="exercise-group-title">
        <span>${escHtml(group.title)}</span>
        ${group.duration ? `<span class="exercise-group-title-meta">${escHtml(group.duration)}</span>` : ''}
      </div>`;
  if (group.description) {
    html += `<div style="font-size: 12px; color: var(--text-2); margin-bottom: 10px; font-style: italic;">${escHtml(group.description)}</div>`;
  }
  
  for (const ex of group.exercises) {
    const log = logs.find(l => l.exerciseId === ex.id);
    const done = log && log.completed;
    const allNotes = await dbGetByIndex('exerciseNotes', 'exerciseId', ex.id);
    const noteCount = allNotes.length;
    
    // 找到最近一条记录摘要(用于在卡片上直接展示)
    let lastNotePreview = '';
    if (noteCount > 0) {
      const sorted = [...allNotes].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      const latest = sorted[0];
      const dateOnly = fmtDate(latest.createdAt);
      // 提取文本前 60 字
      const previewText = (latest.text || '').replace(/\n+/g, ' / ').slice(0, 60);
      const ellipsis = (latest.text || '').length > 60 ? '...' : '';
      lastNotePreview = `
        <div class="last-note-preview">
          <span class="last-note-date">📌 ${dateOnly}</span>
          <span class="last-note-text">${escHtml(previewText)}${ellipsis}</span>
        </div>`;
    }
    
    html += `
      <div class="exercise-card${done ? ' done' : ''}">
        <div class="exercise-row">
          <div class="checkbox${done ? ' checked' : ''}${readonly ? ' readonly' : ''}" data-exid="${ex.id}" style="${readonly ? 'opacity: 0.4; cursor: not-allowed;' : ''}"></div>
          <div class="exercise-content">
            <div class="exercise-name">${escHtml(ex.name)}</div>
            <div class="exercise-meta">
              ${ex.sets ? `<span>📋 ${escHtml(ex.sets)}</span>` : ''}
              ${ex.weight ? `<span>⚖ ${escHtml(ex.weight)}</span>` : ''}
            </div>
            ${ex.tip ? `<div class="exercise-tip">${escHtml(ex.tip)}</div>` : ''}
            ${lastNotePreview}
            <div class="exercise-actions">
              <button class="action-btn ${noteCount > 0 ? 'has-content' : ''}" data-action="note" data-exid="${ex.id}" data-exname="${escHtml(ex.name)}">
                📝 记录
                ${noteCount > 0 ? `<span class="action-btn-count">${noteCount}</span>` : ''}
              </button>
              <button class="action-btn video-btn" data-action="video" data-exname="${escHtml(ex.name)}">
                🎬 视频
              </button>
            </div>
          </div>
        </div>
      </div>`;
  }
  html += `</div>`;
  return html;
}

async function toggleExerciseDone(exerciseId, dateStr) {
  const date = dateStr || todayStr();
  const logs = await dbGetByIndex('workoutLogs', 'date', date);
  const existing = logs.find(l => l.exerciseId === exerciseId);
  if (existing) {
    existing.completed = !existing.completed;
    existing.completedAt = existing.completed ? new Date().toISOString() : null;
    await dbPut('workoutLogs', existing);
  } else {
    await dbAdd('workoutLogs', { date, exerciseId, completed: true, completedAt: new Date().toISOString() });
  }
}

    </div>

  HABITS.toggle.forEach(habit => {
    const checked = todayHabits.habits[habit.id];
    html += `
      <div class="habit-card ${checked ? 'checked' : ''}" onclick="toggleHabit('${habit.id}')">
        <div class="habit-icon">${habit.icon}</div>
        <div class="habit-name">${habit.name}</div>
      </div>`;
  });
  html += `</div>`;
  
  html += `<div class="section-title"><span>计数项</span></div>`;

    const count = todayHabits.counters[habit.id] || 0;
    html += `
      <div class="habit-counter">
        <div>
          <div class="habit-counter-name">${habit.name}</div>
          <div class="text-small text-dim">目标:${habit.target} ${habit.unit}</div>
        </div>
        <div class="habit-counter-controls">
          <button class="habit-counter-btn" onclick="changeCounter('${habit.id}', -1)">−</button>
          <div class="habit-counter-num">${count}</div>
          <button class="habit-counter-btn" onclick="changeCounter('${habit.id}', 1)">+</button>
        </div>
      </div>`;
  });
  
  html += `<div class="spacer-lg"></div><div class="section-title"><span>本周完成</span></div>`;
  const weekDays = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    weekDays.push(fmtDate(d));
  }
  const weekData = await Promise.all(weekDays.map(d => dbGet('dailyHabits', d)));
  const weekDataNorm = weekData.map(d => d || { habits: {}, counters: {} });
  let weekTotal = 0, weekDone = 0;
  weekDataNorm.forEach(d => {
    weekTotal += HABITS.toggle.length;
    HABITS.toggle.forEach(h => { if (d.habits[h.id]) weekDone++; });
  });
  const weekPct = weekTotal > 0 ? Math.round(weekDone / weekTotal * 100) : 0;
  
  html += `
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center;">

      </div>
    </div>`;
  
  view.innerHTML = html;
}

async function toggleHabit(habitId) {
  const today = todayStr();
  let data = await dbGet('dailyHabits', today) || { date: today, habits: {}, counters: {} };
  data.habits[habitId] = !data.habits[habitId];
  await dbPut('dailyHabits', data);
  renderHabits();
}

async function changeCounter(habitId, delta) {
  const today = todayStr();
  let data = await dbGet('dailyHabits', today) || { date: today, habits: {}, counters: {} };
  data.counters[habitId] = Math.max(0, (data.counters[habitId] || 0) + delta);
  await dbPut('dailyHabits', data);
  renderHabits();
}

function drawBarChart(canvasId, labels, data) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);
  const padding = { top: 10, right: 10, bottom: 20, left: 20 };
  const cw = w - padding.left - padding.right;
  const ch = h - padding.top - padding.bottom;
  const max = Math.max(...data, 1);
  const barW = cw / data.length * 0.7;
  const gap = cw / data.length * 0.3;
  data.forEach((val, i) => {
    const x = padding.left + i * (cw / data.length) + gap / 2;
    const bh = (val / max) * ch;
    const y = padding.top + ch - bh;
    ctx.fillStyle = val > 0 ? '#d4af37' : '#2d2d2d';
    ctx.fillRect(x, y, barW, bh || 1);
  });
  ctx.fillStyle = '#6e6a62';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'center';
  [0, Math.floor(data.length/2), data.length-1].forEach(i => {
    const x = padding.left + i * (cw / data.length) + (cw / data.length) / 2;
    ctx.fillText(labels[i], x, h - 6);
  });
}

function drawLineChart(canvasId, labels, data) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);
  const padding = { top: 10, right: 10, bottom: 20, left: 30 };
  const cw = w - padding.left - padding.right;
  const ch = h - padding.top - padding.bottom;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  ctx.strokeStyle = '#2d2d2d';
  ctx.lineWidth = 1;
  for (let i = 0; i < 4; i++) {
    const y = padding.top + (ch / 3) * i;
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(padding.left + cw, y);
    ctx.stroke();
  }
  ctx.strokeStyle = '#d4af37';
  ctx.lineWidth = 2;
  ctx.beginPath();
  data.forEach((val, i) => {
    const x = padding.left + (cw / Math.max(data.length - 1, 1)) * i;
    const y = padding.top + ch - ((val - min) / range) * ch;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();
  ctx.fillStyle = '#d4af37';
  data.forEach((val, i) => {
    const x = padding.left + (cw / Math.max(data.length - 1, 1)) * i;
    const y = padding.top + ch - ((val - min) / range) * ch;
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.fillStyle = '#6e6a62';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(max.toFixed(1), padding.left - 4, padding.top + 4);
  ctx.fillText(min.toFixed(1), padding.left - 4, padding.top + ch);
  ctx.textAlign = 'center';
  if (labels.length > 0) {
    ctx.fillText(labels[0], padding.left, h - 4);
    ctx.fillText(labels[labels.length - 1], padding.left + cw, h - 4);
  }
}

let currentNoteExerciseId = null;

async function openNoteModal(exerciseId, exerciseName) {

      ${notes.length === 0 ? '<div class="empty">还没有记录，创建第一条吧</div>' : ''}
    </div>`;
  
  document.getElementById('note-modal-body').innerHTML = html;
  
  const listEl = document.getElementById('note-list');
  for (const note of notes) {
    const noteEl = document.createElement('div');
    noteEl.className = 'note-item';
    const mediaItems = await dbGetByIndex('media', 'noteId', note.id);
    let mediaHtml = '';
    if (mediaItems.length > 0) {
      mediaHtml = '<div class="note-item-media">';
      for (const m of mediaItems) {
        const url = URL.createObjectURL(m.blob);
        if (m.type === 'image') {
          mediaHtml += `<div class="note-item-media-thumb" onclick="viewMedia('image', '${url}')"><img src="${url}" alt=""></div>`;
        } else {
          mediaHtml += `<div class="note-item-media-thumb" onclick="viewMedia('video', '${url}')"><video src="${url}" muted></video><div class="video-tag">视频</div></div>`;
        }
      }
      mediaHtml += '</div>';
    }
    noteEl.innerHTML = `
      <div class="note-item-header">
        <div class="note-item-date">${fmtDateTime(note.createdAt)}</div>
        <div class="note-item-delete" onclick="deleteNote(${note.id})">删除</div>
      </div>
      <div class="note-item-text">${escHtml(note.text)}</div>
      ${mediaHtml}`;
    listEl.appendChild(noteEl);
  }
  
  document.getElementById('note-modal').classList.add('show');
}

function selectTemplate(templateId) {
  const template = NOTE_TEMPLATES.find(t => t.id === templateId);
  if (!template) return;
  document.querySelectorAll('.template-btn').forEach(b => b.classList.toggle('active', b.dataset.template === templateId));
  const textarea = document.getElementById('note-input');
  if (template.content && (!textarea.value || confirm('替换当前内容?'))) {
    textarea.value = template.content;
  }
}

function handleMediaUpload(event, type) {
  const files = event.target.files;
  for (const file of files) {
    const reader = new FileReader();
    reader.onload = (e) => {
      currentNoteMedia.push({ type, blob: file, dataUrl: e.target.result });
      renderMediaPreview();
    };
    reader.readAsDataURL(file);
  }
  event.target.value = '';
}

function renderMediaPreview() {
  const preview = document.getElementById('media-preview');
  preview.innerHTML = currentNoteMedia.map((m, i) => `
    <div class="media-preview-item">
      ${m.type === 'image' ? `<img src="${m.dataUrl}" alt="">` : `<video src="${m.dataUrl}" muted></video><div class="video-tag">视频</div>`}
      <div class="media-preview-remove" onclick="removeMedia(${i})">×</div>
    </div>`).join('');
}

function removeMedia(idx) {
  currentNoteMedia.splice(idx, 1);
  renderMediaPreview();
}

async function saveNote() {
  const text = document.getElementById('note-input').value.trim();
  if (!text && currentNoteMedia.length === 0) {
    showToast('请输入内容或上传媒体');
    return;
  }
  
  const noteData = {
    exerciseId: currentNoteExerciseId,
    text,
    createdAt: new Date().toISOString()
  };
  
  let noteId = null;
  try {
    // dbAdd 现在路由到 localStorage 主存储 + IDB 影子写入
    noteId = await dbAdd('exerciseNotes', noteData);
    
    // 立即回读验证
    const all = await dbGetAll('exerciseNotes');
    const found = all.find(n => n.id === noteId);
    if (!found || found.text !== text) {
      throw new Error('回读验证失败');
    }
  } catch (e) {
    console.error('保存评论失败:', e);
    alert(`⚠ 保存失败: ${e.message}\n\n请截图反馈`);
    return;
  }
  
  // 保存媒体到 IDB(媒体仍走 IDB,localStorage 装不下大文件)
  for (const m of currentNoteMedia) {
    try {
      await _idbAdd('media', {
        noteId, type: m.type, blob: m.blob, filename: m.blob.name || `${m.type}-${Date.now()}`
      });
    } catch (e) {
      console.error('媒体保存失败:', e);
    }
  }
  
  showToast(`✓ 已保存 (评论 #${noteId})`);
  closeNoteModal();
  renderToday();
}

async function deleteNote(noteId) {
  if (!confirm('删除这条记录?')) return;
  await dbDelete('exerciseNotes', noteId);
  const mediaItems = await dbGetByIndex('media', 'noteId', noteId);
  for (const m of mediaItems) await dbDelete('media', m.id);
  openNoteModal(currentNoteExerciseId, currentNoteExerciseName);
}

function closeNoteModal(event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById('note-modal').classList.remove('show');
  currentNoteExerciseId = null;
  currentNoteMedia = [];
}

function viewMedia(type, url) {
  const viewer = document.getElementById('media-viewer');
  const content = document.getElementById('media-viewer-content');
  if (type === 'image') content.innerHTML = `<img src="${url}" alt="">`;
  else content.innerHTML = `<video src="${url}" controls autoplay></video>`;
  viewer.classList.add('show');
}

function closeMediaViewer() {
  document.getElementById('media-viewer').classList.remove('show');
  document.getElementById('media-viewer-content').innerHTML = '';
}

// 尝试唤起 Bilibili App,失败后回退到网页
function openBilibiliSearch(searchQuery) {
  const encodedQuery = encodeURIComponent(searchQuery);
  const schemeUrl = `bilibili://search?keyword=${encodedQuery}`;
  const webUrl = `https://m.bilibili.com/search?keyword=${encodedQuery}`;
  
  // iOS 上尝试唤起 App
  // 如果 App 没装,scheme 调用会"失败"但没有明确回调
  // 策略: 先立即尝试 scheme,然后 1.5 秒后如果页面还在(说明 App 没被唤起),打开网页
  const startTime = Date.now();
  
  // 用 location.href 触发 scheme(比 window.open 更可靠)
  try {
    window.location.href = schemeUrl;
  } catch (e) {
    // 某些浏览器 scheme 失败会抛异常,直接走 fallback
    window.open(webUrl, '_blank');
    return;
  }
  
  // Fallback: 如果 1.5 秒后页面还在前台,说明 App 没被唤起(没装或 scheme 失效)
  setTimeout(() => {
    // 如果页面被切到后台(App 唤起成功),document.hidden 会变 true
    // 如果还在前台,说明没被唤起,打开网页
    const elapsed = Date.now() - startTime;
    if (elapsed < 3000 && !document.hidden) {
      window.open(webUrl, '_blank');
    }
  }, 1500);
}

async function exportJSON() {
  const data = {
    exportedAt: new Date().toISOString(),
    appVersion: "8.5",
    workoutLogs: await dbGetAll('workoutLogs'),
    exerciseNotes: await dbGetAll('exerciseNotes'),
    dailyHabits: await dbGetAll('dailyHabits'),
    bodyMetrics: await dbGetAll('bodyMetrics'),
    settings: await dbGetAll('settings'),
    media: []
  };
  const mediaItems = await dbGetAll('media');
  for (const m of mediaItems) {
    const reader = new FileReader();
    const dataUrl = await new Promise(resolve => {
      reader.onload = () => resolve(reader.result);
      reader.readAsDataURL(m.blob);
    });
    data.media.push({ id: m.id, noteId: m.noteId, type: m.type, filename: m.filename, dataUrl });
  }
  
  // 关键容错: 合并 localStorage 备份中 IDB 没有的评论
  let recoveredFromBackup = 0;
  try {
    const backups = JSON.parse(localStorage.getItem('noteBackup') || '[]');
    if (backups.length > 0) {
      const idbSigs = new Set(data.exerciseNotes.map(n => `${n.exerciseId}|${n.createdAt}|${n.text}`));
      for (const b of backups) {
        const sig = `${b.exerciseId}|${b.createdAt}|${b.text}`;
        if (!idbSigs.has(sig)) {
          data.exerciseNotes.push({
            exerciseId: b.exerciseId,
            text: b.text,
            createdAt: b.createdAt,
            _source: 'localStorage_backup'
          });
          recoveredFromBackup++;
        }
      }
    }
  } catch (e) {
    console.error('合并 localStorage 备份失败:', e);
  }
  
  // 导出前显示预览
  let preview = `【导出数据预览】\n\n` +
    `• 训练记录 (勾选完成): ${data.workoutLogs.length} 条\n` +
    `• 动作记录 (评论 + 媒体引用): ${data.exerciseNotes.length} 条\n`;
  if (recoveredFromBackup > 0) {
    preview += `  其中从 localStorage 备份补回: ${recoveredFromBackup} 条\n`;
  }
  preview += `• 习惯打卡: ${data.dailyHabits.length} 天\n` +
    `• 体测数据: ${data.bodyMetrics.length} 条\n` +

  md += `1. 训练完成情况和趋势\n2. 习惯执行情况\n3. 体测数据变化和意义\n`;
  md += `4. 主要薄弱环节(基于动作记录)\n5. 下一阶段调整建议\n\n`;

  md += `- 训练天数: ${trainingDays.size}\n\n`;
  
  md += `### 近 14 天每日完成动作数\n\n| 日期 | 动作数 |\n|------|--------|\n`;
  for (let i = 13; i >= 0; i--) {
    const d = new Date();

    const date = fmtDate(d);
    const count = allLogs.filter(l => l.date === date && l.completed).length;
    md += `| ${date} | ${count} |\n`;

  md += `\n`;

    records.forEach(r => { md += `| ${fmtDate(r.date)} | ${r.value} |\n`; });

  if (recentNotes.length === 0) {
    md += `(暂无记录)\n\n`;
  } else {
    const allEx = getAllExercises();
    for (const note of recentNotes) {
      const ex = allEx.find(e => e.id === note.exerciseId);
      const exName = ex ? ex.name : note.exerciseId;

  md += `- 上交叉综合征(肩胛稳定差、上斜方紧、富贵包、圆肩)\n`;
  md += `- 核心稳定不足、放松态小腹突出\n`;
  md += `- 臀中肌弱、足弓/踝稳定差、O 型腿\n`;

  return md;

async function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  // 询问导入模式
  const replaceMode = confirm(
    '【导入数据】\n\n' +
    '点击「确定」 → 覆盖模式: 清空当前数据后导入(危险!会丢失现有数据)\n' +
    '点击「取消」 → 合并模式: 保留现有数据,把导入的新数据合并进来 (推荐)'
  );
  
  if (replaceMode) {
    // 二次确认覆盖
    if (!confirm('⚠ 覆盖模式会清空当前所有数据\n\n确定继续?建议先点「数据诊断」备份当前数据')) {
      event.target.value = '';
      return;
    }
  }
  
  const text = await file.text();
  try {
    const data = JSON.parse(text);
    
    const stats = {
      workoutLogs: (data.workoutLogs || []).length,
      exerciseNotes: (data.exerciseNotes || []).length,
      dailyHabits: (data.dailyHabits || []).length,
      bodyMetrics: (data.bodyMetrics || []).length,
      settings: (data.settings || []).length,
      media: (data.media || []).length
    };
    
    // 覆盖模式: 先清空
    if (replaceMode) {
      const stores = ['workoutLogs', 'exerciseNotes', 'dailyHabits', 'bodyMetrics', 'settings', 'media'];
      for (const store of stores) {
        const all = await dbGetAll(store);
        for (const item of all) {
          const key = store === 'dailyHabits' ? item.date : (store === 'settings' ? item.key : item.id);
          await dbDelete(store, key);
        }
      }
    }
    
    // 收集 import 前现有数据(用于合并去重)
    const existingLogs = replaceMode ? [] : await dbGetAll('workoutLogs');
    const existingNotes = replaceMode ? [] : await dbGetAll('exerciseNotes');
    const existingMetrics = replaceMode ? [] : await dbGetAll('bodyMetrics');
    
    const errors = [];
    let logsCount = 0, notesCount = 0, habitsCount = 0, metricsCount = 0, settingsCount = 0, mediaCount = 0;
    let logsSkipped = 0, notesSkipped = 0, metricsSkipped = 0;
    
    // workoutLogs 去重: 同 date + exerciseId 视为重复
    for (const log of (data.workoutLogs || [])) {
      try {
        const isDup = !replaceMode && existingLogs.some(e => e.date === log.date && e.exerciseId === log.exerciseId);
        if (isDup) { logsSkipped++; continue; }
        const toStore = { ...log };
        delete toStore.id; // 让 IDB 自增 id 避免冲突
        await dbAdd('workoutLogs', toStore);
        logsCount++;
      } catch (e) { errors.push(`workoutLog: ${e.message}`); }
    }
    
    // exerciseNotes 去重: 同 exerciseId + createdAt + text 视为重复
    for (const note of (data.exerciseNotes || [])) {
      try {
        const isDup = !replaceMode && existingNotes.some(e => 
          e.exerciseId === note.exerciseId && 
          e.createdAt === note.createdAt && 
          e.text === note.text
        );
        if (isDup) { notesSkipped++; continue; }
        const toStore = { ...note };
        delete toStore.id;
        await dbAdd('exerciseNotes', toStore);
        notesCount++;
      } catch (e) { errors.push(`exerciseNote: ${e.message}`); }
    }
    
    // dailyHabits: 用 date 做 key,合并模式下保留现有(避免覆盖你今天已经打的卡)
    for (const habit of (data.dailyHabits || [])) {
      try {
        if (!habit.date) { errors.push(`habit 缺少 date 字段`); continue; }
        if (!replaceMode) {
          const existing = await dbGet('dailyHabits', habit.date);
          if (existing) {
            // 合并 habits 和 counters: 任意一边为 true 就保留
            const merged = {
              date: habit.date,
              habits: { ...habit.habits, ...existing.habits },
              counters: {}
            };
            const allCounterKeys = new Set([...Object.keys(habit.counters || {}), ...Object.keys(existing.counters || {})]);
            for (const k of allCounterKeys) {
              merged.counters[k] = Math.max(habit.counters?.[k] || 0, existing.counters?.[k] || 0);
            }
            await dbPut('dailyHabits', merged);
          } else {
            await dbPut('dailyHabits', habit);
          }
        } else {
          await dbPut('dailyHabits', habit);
        }
        habitsCount++;
      } catch (e) { errors.push(`habit: ${e.message}`); }
    }
    
    // bodyMetrics 去重: 同 metricId + date 视为重复(同一天同一指标只保留一条)
    for (const metric of (data.bodyMetrics || [])) {
      try {
        const isDup = !replaceMode && existingMetrics.some(e => 
          e.metricId === metric.metricId && e.date === metric.date
        );
        if (isDup) { metricsSkipped++; continue; }
        const toStore = { ...metric };
        delete toStore.id;
        await dbAdd('bodyMetrics', toStore);
        metricsCount++;
      } catch (e) { errors.push(`metric: ${e.message}`); }
    }
    
    // settings: 默认覆盖(同名 key 用导入的值)
    for (const setting of (data.settings || [])) {
      try {
        if (!setting.key) { errors.push(`setting 缺少 key 字段`); continue; }
        await dbPut('settings', setting);
        settingsCount++;
      } catch (e) { errors.push(`setting: ${e.message}`); }
    }
    
    // media: 全部加入(图片/视频通常不重复)
    for (const m of (data.media || [])) {
      try {
        if (!m.dataUrl) { errors.push(`media 缺少 dataUrl`); continue; }
        const res = await fetch(m.dataUrl);
        const blob = await res.blob();
        const toStore = { noteId: m.noteId, type: m.type, filename: m.filename, blob };
        // 注意: 不传 id, 让 IDB 自增, 避免和现有 media 的 id 冲突
        await dbAdd('media', toStore);
        mediaCount++;
      } catch (e) { errors.push(`media: ${e.message}`); }
    }
    
    let resultMsg = `${replaceMode ? '✓ 覆盖式' : '✓ 合并式'}导入完成:\n\n`;
    resultMsg += `• 训练记录: 新增 ${logsCount}${logsSkipped ? ' / 跳过重复 ' + logsSkipped : ''} (来源 ${stats.workoutLogs})\n`;
    resultMsg += `• 动作记录: 新增 ${notesCount}${notesSkipped ? ' / 跳过重复 ' + notesSkipped : ''} (来源 ${stats.exerciseNotes})\n`;
    resultMsg += `• 习惯打卡: ${habitsCount} (来源 ${stats.dailyHabits})\n`;
    resultMsg += `• 体测数据: 新增 ${metricsCount}${metricsSkipped ? ' / 跳过重复 ' + metricsSkipped : ''} (来源 ${stats.bodyMetrics})\n`;
    resultMsg += `• 设置: ${settingsCount} (来源 ${stats.settings})\n`;
    resultMsg += `• 媒体文件: ${mediaCount} (来源 ${stats.media})\n`;
    if (errors.length > 0) {
      resultMsg += `\n⚠ 错误 ${errors.length} 条:\n${errors.slice(0, 5).join('\n')}`;
    }
    alert(resultMsg);
    setTimeout(() => location.reload(), 500);
  } catch (e) {
    alert('导入失败: ' + e.message);
  }
}

      media.forEach(m => types[m.type] = (types[m.type] || 0) + 1);

    msg += `\n💡 数据库名: PostureRecoveryApp`;
    msg += `\n💡 当前 URL: ${window.location.href}`;
    
    // localStorage 备份诊断
    try {
      const backups = JSON.parse(localStorage.getItem('noteBackup') || '[]');
      msg += `\n\n🔒 localStorage 备份: ${backups.length} 条`;
      if (backups.length > 0) {
        const idbSavedCount = backups.filter(b => b.idbSaved).length;
        const idbFailedCount = backups.length - idbSavedCount;

          msg += `\n  ⚠ IDB 写入失败但已备份: ${idbFailedCount}`;

        const idbNotes = notes;
        const idbSigs = new Set(idbNotes.map(n => `${n.exerciseId}|${n.createdAt}|${n.text}`));
        const lostFromIDB = backups.filter(b => !idbSigs.has(`${b.exerciseId}|${b.createdAt}|${b.text}`)).length;

// ============================================================
// URL 参数导入 (用于快捷指令自动录入体测数据)
// ============================================================

/**
 * 解析 URL hash 参数
 * 格式: #import=1&weight=65.2&bodyfat=19.8&muscle=50.1&date=2026-04-22
 */
function parseHashParams() {
  const hash = window.location.hash.slice(1); // 去掉 #
  if (!hash) return null;
  const params = {};
  hash.split('&').forEach(pair => {
    const [key, value] = pair.split('=');
    if (key) params[decodeURIComponent(key)] = value ? decodeURIComponent(value) : '';
  });
  return params;
}

/**
 * 清除 URL hash 防止刷新重复导入
 */
function clearHash() {
  // 使用 replaceState 避免新增历史记录
  if (history.replaceState) {
    history.replaceState(null, '', window.location.pathname + window.location.search);
  } else {
    window.location.hash = '';
  }
}

/**
 * 处理从 URL 导入的体测数据
 * 支持字段:weight(kg), bodyfat(%), muscle(kg), date(YYYY-MM-DD)
 */
async function handleURLImport() {
  const params = parseHashParams();
  if (!params || params.import !== '1') return;
  
  const targetDate = params.date || todayStr();
  const toImport = [];
  
  // 字段映射:URL 参数名 → METRICS 中的 id
  const fieldMap = {
    weight: 'm-weight',
    bodyfat: 'm-bodyfat',
    muscle: 'm-muscle',
    deadhang: 'm-deadhang',
    singleleg_l: 'm-singleleg-l',
    singleleg_r: 'm-singleleg-r',
    sideplank_l: 'm-sideplank-l',
    sideplank_r: 'm-sideplank-r',
    pullup_assist: 'm-pullup-assist',
    tva: 'm-tva'
  };
  
  for (const [field, metricId] of Object.entries(fieldMap)) {
    if (params[field] && !isNaN(parseFloat(params[field]))) {
      const metric = METRICS.find(m => m.id === metricId);
      toImport.push({
        metricId,
        metricName: metric?.name || field,
        value: parseFloat(params[field]),
        unit: metric?.unit || ''
      });
    }
  }
  
  if (toImport.length === 0) {
    clearHash();
    return;
  }
  
  // 显示确认对话框
  const summary = toImport.map(item => `• ${item.metricName}: ${item.value} ${item.unit}`).join('\n');
  const confirmMsg = `检测到快捷指令传来的数据,确认导入到 ${targetDate}?\n\n${summary}`;
  
  if (!confirm(confirmMsg)) {
    clearHash();
    return;
  }
  
  // 检查当日该指标是否已有记录,有则更新,无则新增
  const existing = await dbGetAll('bodyMetrics');
  let imported = 0, updated = 0;
  
  for (const item of toImport) {
    const existingRecord = existing.find(r => r.metricId === item.metricId && r.date === targetDate);
    if (existingRecord) {
      existingRecord.value = item.value;
      existingRecord.createdAt = new Date().toISOString();
      existingRecord.source = 'url-import';
      await dbPut('bodyMetrics', existingRecord);
      updated++;
    } else {
      await dbAdd('bodyMetrics', {
        metricId: item.metricId,
        value: item.value,
        date: targetDate,
        createdAt: new Date().toISOString(),
        source: 'url-import'
      });
      imported++;
    }
  }
  
  clearHash();
  
  const msg = [];
  if (imported > 0) msg.push(`新增 ${imported} 条`);
  if (updated > 0) msg.push(`更新 ${updated} 条`);
  showToast(`✓ 已导入:${msg.join('、')}`);
  
  // 如果在体测视图,刷新一下
  const activeView = document.querySelector('.view.active');
  if (activeView && activeView.id === 'view-metrics') {
    renderMetrics();
  }
}

// ============================================================
// 兼容: 旧版 v8.2 的 noteBackup localStorage 数据
// ============================================================
async function migrateFromOldNoteBackup() {
  try {
    const backups = JSON.parse(localStorage.getItem('noteBackup') || '[]');
    if (backups.length === 0) return 0;
    
    const currentNotes = await dbGetAll('exerciseNotes');
    const sigs = new Set(currentNotes.map(n => `${n.exerciseId}|${n.createdAt}|${n.text}`));
    
    let migrated = 0;
    for (const b of backups) {
      const sig = `${b.exerciseId}|${b.createdAt}|${b.text}`;
      if (!sigs.has(sig)) {
        await dbAdd('exerciseNotes', {
          exerciseId: b.exerciseId,
          text: b.text,
          createdAt: b.createdAt
        });
        migrated++;
      }
    }
    return migrated;
  } catch (e) {
    console.error('迁移老版 noteBackup 失败:', e);
    return 0;
  }
}

// ============================================================
// 确保 startDate 被持久化(关键修复: 之前没设 startDate 会导致每周都计算为 Week 3)
// ============================================================
// 设计: startDate 是 Week 3 的周一(基准点)
// 用户场景: 本周一应当作 Week 4 起点 → startDate = 上周一
async function ensureStartDate() {
  const existing = await getSetting('startDate');
  if (existing) return { firstTime: false, startDate: existing };
  
  // 第一次启动: 把"上周一"持久化为 startDate(这样本周一就是 Week 4)
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const dayOfWeek = today.getDay();
  const daysToMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
  const thisMonday = new Date(today);
  thisMonday.setDate(today.getDate() - daysToMonday);
  // 再往前推 7 天 = 上周一 = Week 3 周一基准
  const lastMonday = new Date(thisMonday);
  lastMonday.setDate(thisMonday.getDate() - 7);
  const lastMondayStr = fmtDate(lastMonday);
  
  await setSetting('startDate', lastMondayStr);
  return { firstTime: true, startDate: lastMondayStr };
}

// ============================================================
// 启动
// ============================================================
(async () => {
  await openDB();
  
  // 1. 从 IndexedDB 迁移到 localStorage(从 v8.2 及之前升级的兼容)
  const idbMigration = await migrateFromIDB();
  
  // 2. 从老版 noteBackup localStorage 迁移
  const oldBackupCount = await migrateFromOldNoteBackup();
  
  // 3. 关键: 确保 startDate 已持久化(修复"每周都是 Week 3"的 bug)
  const sd = await ensureStartDate();
  
  if (idbMigration.migrated > 0 || oldBackupCount > 0) {
    const parts = [];
    if (idbMigration.migrated > 0) {
      parts.push(`从 IndexedDB 迁移: ${idbMigration.summary.join(', ')}`);
    }
    if (oldBackupCount > 0) {
      parts.push(`从 v8.2 备份恢复: ${oldBackupCount} 条评论`);
    }
    setTimeout(() => {
      alert(
        `🔄 数据迁移完成\n\n${parts.join('\n')}\n\n` +
        `数据已转移到 localStorage 主存储,从此不再受 iOS PWA IndexedDB 不稳定影响。\n\n` +
        `建议立即去【设置】→【导出 JSON】做一份完整备份。`
      );
    }, 800);
  } else if (sd.firstTime) {
    // 第一次启动 (没迁移到的全新用户),提醒用户确认开始日期
    setTimeout(() => {
      alert(
        `👋 欢迎使用!\n\n` +
        `已自动将上周一 (${sd.startDate}) 设为 Week 3 起点。\n` +
        `这意味着本周一开始进入 Week 4。\n\n` +
        `如需修改,请到【设置】→【训练开始日期】调整。`
      );
    }, 800);
  }
  
  await renderToday();
  setTimeout(() => handleURLImport(), 300);
})();
</script>
