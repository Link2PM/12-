<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="训练计划">
<title>12周训练计划</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0f1e;--bg2:#111827;--bg3:#1a2235;--card:#141d2f;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --accent:#4f8ef7;--accent2:#34c98a;--accent3:#f5a623;--accent4:#e05a5a;
  --text:#f0f4ff;--text2:#8899bb;--text3:#4a5a7a;
  --radius:16px;--radius-sm:10px;
  --safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;background:#0a0f1e;}
body{
  height:100%;min-height:-webkit-fill-available;
  overflow:hidden;background:#0a0f1e;
  color:var(--text);font-family:'Noto Sans SC',sans-serif;user-select:none;
}
#app{
  display:flex;flex-direction:column;
  height:100%;min-height:-webkit-fill-available;
  padding-top:env(safe-area-inset-top,0px);
}
#view{
  flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  padding-bottom:calc(60px + env(safe-area-inset-bottom,0px) + 16px);
}
#nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:#0a0f1e;
  border-top:1px solid var(--border);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
#nav-inner{
  display:flex;align-items:center;width:100%;height:60px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer}
.nav-icon{font-size:20px;line-height:1;transition:transform .2s}
.nav-label{font-size:10px;color:var(--text2);font-weight:500;letter-spacing:.02em;transition:color .2s}
.nav-item.active .nav-icon{transform:scale(1.15)}
.nav-item.active .nav-label{color:var(--accent)}
.page-header{padding:16px 20px 12px;position:sticky;top:0;background:rgba(10,15,30,0.96);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:10;border-bottom:1px solid var(--border)}
.page-title{font-size:24px;font-weight:700;letter-spacing:-.02em}
.page-sub{font-size:12px;color:var(--text2);margin-top:2px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:0 16px 10px}
.card-sm{padding:11px 14px}
.section-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:14px 20px 6px}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.badge-blue{background:rgba(79,142,247,.18);color:var(--accent)}
.badge-green{background:rgba(52,201,138,.18);color:var(--accent2)}
.badge-amber{background:rgba(245,166,35,.18);color:var(--accent3)}
.badge-red{background:rgba(224,90,90,.18);color:var(--accent4)}
.check-btn{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;flex-shrink:0}
.check-btn.done{background:var(--accent2);border-color:var(--accent2)}
.check-btn .ck{font-size:13px;opacity:0;transition:opacity .2s}
.check-btn.done .ck{opacity:1}
.ex-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--border)}
.ex-item:last-child{border-bottom:none}
.ex-num{width:26px;height:26px;border-radius:7px;background:var(--bg3);display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;color:var(--text2);flex-shrink:0;font-family:'DM Mono',monospace}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-meta{font-size:11px;color:var(--text2);margin-top:2px}
.ex-tip{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.4;white-space:normal}
.ex-tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;margin-top:3px;font-weight:600}
.tag-new{background:rgba(224,90,90,.2);color:var(--accent4)}
.tag-key{background:rgba(79,142,247,.2);color:var(--accent)}
.tag-posture{background:rgba(245,166,35,.2);color:var(--accent3)}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;
  align-items:flex-end;backdrop-filter:blur(6px)}
#modal-overlay.show{display:flex}
#modal{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;max-height:90vh;
  overflow-y:auto;padding:0 0 calc(24px + var(--safe-b));animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 16px}
.modal-title{font-size:19px;font-weight:700;padding:0 20px 14px}
.log-row{display:flex;flex-direction:column;gap:8px;padding:11px 20px;border-bottom:1px solid var(--border)}
.log-label{font-size:13px;color:var(--text2);font-weight:500}
.log-stars{display:flex;gap:8px}
.star-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--border2);background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .2s}
.star-btn.sel{background:rgba(245,166,35,.2);border-color:var(--accent3)}
.log-options{display:flex;flex-wrap:wrap;gap:7px}
.opt-btn{padding:7px 13px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);
  color:var(--text2);font-size:13px;cursor:pointer;transition:all .2s;font-family:'Noto Sans SC',sans-serif}
.opt-btn.sel{background:rgba(79,142,247,.2);border-color:var(--accent);color:var(--accent)}
.log-textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:11px;
  color:var(--text);padding:11px;font-size:14px;resize:none;font-family:'Noto Sans SC',sans-serif;outline:none}
.log-textarea:focus{border-color:var(--accent)}
.btn-primary{width:calc(100% - 40px);margin:14px 20px 0;padding:15px;background:var(--accent);
  color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;
  font-family:'Noto Sans SC',sans-serif;transition:opacity .2s}
.btn-primary:active{opacity:.8}
.video-container{border-radius:13px;overflow:hidden;background:#000;position:relative;padding-top:56.25%}
.video-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.speed-btn{font-size:12px;padding:3px 9px;border-radius:14px;border:1px solid var(--border2);
  background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s;font-family:'DM Mono',monospace}
.speed-btn.speed-active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-center{position:absolute;text-align:center}
.bar-wrap{display:flex;align-items:flex-end;gap:5px;height:72px;padding:0 2px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar{width:100%;border-radius:3px 3px 0 0;transition:height .5s ease;min-height:3px}
.bar-label{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 16px}
.metric-tile{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px}
.metric-val{font-size:26px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-.03em}
.metric-unit{font-size:12px;color:var(--text2);margin-left:2px}
.metric-label{font-size:11px;color:var(--text3);margin-top:3px}
.metric-trend{font-size:11px;margin-top:5px}
.insight-item{display:flex;gap:11px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--border)}
.insight-item:last-child{border-bottom:none}
.insight-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.insight-title{font-size:14px;font-weight:600;margin-bottom:2px}
.insight-desc{font-size:12px;color:var(--text2);line-height:1.5}
.date-arrow{width:34px;height:34px;border-radius:10px;background:var(--bg3);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;transition:all .15s}
.date-arrow:active{background:var(--accent);border-color:var(--accent)}
.date-scroll{flex:1;overflow-x:auto;display:flex;gap:6px;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:2px 0}
.date-scroll::-webkit-scrollbar{display:none}
.date-pill{flex-shrink:0;padding:7px 12px;border-radius:20px;border:1px solid var(--border2);
  background:var(--bg3);cursor:pointer;transition:all .2s;text-align:center;min-width:54px}
.date-pill.active{background:var(--accent);border-color:var(--accent)}
.date-pill.today-mark{border-color:var(--accent2)}
.date-pill-dot{width:5px;height:5px;border-radius:50%;background:var(--accent2);margin:2px auto 0}
/* daily posture banner */
.posture-banner{margin:10px 16px 0;background:linear-gradient(135deg,rgba(245,166,35,.12),rgba(224,90,90,.08));
  border:1px solid rgba(245,166,35,.3);border-radius:var(--radius);padding:13px 14px}
::-webkit-scrollbar{display:none}

/* 日期切换动画 */
.date-pill{transition:background .2s cubic-bezier(.4,0,.2,1),border-color .2s cubic-bezier(.4,0,.2,1);}
.date-pill-day{font-size:11px;font-weight:600;color:var(--text2);transition:color .2s cubic-bezier(.4,0,.2,1);}
.date-pill-num{font-size:15px;font-weight:700;color:var(--text);transition:color .2s cubic-bezier(.4,0,.2,1);}
.date-pill.active .date-pill-day{color:#fff;}
.date-pill.active .date-pill-num{color:#fff;}
.date-pill.today-mark .date-pill-day{color:var(--accent2);}
@keyframes planFadeUp{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes headerFade{
  from{opacity:0;}
  to{opacity:1;}
}
.plan-body-anim{animation:planFadeUp .22s cubic-bezier(.4,0,.2,1) both;}
.plan-header-anim{animation:headerFade .18s cubic-bezier(.4,0,.2,1) both;}
</style>
</head>
<body>
<div id="app">
  <div id="view"></div>
  <nav id="nav">
    <div id="nav-inner">
      <div class="nav-item active" onclick="showPage('plan')" id="nav-plan"><div class="nav-icon">📋</div><div class="nav-label">今日计划</div></div>
      <div class="nav-item" onclick="showPage('schedule')" id="nav-schedule"><div class="nav-icon">📅</div><div class="nav-label">训练表</div></div>
      <div class="nav-item" onclick="showPage('log')" id="nav-log"><div class="nav-icon">✏️</div><div class="nav-label">打卡</div></div>
      <div class="nav-item" onclick="showPage('stats')" id="nav-stats"><div class="nav-icon">📊</div><div class="nav-label">分析</div></div>
    </div>
  </nav>
</div>
<div id="modal-overlay" onclick="closeModalOutside(event)"><div id="modal"></div></div>

<script>

const APP_PLAN_VERSION = 2;

// 自动迁移旧版数据（兼容所有历史key）
function migrateOldData(){
  const keys=['fit_v7','fit_v6','fs2_state'];
  for(const k of keys){
    try{
      const raw=localStorage.getItem(k);
      if(raw){
        const old=JSON.parse(raw);
        if(old && old.logs){
          localStorage.setItem('fit_app',raw);
          localStorage.removeItem(k);
          return old;
        }
      }
    }catch(e){}
  }
  return null;
}

function todayStr(){return new Date().toISOString().split('T')[0];}

let S = JSON.parse(localStorage.getItem('fit_app')||'null')
     || migrateOldData()
     || {startDate:todayStr(),logs:{},weights:[],planVersion:APP_PLAN_VERSION,planSwitchDates:{}};

if(S.planVersion !== APP_PLAN_VERSION){
  if(!S.planSwitchDates) S.planSwitchDates={};
  S.planSwitchDates[APP_PLAN_VERSION]=todayStr();
  S.planVersion=APP_PLAN_VERSION;
  localStorage.setItem('fit_app',JSON.stringify(S));
}
let page='plan', viewDate=todayStr(), logDate=null;

function save(){localStorage.setItem('fit_app',JSON.stringify(S));}
function weekday(ds){const j=new Date(ds+'T12:00:00').getDay();return j===0?7:j;}
function weekNum(ds){
  const diff=Math.floor((new Date(ds+'T12:00:00')-new Date(S.startDate+'T12:00:00'))/(864e5));
  return Math.max(1,Math.floor(diff/7)+1);
}

// 根据日期获取当天计划，处理第7周减负逻辑
function getPlanDay(ds){
  const wd=weekday(ds);
  const wn=weekNum(ds);
  const base=PLAN[wd];
  if(!base) return base;

  // 第7周减负：降低训练量，更新备注
  if(wn===7){
    const reduced = Object.assign({},base);
    reduced.note = base.note + ' · ⚠️ 第7周减负，训练量降低40%';
    reduced.exercises = base.exercises.map(ex=>{
      if(!ex.sets || ex.sets==='—') return ex;
      const newSets = ex.sets.replace(/4组/,'2组').replace(/3组/,'2组');
      return Object.assign({},ex,{sets:newSets});
    });
    return reduced;
  }

  // 超过12周后进入维持阶段
  if(wn>12){
    return Object.assign({},base,{note:base.note+' · 维持阶段'});
  }

  return base;
}

// 判断某个历史日期是否在当前计划版本切换之前
// 切换前的数据只显示"已完成X项"，不硬对应新计划的动作名
function isBeforePlanSwitch(ds){
  if(!S.planSwitchDates) return false;
  const switchDate = S.planSwitchDates[APP_PLAN_VERSION];
  if(!switchDate) return false;
  return ds < switchDate;
}
function getLog(d){return S.logs[d]||{completed:[],feeling:0,energy:0,issues:[],notes:'',bodyweight:null};}
function dateLabel(ds){
  const d=new Date(ds+'T12:00:00');
  return `${d.getMonth()+1}/${d.getDate()} 周${'日一二三四五六'[d.getDay()]}`;
}
function isToday(ds){return ds===todayStr();}

function showPage(p){
  page=p;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-'+p).classList.add('active');
  const v=document.getElementById('view');
  if(p==='plan') v.innerHTML=renderPlan();
  else if(p==='schedule') v.innerHTML=renderSchedule();
  else if(p==='log') v.innerHTML=renderLog();
  else v.innerHTML=renderStats();
}

function renderPlan(){
  return `<div id="plan-view">${renderPlanHeader()}${renderDateStrip()}${renderPlanBody()}</div>`;

function renderPlanHeader(){
  const wn=weekNum(viewDate);
  const pi=wn<=2?0:wn<=4?1:wn<=6?2:wn===7?3:wn<=10?4:5;
  const phase=PHASES[Math.min(pi,5)];
  const tod=isToday(viewDate);
  return `<div class="page-header plan-header-anim" id="plan-header">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div class="page-title">${tod?'今日计划':'查看计划'}</div>
        <div class="page-sub">${dateLabel(viewDate)} · 第${wn}周 <span class="badge badge-amber" style="margin-left:4px">${phase.name}</span></div>
      </div>
      ${!tod?`<div onclick="goToday()" style="background:rgba(79,142,247,.2);border:1px solid var(--accent);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--accent);cursor:pointer">回到今天</div>`:''}
    </div>
  </div>`;
}

function renderDateStrip(){
  // 以开始日期为锚点，渲染 -14 到 +98 天（覆盖14周），一次建好不再重建
  let html=`<div style="display:flex;align-items:center;padding:10px 8px 0;gap:4px" id="date-strip-wrap">
    <div class="date-arrow" onclick="shiftDate(-1)">‹</div>
    <div class="date-scroll" id="date-strip">`;
  const anchor=new Date(S.startDate+'T12:00:00');
  for(let i=-14;i<=98;i++){
    const d=new Date(anchor);d.setDate(d.getDate()+i);
    const ds=d.toISOString().split('T')[0];
    const wdN=weekday(ds);
    const lg=getLog(ds);
    const hasDone=lg.completed&&lg.completed.length>0;
    const active=ds===viewDate, isTod=ds===todayStr();
    html+=`<div class="date-pill ${active?'active':''} ${isTod&&!active?'today-mark':''}" id="dp-${ds}" onclick="setViewDate('${ds}')">
      <div class="date-pill-day">${'一二三四五六日'[wdN-1]}</div>
      <div class="date-pill-num">${d.getDate()}</div>
      ${hasDone&&!active?'<div class="date-pill-dot"></div>':'<div style="height:7px"></div>'}
    </div>`;
  }
  html+=`</div><div class="date-arrow" onclick="shiftDate(1)">›</div></div>`;
  return html;
}

// 只更新日期条的激活状态，不重建DOM
function updateDateStripActive(oldDs, newDs){
  const oldPill=document.getElementById('dp-'+oldDs);
  const newPill=document.getElementById('dp-'+newDs);
  // 只操作 class，颜色完全由 CSS transition 控制，不碰任何 style
  if(oldPill){
    oldPill.classList.remove('active');
    if(oldDs===todayStr()) oldPill.classList.add('today-mark');
  }
  if(newPill){
    newPill.classList.remove('today-mark');
    newPill.classList.add('active');
    newPill.scrollIntoView({behavior:'instant',block:'nearest',inline:'center'});
  }
}

function setViewDate(ds){
  const oldDs=viewDate;
  viewDate=ds;
  const strip=document.getElementById('date-strip');
  if(strip && document.getElementById('dp-'+ds)){
    // 日期条已存在且包含目标日期：只改 class，不重建任何 DOM
    updateDateStripActive(oldDs, ds);
    // 更新标题行（带淡入动画）
    const hdr=document.getElementById('plan-header');
    if(hdr) hdr.outerHTML=renderPlanHeader();
    // 更新训练内容（带淡入+上移动画）
    const body=document.getElementById('plan-body');
    if(body){
      body.outerHTML=renderPlanBody();
      // 强制重播动画：移除再添加 class
      const newBody=document.getElementById('plan-body');
      if(newBody){
        newBody.classList.remove('plan-body-anim');
        void newBody.offsetWidth; // 触发 reflow
        newBody.classList.add('plan-body-anim');
      }
    }
  } else if(document.getElementById('plan-view')){
    // 目标日期超出已渲染范围（理论上不会，因为渲染了112天）：重建整页
    document.getElementById('plan-view').innerHTML = renderPlanHeader()+renderDateStrip()+renderPlanBody();
    requestAnimationFrame(()=>{
      const el=document.getElementById('dp-'+ds);
      if(el) el.scrollIntoView({behavior:'instant',block:'nearest',inline:'center'});
    });
  } else {
    showPage('plan');
  }
}
function shiftDate(delta){
  const dt=new Date(viewDate+'T12:00:00');
  dt.setDate(dt.getDate()+delta);
  setViewDate(dt.toISOString().split('T')[0]);
}
function goToday(){
  setViewDate(todayStr());
}

function renderLog(){
  const tod=todayStr(), wd=weekday(tod), day=getPlanDay(tod), log=getLog(tod);
  let html=`<div class="page-header"><div class="page-title">打卡记录</div><div class="page-sub">今天 · ${dateLabel(tod)}</div></div>`;
  html+=`<div class="section-label">今日动作</div><div class="card">`;
  if(day.exercises.length>0){
    day.exercises.forEach((ex,i)=>{
      const done2=log.completed.includes(i);
      html+=`<div class="ex-item">
        <div class="ex-info"><div class="ex-name" style="${done2?'text-decoration:line-through;color:var(--text3)':''}">${ex.name}</div><div class="ex-meta">${ex.sets} · ${ex.reps}</div></div>
        <div class="check-btn ${done2?'done':''}" onclick="toggleEx(event,'${tod}',${i});showPage('log')"><span class="ck">✓</span></div>
      </div>`;
    });
  } else {
    html+=`<div style="text-align:center;color:var(--text3);padding:16px;font-size:14px">今天是休息日 😴</div>`;
  }
  html+=`<button class="opt-btn" style="width:100%;text-align:center;margin-top:10px;padding:11px" onclick="openLog('${tod}')">📊 记录感受 · 体重 · 备注</button></div>`;

  html+=`<div class="section-label">最近记录</div>`;
  const recent=Object.keys(S.logs).sort().reverse().slice(0,10);
  if(!recent.length){
    html+=`<div class="card card-sm" style="text-align:center;color:var(--text3);padding:20px">暂无记录，完成训练后打卡吧</div>`;
  } else {
    recent.forEach(date=>{
      const l=S.logs[date];
      const cnt=l.completed?l.completed.length:0;
      const fe=['','😫','😐','🙂','😊','🔥'][l.feeling||0];
      const beforeSwitch = isBeforePlanSwitch(date);
      html+=`<div class="card card-sm" style="margin-bottom:7px" onclick="openLog('${date}')">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="display:flex;align-items:center;gap:6px">
              <span style="font-size:13px;font-weight:600">${dateLabel(date)}</span>
              ${beforeSwitch?'<span style="font-size:10px;color:var(--text3);background:var(--bg3);padding:1px 6px;border-radius:8px">旧计划</span>':''}
            </div>
            <div style="font-size:12px;color:var(--text2);margin-top:2px">完成${cnt}项 ${l.bodyweight?'· '+l.bodyweight+'kg':''} ${fe}</div>
            ${l.notes?`<div style="font-size:11px;color:var(--text3);margin-top:2px">"${l.notes.slice(0,28)}${l.notes.length>28?'…':''}"</div>`:''}
          </div>
          <div style="font-size:20px">${cnt>0?'✅':'📝'}</div>
        </div>
      </div>`;
    });
  }
  html+=`<div style="height:16px"></div>`;
  return html;
}

function renderStats(){
  const wn=weekNum(todayStr());
  const allD=Object.keys(S.logs).sort();
  const total=allD.length;
  const comp=allD.filter(d=>S.logs[d].completed&&S.logs[d].completed.length>0).length;
  const rate=total>0?Math.round(comp/total*100):0;
  const avgF=total>0?(allD.reduce((s,d)=>s+(S.logs[d].feeling||0),0)/total).toFixed(1):'-';

  const last7=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split('T')[0];
    const t=getPlanDay(ds).exercises.length,l=S.logs[ds],dn=l&&l.completed?l.completed.length:0;
    last7.push({ds,dn,t,pct:t>0?dn/t:0});}

  let html=`<div class="page-header"><div class="page-title">数据分析</div><div class="page-sub">第${wn}周 · 智能进度追踪</div></div>`;
  html+=`<div class="section-label">核心数据</div><div class="metric-grid">
    <div class="metric-tile"><div class="metric-val">${rate}<span class="metric-unit">%</span></div><div class="metric-label">整体完成率</div>
      <div class="metric-trend" style="color:${rate>=80?'var(--accent2)':rate>=60?'var(--accent3)':'var(--accent4)'}">${rate>=80?'🔥 优秀':rate>=60?'👍 良好':'💪 继续'}</div></div>
    <div class="metric-tile"><div class="metric-val">${comp}<span class="metric-unit">天</span></div><div class="metric-label">已打卡天数</div><div class="metric-trend" style="color:var(--text3)">共记录${total}天</div></div>
    <div class="metric-tile"><div class="metric-val">${Math.min(wn,12)}<span class="metric-unit">/12</span></div><div class="metric-label">当前周次</div><div class="metric-trend" style="color:var(--accent)">进度${Math.round(Math.min(wn,12)/12*100)}%</div></div>
    <div class="metric-tile"><div class="metric-val">${avgF}<span class="metric-unit">/5</span></div><div class="metric-label">平均状态评分</div><div class="metric-trend" style="color:var(--text3)">训练感受</div></div>
  </div>`;

  html+=`<div class="section-label">最近7天完成</div><div class="card"><div class="bar-wrap">`;
  last7.forEach(d=>{
    const h=Math.round(d.pct*58);const c=d.pct===1?'var(--accent2)':d.pct>0?'var(--accent)':'var(--bg3)';
    const tod2=d.ds===todayStr();
    html+=`<div class="bar-col"><div class="bar" style="height:${Math.max(h,3)}px;background:${c};opacity:${tod2?1:.75}"></div>
      <div class="bar-label" style="${tod2?'color:var(--accent)':''}">${'一二三四五六日'[weekday(d.ds)-1]}</div></div>`;
  });
  html+=`</div></div>`;

  html+=`<div class="section-label">智能分析</div><div class="card">`;
  genInsights(wn,rate,S.logs,allD).forEach(ins=>{
    html+=`<div class="insight-item"><div class="insight-icon" style="background:${ins.bg}">${ins.icon}</div>
      <div><div class="insight-title">${ins.title}</div><div class="insight-desc">${ins.desc}</div></div></div>`;
  });
  html+=`</div>`;

  html+=`<div class="section-label">体重趋势</div><div class="card" style="margin-bottom:8px">`;
  if(S.weights.length>0){
    const last=S.weights[S.weights.length-1],first=S.weights[0];
    const diff=(last.kg-first.kg).toFixed(1);
    html+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div><div style="font-size:26px;font-weight:700;font-family:'DM Mono',monospace">${last.kg}<span style="font-size:13px;color:var(--text2);margin-left:2px">kg</span></div>
      <div style="font-size:11px;color:var(--text3)">最新 · ${last.date}</div></div>
      <div style="text-align:right"><div style="font-size:19px;font-weight:700;color:${diff<=0?'var(--accent2)':'var(--accent4)'}">${diff<=0?diff:'+'+diff} kg</div>
      <div style="font-size:11px;color:var(--text3)">较起始</div></div></div>`;
    if(S.weights.length>1){
      const wts=S.weights.slice(-8);const mn=Math.min(...wts.map(w=>w.kg)),mx=Math.max(...wts.map(w=>w.kg));const rng=mx-mn||0.5;
      html+=`<div class="bar-wrap" style="height:56px">`;
      wts.forEach(w=>{const h=Math.round((1-(w.kg-mn)/rng)*36)+14;html+=`<div class="bar-col"><div class="bar" style="height:${h}px;background:var(--accent2)"></div><div class="bar-label">${w.kg}</div></div>`;});
      html+=`</div>`;
    }
  } else {
    html+=`<div style="color:var(--text3);font-size:13px;text-align:center;padding:14px">打卡时记录体重，趋势图将显示在这里</div>`;
  }
  html+=`</div>
  <div style="padding:0 16px 8px">
    <button class="opt-btn" style="width:100%;text-align:center;padding:11px" onclick="openWeightModal()">⚖️ 记录今日体重</button>
  </div>`;

  // 数据备份区
  html+=`<div class="section-label">数据备份</div>
  <div class="card" style="margin-bottom:24px">
    <div style="font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px">
      通过 GitHub Pages 网址访问时，更新文件后数据自动保留，无需手动备份。<br>
      以下备份适用于：更换设备、清除浏览器数据、或作为额外保险。
    </div>
    <div style="display:flex;gap:8px">
      <button class="opt-btn" style="flex:1;text-align:center;padding:10px;font-size:13px" onclick="exportData()">📤 导出备份</button>
      <button class="opt-btn" style="flex:1;text-align:center;padding:10px;font-size:13px" onclick="document.getElementById('import-file').click()">📥 导入恢复</button>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
  </div>`;
  return html;
}

function genInsights(wn,rate,logs,dates){
  const res=[];
  if(rate<60&&dates.length>=3) res.push({icon:'⚠️',bg:'rgba(224,90,90,.15)',title:'完成率偏低',desc:`近期完成率${rate}%，考虑适当降低单次训练量，一致性比强度更重要。`});
  else if(rate>=85) res.push({icon:'🔥',bg:'rgba(52,201,138,.15)',title:'完成率优秀',desc:`完成率${rate}%，执行力很强。确保蛋白质摄入140g+和7小时睡眠，决定下阶段效果。`});
  else res.push({icon:'👍',bg:'rgba(79,142,247,.15)',title:'进度良好',desc:`完成率${rate}%，在正确轨道上。一致性是健身成功最重要的因素。`});
  if(wn<=2) res.push({icon:'📌',bg:'rgba(245,166,35,.15)',title:'适应期：体态矫正优先',desc:'每天15分钟体态矫正（侧卧外旋+Y形举+胸小肌拉伸）比大重量训练对体态的改善更重要。'});
  else if(wn===7) res.push({icon:'♻️',bg:'rgba(245,166,35,.15)',title:'减负周注意事项',desc:'本周体重短暂上升是正常现象，不是反弹。减负后下周力量会有突破。'});
  else if(wn>=4) res.push({icon:'💪',bg:'rgba(79,142,247,.15)',title:`第${wn}周：观察肱骨前移改善`,desc:'检查：放松站立时手背是否开始朝向大腿外侧？若是，说明肩袖外旋训练已起效。'});
  const recentF=dates.slice(-5).map(d=>logs[d].feeling||0).filter(f=>f>0);
  if(recentF.length>=3&&recentF.reduce((a,b)=>a+b,0)/recentF.length<2.5)
    res.push({icon:'😴',bg:'rgba(224,90,90,.1)',title:'近期疲劳感偏高',desc:'连续评分低可能是过度训练或睡眠不足。检查蛋白质摄入是否达到140g/天。'});
  if(!res.length) res.push({icon:'📊',bg:'rgba(79,142,247,.1)',title:'开始记录获取分析',desc:'完成训练并打卡，这里会出现针对你情况的个性化分析。'});
  return res;
}

function showEx(wd,i){
  const ex=PLAN[wd].exercises[i];
  if(!ex)return;
  const vkey=ex.video, vInfo=vkey?VIDEOS[vkey]:null;
  const hasEmbed=vInfo&&vInfo.bvid;
  const eUrl=hasEmbed?embedUrl(vkey):null;
  const sq=ex.q;
  const sUrl=sq?searchUrl(sq):null;

  let vidSection='';
  if(hasEmbed){
    vidSection=`<div style="margin:0 20px 6px">
      <div class="video-container"><iframe id="bili-iframe" src="${eUrl}" scrolling="no" frameborder="0" allowfullscreen="true"
        sandbox="allow-top-navigation allow-same-origin allow-forms allow-scripts allow-popups allow-presentation"></iframe></div>
      <div style="display:flex;align-items:center;gap:6px;padding:7px 0 4px;flex-wrap:wrap">
        <span style="font-size:11px;color:var(--text3)">倍速:</span>
        ${[0.75,1,1.25,1.5,2].map(s=>`<span class="speed-btn ${s===1?'speed-active':''}" onclick="setSpeedBtn(this,${s})">${s}x</span>`).join('')}
        <div style="flex:1"></div>
        <a href="https://www.bilibili.com/video/${vInfo.bvid}" target="_blank"
          style="font-size:11px;color:var(--accent);background:rgba(79,142,247,.12);border:1px solid var(--accent);border-radius:20px;padding:3px 10px;text-decoration:none">B站完整观看 ›</a>
      </div>
      <div style="font-size:11px;color:var(--text3);padding-bottom:4px">来源: 哔哩哔哩 · ${vInfo.up}</div>
    </div>`;
  } else if(sUrl){
    vidSection=`<div style="margin:0 20px 14px">
      <div style="background:var(--bg3);border:1px solid var(--border2);border-radius:13px;padding:18px;text-align:center">
        <div style="font-size:22px;margin-bottom:8px">🎬</div>
        <div style="font-size:14px;font-weight:500;margin-bottom:4px">${ex.name} 教学视频</div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:14px">搜索词：「${sq}」</div>
        <a href="${sUrl}" target="_blank" style="display:inline-block;background:var(--accent);color:#fff;border-radius:20px;padding:9px 22px;font-size:14px;font-weight:600;text-decoration:none">在 B站 搜索此动作 ›</a>
      </div>
    </div>`;
  }

  const tagHtml=ex.tag?`<span class="ex-tag tag-${ex.tag}" style="margin-left:8px">${ex.tagLabel}</span>`:'';

  document.getElementById('modal').innerHTML=`<div class="modal-handle"></div>
    <div class="modal-title">${ex.name}${tagHtml}</div>
    ${vidSection}
    <div class="log-row">
      <div class="log-label">训练参数</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:5px">
        <span class="badge badge-blue">${ex.sets}</span>
        <span class="badge badge-green">${ex.reps}</span>
        <span class="badge badge-amber">${ex.weight}</span>
      </div>
    </div>
    <div class="log-row" style="border:none">
      <div class="log-label">动作要点</div>
      <div style="font-size:14px;color:var(--text);line-height:1.7;margin-top:5px;padding:11px;background:var(--bg3);border-radius:11px">${ex.tip}</div>
    </div>
    ${getExtraTip(ex.name)}
    <button class="btn-primary" onclick="closeModal()">明白了</button>`;
  document.getElementById('modal-overlay').classList.add('show');
}

function setSpeedBtn(el,s){
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('speed-active'));
  el.classList.add('speed-active');
  try{const iframe=document.getElementById('bili-iframe');const vid=iframe?.contentDocument?.querySelector('video')||iframe?.contentWindow?.document?.querySelector('video');if(vid)vid.playbackRate=s;}catch(e){}
}

    '侧卧哑铃外旋':'<div class="log-row" style="border:none;margin-top:-6px"><div style="background:rgba(245,166,35,.1);border-left:3px solid var(--accent3);border-radius:0 10px 10px 0;padding:10px 12px;font-size:12px;color:var(--accent3)">💡 上臂必须全程夹紧体侧，否则三角肌代偿。1-2kg感觉肩后侧酸胀才是正确，重量越轻反而动作越纯粹。</div></div>',
    '俯卧Y形举':'<div class="log-row" style="border:none;margin-top:-6px"><div style="background:rgba(245,166,35,.1);border-left:3px solid var(--accent3);border-radius:0 10px 10px 0;padding:10px 12px;font-size:12px;color:var(--accent3)">💡 最常见错误是耸肩。做动作时想象肩膀往脚的方向下沉，再抬手臂。大拇指朝上是关键，改变了肱骨旋转角度。</div></div>',
    '弹力带侧向走':'<div class="log-row" style="border:none;margin-top:-6px"><div style="background:rgba(245,166,35,.1);border-left:3px solid var(--accent3);border-radius:0 10px 10px 0;padding:10px 12px;font-size:12px;color:var(--accent3)">💡 改善O型腿最直接的动作，每次下肢日必做。感受髋外侧酸胀说明正确，不是大腿酸。</div></div>',
    '传统硬拉':'<div class="log-row" style="border:none;margin-top:-6px"><div style="background:rgba(245,166,35,.1);border-left:3px solid var(--accent3);border-radius:0 10px 10px 0;padding:10px 12px;font-size:12px;color:var(--accent3)">💡 整个计划最重要的动作。口诀：起始时臀往后坐 → 提起时臀往前推 → 全程腹部收紧不弓腰。</div></div>',
    '鸽子式拉伸':'<div class="log-row" style="border:none;margin-top:-6px"><div style="background:rgba(52,201,138,.1);border-left:3px solid var(--accent2);border-radius:0 10px 10px 0;padding:10px 12px;font-size:12px;color:var(--accent2)">💡 每天做比每周做三次效果好得多。梨状肌是O型腿和画圈步态的直接根源，每天松解是改善步态最快的方法。</div></div>',

  document.getElementById('modal').innerHTML=`<div class="modal-handle"></div>

    <div class="log-row">
      <div class="log-label">训练感受</div>
      <div class="log-stars">${[1,2,3,4,5].map(n=>`<div class="star-btn ${(log.feeling||0)>=n?'sel':''}" onclick="setFeel(${n})">${fe[n]}</div>`).join('')}</div>

    <div class="log-row">
      <div class="log-label">能量状态</div>
      <div class="log-stars">${[1,2,3,4,5].map(n=>`<div class="star-btn ${(log.energy||0)>=n?'sel':''}" onclick="setEnergy(${n})">⚡</div>`).join('')}</div>
    </div>
    <div class="log-row">
      <div class="log-label">遇到的问题</div>
      <div class="log-options">${['动作不标准','重量太重','重量太轻','关节不适','时间不够','很疲惫','身体疼痛','腿软力竭'].map(issue=>
        `<div class="opt-btn ${(log.issues||[]).includes(issue)?'sel':''}" onclick="toggleIssue('${issue}')">${issue}</div>`).join('')}
      </div>
    </div>
    <div class="log-row">
      <div class="log-label">体重（可选）</div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:2px">
        <input type="number" step="0.1" min="40" max="120" value="${log.bodyweight||''}" placeholder="67.2" id="wt-inp"
          style="background:var(--bg3);border:1px solid var(--border2);border-radius:11px;color:var(--text);padding:10px 14px;font-size:18px;width:120px;outline:none;font-family:'DM Mono',monospace">
        <span style="color:var(--text2)">kg</span>
      </div>
    </div>
    <div class="log-row" style="border:none">
      <div class="log-label">备注</div>
      <textarea class="log-textarea" rows="3" placeholder="今天的感受、重量记录..." id="log-notes">${log.notes||''}</textarea>
    </div>
    <button class="btn-primary" onclick="saveLog()">保存记录</button>`;
  document.getElementById('modal-overlay').classList.add('show');
}
function setFeel(n){const l=getLog(logDate);l.feeling=n;S.logs[logDate]=l;save();openLog(logDate);}
function setEnergy(n){const l=getLog(logDate);l.energy=n;S.logs[logDate]=l;save();openLog(logDate);}
function toggleIssue(issue){const l=getLog(logDate);if(!l.issues)l.issues=[];const p=l.issues.indexOf(issue);if(p===-1)l.issues.push(issue);else l.issues.splice(p,1);S.logs[logDate]=l;save();openLog(logDate);}
function saveLog(){
  const l=getLog(logDate);
  const wt=parseFloat(document.getElementById('wt-inp')?.value);
  const notes=document.getElementById('log-notes')?.value;
  if(wt&&!isNaN(wt)){l.bodyweight=wt;const ex=S.weights.findIndex(w=>w.date===logDate);if(ex>=0)S.weights[ex].kg=wt;else S.weights.push({date:logDate,kg:wt});S.weights.sort((a,b)=>a.date.localeCompare(b.date));}
  if(notes!==undefined)l.notes=notes;
  S.logs[logDate]=l;save();closeModal();showPage(page);
}

function openWeightModal(){
  const tod=todayStr(),ex=S.weights.find(w=>w.date===tod);
  document.getElementById('modal').innerHTML=`<div class="modal-handle"></div>
    <div class="modal-title">⚖️ 记录体重</div>
    <div class="log-row" style="border:none">
      <div class="log-label">今日体重</div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:6px">
        <input type="number" step="0.1" min="40" max="120" value="${ex?.kg||''}" placeholder="67.0" id="wt2"
          style="background:var(--bg3);border:1px solid var(--border2);border-radius:11px;color:var(--text);padding:13px 16px;font-size:22px;width:150px;outline:none;font-family:'DM Mono',monospace">
        <span style="font-size:18px;color:var(--text2)">kg</span>
      </div>
    </div>
    <button class="btn-primary" onclick="saveWeight()">保存</button>`;
  document.getElementById('modal-overlay').classList.add('show');
}
function saveWeight(){
  const wt=parseFloat(document.getElementById('wt2')?.value);
  if(!wt||isNaN(wt))return closeModal();
  const tod=todayStr(),ex=S.weights.findIndex(w=>w.date===tod);
  if(ex>=0)S.weights[ex].kg=wt;else S.weights.push({date:tod,kg:wt});
  S.weights.sort((a,b)=>a.date.localeCompare(b.date));
  save();closeModal();showPage('stats');
}

function toggleEx(e,date,i){
  e.stopPropagation();
  const l=getLog(date);const p=l.completed.indexOf(i);
  if(p===-1)l.completed.push(i);else l.completed.splice(p,1);
  S.logs[date]=l;save();showPage(page);
}
function quickDone(date){
  const allI=getPlanDay(date).exercises.map((_,i)=>i);
  const l=getLog(date);l.completed=l.completed.length===allI.length?[]:allI;
  S.logs[date]=l;save();showPage(page);
}

// ── 数据导出/导入 ──
function exportData(){
  const json = JSON.stringify(S, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = todayStr();
  a.href = url;
  a.download = '训练数据备份_' + date + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      if(!data.startDate || !data.logs) {
        alert('文件格式不正确，请选择之前导出的备份文件');
        return;
      }
      if(confirm('导入后将覆盖当前所有数据，确认继续？')){
        S = data;
        save();
        showPage(page);
        alert('数据导入成功！共恢复 ' + Object.keys(S.logs).length + ' 天记录');
      }
    } catch(err){
      alert('导入失败：文件解析错误');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function closeModal(){
  const iframe=document.querySelector('#modal iframe');if(iframe)iframe.src='';
  document.getElementById('modal-overlay').classList.remove('show');
}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

// INIT
viewDate=todayStr();
showPage('plan');
setTimeout(()=>{const el=document.getElementById('dp-'+todayStr());if(el)el.scrollIntoView({behavior:'instant',block:'nearest',inline:'center'});},50);
</script>
